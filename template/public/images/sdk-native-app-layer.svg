<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Native application composed from SDK layers</title>
  <desc id="desc">A native application combines client SDK UI, plugin backend, custom agents, provider routing, and Codebolt engine services.</desc>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#090A12" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">NATIVE APPLICATION</text>
  <rect x="76" y="92" width="408" height="168" rx="14" fill="#0B1220" stroke="#334155"/>
  <rect x="102" y="122" width="112" height="48" rx="9" fill="#071B2B" stroke="#38BDF8"/>
  <rect x="224" y="122" width="112" height="48" rx="9" fill="#2A0F18" stroke="#FB7185"/>
  <rect x="346" y="122" width="112" height="48" rx="9" fill="#0D1B2A" stroke="#2DD4BF"/>
  <rect x="164" y="192" width="112" height="42" rx="9" fill="#251A06" stroke="#FBBF24"/>
  <rect x="286" y="192" width="112" height="42" rx="9" fill="#17142A" stroke="#A78BFA"/>
  <text x="158" y="151" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Client UI</text>
  <text x="280" y="151" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Plugin backend</text>
  <text x="402" y="151" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Agents</text>
  <text x="220" y="218" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Providers</text>
  <text x="342" y="218" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Engine</text>
</svg>
