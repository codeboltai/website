<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Runtime UI panels</title>
  <desc id="desc">Agents and plugins open dynamic panels, stream data, and receive user actions during a run.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#090A17" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">RUNTIME PANELS</text>
  <rect x="76" y="122" width="112" height="76" rx="12" fill="#17142A" stroke="#A78BFA"/>
  <text x="132" y="156" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Agent</text>
  <text x="132" y="178" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="10">opens panel</text>
  <path d="M206 160H286" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="304" y="96" width="176" height="128" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="328" y="126" width="128" height="18" rx="5" fill="#334155"/>
  <rect x="328" y="162" width="54" height="34" rx="7" fill="#0F172A" stroke="#334155"/>
  <rect x="402" y="162" width="54" height="34" rx="7" fill="#0F172A" stroke="#334155"/>
  <text x="392" y="250" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">messages / fetch / events</text>
</svg>
