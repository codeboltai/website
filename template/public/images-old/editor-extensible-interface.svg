<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Extensible editor interface</title>
  <desc id="desc">Plugin backends add commands, providers, hooks, and dynamic panels; agents exchange messages, fetches, and events with editor UI panels.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#090A17" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">EXTENSIBLE EDITOR</text>
  <rect x="96" y="142" width="174" height="176" rx="16" fill="#17142A" stroke="#A78BFA"/>
  <text x="183" y="190" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">Plugin</text>
  <text x="183" y="216" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">backend</text>
  <text x="183" y="246" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">commands</text>
  <text x="183" y="268" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">providers + hooks</text>
  <path d="M290 230H382" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="400" y="128" width="178" height="204" rx="16" fill="#111827" stroke="#475569"/>
  <text x="489" y="172" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Dynamic panel</text>
  <rect x="430" y="202" width="118" height="24" rx="6" fill="#0F172A" stroke="#334155"/>
  <rect x="430" y="248" width="48" height="38" rx="7" fill="#0F172A" stroke="#334155"/>
  <rect x="500" y="248" width="48" height="38" rx="7" fill="#0F172A" stroke="#334155"/>
  <path d="M598 230H674" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="692" y="166" width="104" height="128" rx="16" fill="#111827" stroke="#475569"/>
  <text x="744" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Agent</text>
  <text x="744" y="246" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">waits / updates</text>
</svg>
