<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chat channel plugins connect external messages to a Codebolt agent thread</title>
  <desc id="desc">Telegram, Slack, and custom chat channels flow through a Codebolt channel plugin into the gateway and agent thread.</desc>
  <defs>
    <linearGradient id="panel" x1="32" y1="24" x2="688" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#5EEAD4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="18" fill="url(#panel)"/>
  <rect x="32" y="28" width="656" height="264" rx="14" fill="#050816" stroke="#1F2937"/>
  <g stroke="#1E293B" stroke-width="1">
    <path d="M32 92H688"/>
    <path d="M32 160H688"/>
    <path d="M32 228H688"/>
    <path d="M184 28V292"/>
    <path d="M360 28V292"/>
    <path d="M536 28V292"/>
  </g>
  <text x="56" y="62" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">EXTERNAL SURFACES</text>
  <text x="302" y="62" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">PLUGIN</text>
  <text x="568" y="62" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">THREAD</text>
  <g>
    <rect x="60" y="104" width="142" height="38" rx="8" fill="#0B1220" stroke="#334155"/>
    <circle cx="82" cy="123" r="8" fill="#38BDF8"/>
    <text x="100" y="128" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Telegram</text>
    <rect x="60" y="152" width="142" height="38" rx="8" fill="#0B1220" stroke="#334155"/>
    <circle cx="82" cy="171" r="8" fill="#A78BFA"/>
    <text x="100" y="176" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Slack</text>
    <rect x="60" y="200" width="142" height="38" rx="8" fill="#0B1220" stroke="#334155"/>
    <circle cx="82" cy="219" r="8" fill="#FBBF24"/>
    <text x="100" y="224" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Custom chat</text>
  </g>
  <path d="M220 170H292" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="304" y="112" width="142" height="112" rx="12" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="333" y="148" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Channel</text>
  <text x="335" y="171" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">plugin</text>
  <path d="M335 196H415" stroke="#5EEAD4" stroke-width="1.4"/>
  <text x="337" y="215" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="11">normalize events</text>
  <path d="M464 170H536" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="548" y="104" width="112" height="38" rx="8" fill="#111827" stroke="#475569"/>
  <text x="579" y="128" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Gateway</text>
  <rect x="548" y="152" width="112" height="38" rx="8" fill="#111827" stroke="#475569"/>
  <text x="604" y="176" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Memory</text>
  <rect x="548" y="200" width="112" height="38" rx="8" fill="#111827" stroke="#475569"/>
  <text x="604" y="224" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Agent thread</text>
</svg>
