<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scale autonomous agents from one worker to coordinated systems</title>
  <desc id="desc">A single autonomous agent grows through custom agents and plugins, multi-thread routing, multi-agent coordination, and local, server, cloud, or fleet environments.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#090A17" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SCALE PATH</text>
  <g>
    <rect x="100" y="114" width="180" height="64" rx="14" fill="#111827" stroke="#475569"/>
    <text x="190" y="151" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">One agent</text>
    <path d="M296 146H374" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="392" y="114" width="196" height="64" rx="14" fill="#17142A" stroke="#A78BFA"/>
    <text x="490" y="151" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Custom agents + plugins</text>
    <path d="M490 190V244" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="374" y="262" width="232" height="64" rx="14" fill="#111827" stroke="#475569"/>
    <text x="490" y="299" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Multi-thread routing</text>
    <path d="M358 294H280" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="84" y="262" width="180" height="64" rx="14" fill="#111827" stroke="#475569"/>
    <text x="174" y="299" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Coordination</text>
    <path d="M622 294H700" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="716" y="244" width="96" height="100" rx="14" fill="#111827" stroke="#475569"/>
    <text x="764" y="286" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Fleet</text>
    <text x="764" y="310" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="11">capacity</text>
  </g>
  <g>
    <rect x="154" y="384" width="126" height="42" rx="10" fill="#0F172A" stroke="#334155"/>
    <rect x="302" y="384" width="126" height="42" rx="10" fill="#0F172A" stroke="#334155"/>
    <rect x="450" y="384" width="126" height="42" rx="10" fill="#0F172A" stroke="#334155"/>
    <rect x="598" y="384" width="126" height="42" rx="10" fill="#0F172A" stroke="#334155"/>
    <text x="217" y="410" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">local</text>
    <text x="365" y="410" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">server</text>
    <text x="513" y="410" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">cloud</text>
    <text x="661" y="410" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">fleet</text>
  </g>
</svg>
