<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scale local CLI or desktop work into Cloud</title>
  <desc id="desc">A local CLI or desktop session hands off context and run state to Cloud for longer runs, remote capacity, and team visibility.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#5EEAD4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#07111A" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">LOCAL TO CLOUD</text>
  <rect x="68" y="112" width="120" height="94" rx="13" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="128" y="151" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">CLI / Editor</text>
  <text x="128" y="176" text-anchor="middle" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="11">local context</text>
  <path d="M206 159H292" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="88" width="152" height="142" rx="14" fill="#111827" stroke="#475569"/>
  <text x="386" y="124" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Codebolt Cloud</text>
  <text x="386" y="154" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">remote capacity</text>
  <text x="386" y="178" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">longer runs</text>
  <text x="386" y="202" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">team visibility</text>
  <path d="M386 230V256" stroke="#5EEAD4" stroke-width="1.8"/>
  <rect x="322" y="256" width="128" height="30" rx="7" fill="#0B1220" stroke="#334155"/>
  <text x="386" y="276" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">same run state</text>
</svg>
