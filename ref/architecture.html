<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0B0C10;padding:36px;display:flex;justify-content:center}
  svg{max-width:1240px;width:100%;height:auto}
  .t-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;fill:#ECEEF2}
  .t-mono{font-family:"IBM Plex Mono",monospace;fill:#969BA8}
  .t-monos{font-family:"IBM Plex Mono",monospace;fill:#FFB23E}
  .t-faint{font-family:"IBM Plex Mono",monospace;fill:#5E626D}
  .t-tile{font-family:"Bricolage Grotesque",sans-serif;font-weight:600;fill:#ECEEF2}
  .t-tiled{font-family:"IBM Plex Mono",monospace;fill:#7E8AA8}
</style>
</head>
<body>
<svg viewBox="0 0 1240 996" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="rtFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB23E" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFB23E" stop-opacity="0.015"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#5E626D" stroke-width="1.4"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#FFB23E" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- ===== TITLE ===== -->
  <text x="60" y="40" class="t-monos" font-size="12.5" letter-spacing="3">CODEBOLT · SYSTEM ARCHITECTURE</text>
  <text x="60" y="74" class="t-title" font-size="26">You author agents &amp; plugins. The runtime runs everything else.</text>

  <!-- ===== SURFACES (top) ===== -->
  <text x="60" y="110" class="t-faint" font-size="11.5" letter-spacing="2">ACCESS · SURFACES — CONNECTED TO THE RUNTIME</text>
  <rect x="60" y="120" width="1120" height="76" rx="12" fill="#101218" stroke="#21252F"/>
  <g>
    <rect x="88" y="140" width="196" height="40" rx="9" fill="#13161D" stroke="#2C313D"/>
    <g stroke="#FFB23E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(110 160)"><rect x="-9" y="-8" width="18" height="16" rx="2.5"/><path d="M-5 -3 l3 3 l-3 3"/><path d="M0 4 h4"/></g>
    <text x="130" y="165" class="t-tile" font-size="14">Terminal / CLI</text>
    <rect x="304" y="140" width="196" height="40" rx="9" fill="#13161D" stroke="#2C313D"/>
    <g stroke="#FFB23E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(326 160)"><circle cx="0" cy="0" r="9"/><path d="M-9 0 h18 M0 -9 a13 13 0 0 1 0 18 a13 13 0 0 1 0 -18"/></g>
    <text x="346" y="165" class="t-tile" font-size="14">Web UI</text>
    <rect x="520" y="140" width="196" height="40" rx="9" fill="#13161D" stroke="#2C313D"/>
    <g stroke="#FFB23E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(542 160)"><rect x="-9" y="-8" width="18" height="16" rx="2.5"/><path d="M-9 -2 h18"/></g>
    <text x="562" y="165" class="t-tile" font-size="14">Desktop App</text>
    <rect x="736" y="140" width="196" height="40" rx="9" fill="#13161D" stroke="#2C313D"/>
    <g stroke="#FFB23E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(758 160)"><rect x="-6" y="-9" width="12" height="18" rx="2.5"/><path d="M-2 6 h4"/></g>
    <text x="778" y="165" class="t-tile" font-size="14">Mobile</text>
    <rect x="952" y="140" width="196" height="40" rx="9" fill="#13161D" stroke="#2C313D"/>
    <g stroke="#FFB23E" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(974 160)"><path d="M-4 -8 q-4 0 -4 4 q0 3 -3 4 q3 1 3 4 q0 4 4 4"/><path d="M4 -8 q4 0 4 4 q0 3 3 4 q-3 1 -3 4 q0 4 -4 4"/></g>
    <text x="994" y="165" class="t-tile" font-size="14">REST API / SDK</text>
  </g>

  <!-- center connector: surfaces <-> runtime (runs in the gap between agents & plugins) -->
  <line x1="620" y1="196" x2="620" y2="384" stroke="#FFB23E" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M610 206 L620 196 L630 206" fill="none" stroke="#FFB23E" stroke-opacity="0.55" stroke-width="1.4"/>
  <path d="M610 374 L620 384 L630 374" fill="none" stroke="#FFB23E" stroke-opacity="0.55" stroke-width="1.4"/>
  <rect x="556" y="290" width="128" height="20" rx="5" fill="#0B0C10"/>
  <text x="620" y="304" class="t-monos" font-size="10.5" text-anchor="middle" opacity="0.9">surfaces ↔ runtime</text>

  <!-- ===== AUTHORING BAND: AGENTS + PLUGINS ===== -->
  <text x="90" y="226" class="t-faint" font-size="11.5" letter-spacing="2">WHAT YOU AUTHOR · RUNS ON THE RUNTIME</text>

  <!-- AGENTS (dotted = where other tools stop) -->
  <rect x="90" y="236" width="455" height="134" rx="12" fill="#0E1014" stroke="#7E8AA8" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.95"/>
  <text x="112" y="264" class="t-tile" font-size="15">Agents</text>
  <text x="180" y="264" class="t-tiled" font-size="11.5">— run on your message</text>
  <rect x="112" y="278" width="250" height="32" rx="8" fill="#13161D" stroke="#2C313D"/>
  <text x="128" y="299" class="t-tiled" font-size="12">agent: refactor-auth</text>
  <text x="112" y="332" class="t-mono" font-size="12" fill="#969BA8">intent &amp; logic — what you'd write anywhere.</text>
  <text x="112" y="354" class="t-monos" font-size="12">↳ where other coding agents stop.</text>

  <!-- PLUGINS (solid amber = Codebolt-unique, always on) -->
  <rect x="672" y="236" width="478" height="134" rx="12" fill="#14110C" stroke="#FFB23E" stroke-opacity="0.5" stroke-width="1.6"/>
  <text x="694" y="264" class="t-tile" font-size="15">Plugins</text>
  <text x="766" y="264" class="t-monos" font-size="11.5">— run 24/7, always on</text>
  <g font-family="IBM Plex Mono" font-size="11" fill="#7E8AA8">
    <rect x="694" y="278" width="74" height="26" rx="13" fill="#13161D" stroke="#2C313D"/><text x="731" y="295" text-anchor="middle">Telegram</text>
    <rect x="776" y="278" width="58" height="26" rx="13" fill="#13161D" stroke="#2C313D"/><text x="805" y="295" text-anchor="middle">Linear</text>
    <rect x="842" y="278" width="62" height="26" rx="13" fill="#13161D" stroke="#2C313D"/><text x="873" y="295" text-anchor="middle">GitHub</text>
    <rect x="912" y="278" width="52" height="26" rx="13" fill="#13161D" stroke="#2C313D"/><text x="938" y="295" text-anchor="middle">Slack</text>
    <rect x="972" y="278" width="96" height="26" rx="13" fill="#13161D" stroke="#2C313D"/><text x="1020" y="295" text-anchor="middle">+ monitoring</text>
  </g>
  <text x="694" y="332" class="t-mono" font-size="12" fill="#969BA8">code with full system access · connect external systems.</text>
  <text x="694" y="354" class="t-monos" font-size="12">↳ turns the system into a 24/7 factory.</text>

  <!-- arrows authoring -> runtime -->
  <line x1="330" y1="370" x2="330" y2="384" stroke="#5E626D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="910" y1="370" x2="910" y2="384" stroke="#FFB23E" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- left bracket: HANDLED BY THE RUNTIME -->
  <path d="M40 386 L30 386 L30 962 L40 962" fill="none" stroke="#FFB23E" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="20" y="674" class="t-monos" font-size="11.5" letter-spacing="2.5" transform="rotate(-90 20 674)" text-anchor="middle">HANDLED BY THE RUNTIME · YOU NEVER WIRE ANY OF THIS</text>

  <!-- ===== THE RUNTIME ===== -->
  <rect x="60" y="386" width="1120" height="336" rx="16" fill="url(#rtFill)" stroke="#FFB23E" stroke-opacity="0.5" stroke-width="1.8" filter="url(#glow)"/>
  <text x="84" y="420" class="t-monos" font-size="12.5" letter-spacing="2.5">THE CODEBOLT RUNTIME</text>
  <text x="84" y="442" class="t-mono" font-size="13" fill="#B8BCC6">The operating system for coding agents — 500+ systems, from basic file ops to sandboxing, owned here so agents &amp; plugins only do their job.</text>

  <!-- 9 tiles: cols 88/450/812 (w338) rows 462/541/620 (h61) -->
  <g>
    <rect x="88" y="462" width="338" height="61" rx="10" fill="#13161D" stroke="#2C313D"/>
    <text x="104" y="488" class="t-tile" font-size="15">Context Assembly</text>
    <text x="104" y="508" class="t-tiled" font-size="11.5">right context, pushed in — agent never hunts</text>
    <rect x="450" y="462" width="338" height="61" rx="10" fill="#13161D" stroke="#FFB23E" stroke-opacity="0.4"/>
    <text x="466" y="488" class="t-tile" font-size="15">Coordination &amp; Orchestration</text>
    <text x="466" y="508" class="t-tiled" font-size="11.5">stigmergic mesh · n-level · no N² messaging</text>
    <rect x="812" y="462" width="338" height="61" rx="10" fill="#13161D" stroke="#FFB23E" stroke-opacity="0.4"/>
    <text x="828" y="488" class="t-tile" font-size="15">Model Routing</text>
    <text x="828" y="508" class="t-tiled" font-size="11.5">every LLM call brokered here · budget caps</text>

    <rect x="88" y="541" width="338" height="61" rx="10" fill="#13161D" stroke="#FFB23E" stroke-opacity="0.4"/>
    <text x="104" y="567" class="t-tile" font-size="15">Guardrails</text>
    <text x="104" y="587" class="t-tiled" font-size="11.5">immutable invariants — the optimizer can't cross</text>
    <rect x="450" y="541" width="338" height="61" rx="10" fill="#13161D" stroke="#2C313D"/>
    <text x="466" y="567" class="t-tile" font-size="15">Tool Search</text>
    <text x="466" y="587" class="t-tiled" font-size="11.5">500+ systems · read/write files → sandboxing</text>
    <rect x="812" y="541" width="338" height="61" rx="10" fill="#13161D" stroke="#2C313D"/>
    <text x="828" y="567" class="t-tile" font-size="15">Review-Merge</text>
    <text x="828" y="587" class="t-tiled" font-size="11.5">verified handoff between agents &amp; environments</text>

    <rect x="88" y="620" width="338" height="61" rx="10" fill="#13161D" stroke="#2C313D"/>
    <text x="104" y="646" class="t-tile" font-size="15">Narrative Engine</text>
    <text x="104" y="666" class="t-tiled" font-size="11.5">full provenance — every request → file → line</text>
    <rect x="450" y="620" width="338" height="61" rx="10" fill="#13161D" stroke="#2C313D"/>
    <text x="466" y="646" class="t-tile" font-size="15">Observability</text>
    <text x="466" y="666" class="t-tiled" font-size="11.5">see exact context sent to each model · debug</text>
    <rect x="812" y="620" width="338" height="61" rx="10" fill="#13161D" stroke="#FFB23E" stroke-opacity="0.4"/>
    <text x="828" y="646" class="t-tile" font-size="15">Learning Loop · RL</text>
    <text x="828" y="666" class="t-tiled" font-size="11.5">tunes context &amp; policy from outcomes</text>
  </g>

  <!-- also built into the runtime -->
  <g>
    <text x="88" y="700" class="t-faint" font-size="10.5" letter-spacing="1.6">ALSO BUILT IN</text>
    <g font-family="IBM Plex Mono" font-size="10.5" fill="#7E8AA8">
      <rect x="214" y="684" width="94" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="261" y="701" text-anchor="middle">files</text>
      <rect x="316" y="684" width="108" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="370" y="701" text-anchor="middle">terminal</text>
      <rect x="432" y="684" width="104" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="484" y="701" text-anchor="middle">browser</text>
      <rect x="544" y="684" width="124" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="606" y="701" text-anchor="middle">sandboxing</text>
      <rect x="676" y="684" width="132" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="742" y="701" text-anchor="middle">deliberations</text>
      <rect x="816" y="684" width="128" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="880" y="701" text-anchor="middle">review gates</text>
      <rect x="952" y="684" width="112" height="25" rx="12.5" fill="#13161D" stroke="#2C313D"/><text x="1008" y="701" text-anchor="middle">policies</text>
    </g>
  </g>

  <!-- arrows runtime -> environments / models -->
  <line x1="330" y1="722" x2="330" y2="766" stroke="#FFB23E" stroke-width="1.6" marker-end="url(#arrA)"/>
  <text x="342" y="749" class="t-monos" font-size="11.5">orchestrates work across</text>
  <line x1="990" y1="722" x2="990" y2="766" stroke="#FFB23E" stroke-width="1.6" marker-end="url(#arrA)"/>
  <text x="1002" y="749" class="t-monos" font-size="11.5">routes every LLM call through</text>

  <!-- ===== ENVIRONMENTS (bottom-left) ===== -->
  <rect x="60" y="770" width="710" height="176" rx="14" fill="#101218" stroke="#21252F"/>
  <text x="80" y="796" class="t-faint" font-size="11" letter-spacing="1.5">EXECUTION · ENVIRONMENTS — COORDINATED BY THE RUNTIME</text>

  <!-- Self-hosted runners -->
  <rect x="80" y="814" width="205" height="110" rx="10" fill="#13161D" stroke="#2C313D"/>
  <text x="98" y="840" class="t-tile" font-size="13.5">Self-hosted runners</text>
  <text x="98" y="860" class="t-tiled" font-size="10.5">your machine · VPC · CI</text>
  <text x="98" y="876" class="t-tiled" font-size="10.5">direct runtime connection</text>
  <text x="98" y="900" class="t-monos" font-size="10.5">private infra stays yours</text>

  <!-- Self-started remote sandboxes -->
  <rect x="300" y="814" width="205" height="110" rx="10" fill="#13161D" stroke="#FFB23E" stroke-opacity="0.35"/>
  <text x="318" y="840" class="t-tile" font-size="13.5">Self-started sandboxes</text>
  <text x="318" y="860" class="t-tiled" font-size="10.5">remote cloud compute</text>
  <text x="318" y="876" class="t-tiled" font-size="10.5">started by local app</text>
  <text x="318" y="900" class="t-monos" font-size="10.5">reports → local app · privacy</text>

  <!-- Cloud-started remote sandboxes -->
  <rect x="520" y="814" width="220" height="110" rx="10" fill="#13161D" stroke="#2C313D"/>
  <text x="538" y="840" class="t-tile" font-size="13.5">Cloud-started sandboxes</text>
  <text x="538" y="860" class="t-tiled" font-size="10.5">managed remote sandboxes</text>
  <text x="538" y="876" class="t-tiled" font-size="10.5">started by Codebolt Cloud</text>
  <text x="538" y="900" class="t-monos" font-size="10.5">reports → cloud · laptop can close</text>
  <text x="748" y="936" class="t-tiled" font-size="10.5" text-anchor="end">remote sandboxes · self-hosted runners · n-level child envs</text>

  <!-- ===== MODELS (bottom-right) ===== -->
  <rect x="800" y="770" width="380" height="176" rx="14" fill="#101218" stroke="#21252F"/>
  <text x="820" y="796" class="t-faint" font-size="11" letter-spacing="1.5">ANY MODEL — ONLY THROUGH RUNTIME</text>
  <g font-family="IBM Plex Mono" font-size="12" fill="#7E8AA8">
    <rect x="820" y="814" width="72" height="30" rx="15" fill="#13161D" stroke="#2C313D"/><text x="856" y="834" text-anchor="middle">Opus</text>
    <rect x="900" y="814" width="70" height="30" rx="15" fill="#13161D" stroke="#2C313D"/><text x="935" y="834" text-anchor="middle">GPT</text>
    <rect x="978" y="814" width="86" height="30" rx="15" fill="#13161D" stroke="#2C313D"/><text x="1021" y="834" text-anchor="middle">Gemini</text>
    <rect x="1072" y="814" width="72" height="30" rx="15" fill="#13161D" stroke="#2C313D"/><text x="1108" y="834" text-anchor="middle">Fable</text>
  </g>
  <text x="820" y="874" class="t-mono" font-size="12" fill="#B8BCC6">Agents &amp; plugins never call a model directly.</text>
  <text x="820" y="892" class="t-mono" font-size="12" fill="#B8BCC6">Every call is brokered, routed &amp; logged.</text>
  <text x="820" y="918" class="t-faint" font-size="11.5">swap models underneath · workflows keep running</text>
</svg>
</body>
</html>
