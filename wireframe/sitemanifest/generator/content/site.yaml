      - type: structure-diagram
        kicker: "AGENT RUNTIME"
        title: "AGENT EXECUTION MODEL — ACTOR OWNERSHIP"
        subtitle: "each actor: owns · reads · writes · hands off · emits"
        sections:
          - number: "1"
            label: "CONTROL PLANE"
            meta: "incoming work becomes scheduled execution"
            columns: 2
            cards:
              - title: "Socket Router"
                subtitle: "single WS endpoint · URL-based dispatch"
                accent: "cyan"
                body:
                  - heading: "OWNS"
                    items:
                      - "Parse URL path → select socket handler"
                      - "Maintain connection pool per handler"
                  - heading: "READS"
                    items:
                      - "Incoming WS frames · connection metadata"
                  - heading: "WRITES"
                    items:
                      - { type: "ref", text: "handler.onMessage", suffix: "— dispatched events" }
                  - heading: "HANDOFF"
                    items:
                      - "Message Router → CLI Handler"
              - title: "Agent Service"
                subtitle: "lifecycle + marketplace sync"
                accent: "cyan"
                body:
                  - heading: "OWNS"
                    items:
                      - "Agent discovery, caching, spawn"
                      - "YAML config parsing (remix agents)"
                      - "Agent instance tracking"
                  - heading: "READS"
                    items:
                      - "marketplaceAgentStore · local .codebolt/agents/"
                  - heading: "WRITES"
                    items:
                      - { type: "ref", text: "AgentProcessManager", suffix: "— spawn instruction" }
                  - heading: "HANDOFF"
                    items:
                      - "Agent connects via codeboltjs WebSocket"
          - number: "2"
            label: "EXECUTION PLANE"
            meta: "agent runs · tools execute · responses stream"
            columns: 2
            cards:
              - title: "Agent Process"
                subtitle: "child process · codeboltjs SDK"
                accent: "emerald"
                body:
                  - heading: "OWNS"
                    items:
                      - "Agent logic execution (user code)"
                      - "Tool selection · decision loop"
                      - "Context management per turn"
                  - heading: "READS"
                    items:
                      - "Messages via codebolt.onMessage()"
                      - "63+ SDK modules (fs, git, llm, ...)"
                  - heading: "WRITES"
                    items:
                      - { type: "ref", text: "tool_executions", suffix: "— every tool call" }
                      - { type: "ref", text: "session_messages", suffix: "— assistant output" }
                  - heading: "EMITS"
                    items:
                      - { type: "ref", text: "tool.called", badge: "event" }
                      - { type: "ref", text: "tool.completed", badge: "event" }
              - title: "Tool Executor"
                subtitle: "executeToolService.ts"
                accent: "emerald"
                body:
                  - heading: "OWNS"
                    items:
                      - "Tool resolution against registry"
                      - "Parameter validation + binding"
                      - "Subprocess/PTY/API dispatch"
                  - heading: "READS"
                    items:
                      - "capabilityRegistry · runtime policy"
                      - "MCP-backed tool config"
                  - heading: "WRITES"
                    items:
                      - { type: "ref", text: "items", suffix: "— function_call outputs" }
                      - { type: "ref", text: "tool_executions", suffix: "— call history" }
                  - heading: "HANDOFF"
                    items:
                      - "Results → Agent Process next turn"
          - number: "3"
            label: "SIDE EFFECTS"
            meta: "events fan out after execution"
            columns: 2
            cards:
              - title: "Notification Handlers"
                subtitle: "17 domain-specific handlers"
                accent: "purple"
                body:
                  - heading: "OWNS"
                    items:
                      - "Broadcast events to UI clients"
                      - "Forward to subscribed plugins"
                      - "Persist to event log"
                  - heading: "EMITS"
                    items:
                      - "UI WebSocket stream (realtime)"
                      - "Plugin observers (execution gateway)"
                      - "Chat notifications · system alerts"
              - title: "Execution Gateway"
                subtitle: "pluginLib/executionGatewayHandler.ts"
                accent: "purple"
                body:
                  - heading: "OWNS"
                    items:
                      - "Wrap agent execution with plugin hooks"
                      - "Claims system — per-operation permissions"
                  - heading: "ENABLES"
                    items:
                      - "Plugins observe/modify agent operations"
                      - "Audit trail of every execution"
                      - "Cross-environment proxy execution"
        distinctions:
          - label: "DISTINCTION"
            text: "Agents are child processes — not in-server threads. They connect via WebSocket, giving them identical capabilities whether local or remote."
          - label: "DISTINCTION"
            text: "The execution gateway is plugin-based, not hardcoded. Any plugin can claim it to intercept agent operations — enabling proxy execution across environments."

