                      - { type: "numbered", text: "Merge — dedupe + normalize" }
                      - { type: "numbered", text: "Contribute — section placement" }
                      - { type: "numbered", text: "Budget — token limits" }
                      - { type: "numbered", text: "Return — assembled context" }
                  - heading: "TRACE"
                    items:
                      - "Every decision logged for audit"
              - title: "Context Rule Engine"
                subtitle: "contextRuleEngineService.ts"
                accent: "amber"
                body:
                  - heading: "RULE STORAGE"
                    items:
                      - { type: "ref", text: ".codebolt/rules/{rule-id}.json" }
                  - heading: "OPERATORS"
                    items:
                      - "eq · ne · in · contains"
                      - "startsWith · endsWith · regex"
                  - heading: "SCOPE VARS"
                    items:
                      - "Evaluated against runtime context"
                      - "Determines which memories to retrieve"
        stateRail:
          label: "MEMORY STATE — WHERE KNOWLEDGE LIVES"
          columns: 5
          items:
            - { name: "episodic/*.json", desc: "event logs" }
            - { name: "persistent_memory/*.json", desc: "definitions + schemas" }
            - { name: "rules/*.json", desc: "context rules" }
            - { name: "vectorDb", desc: "embeddings + search" }
            - { name: "eventLogDb", desc: "execution trace" }
        distinctions:
          - label: "DISTINCTION"
            text: "Episodic ≠ persistent. Episodic is raw append-only observation; persistent is curated, schema-validated knowledge."
          - label: "DISTINCTION"
            text: "The Context Assembly Engine is the only component the agent talks to. It decides what to remember and when — not the agent."

