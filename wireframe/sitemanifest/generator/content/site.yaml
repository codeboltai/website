          alt: "Codebolt Cloud portal for agents, sandboxes, automations, usage, and registries"

      - type: centered-text
        variant: "thesis"
        text: "Codebolt Cloud lets you start in the browser, CLI, or desktop app and scale into managed or bring-your-own sandboxes. Run cloud agents, connect local Codebolt instances, schedule goals, monitor usage, and manage public or private plugin and template registries from one portal."

      - type: bento-grid
        kicker: "CLOUD CAPABILITIES"
        heading: "Run and manage agents across every environment"
        description: "Cloud is not just a hosted editor. It is the shared control plane for launching, routing, supervising, and scaling Codebolt work."
        columns: 3
        gap: "none"
        items:
          - title: "Bring your own sandboxes"
            tag: "Sandboxes"
            description: "Run cloud agents in managed or self-owned sandboxes such as <a href='https://docs.codebolt.ai/docs/04_build-on-codebolt/08a_multi-environment-orchestration/01_overview'>E2B, Daytona, Docker, worktrees, remote servers, or custom providers</a>. Start sandboxes from the portal UI, API calls, webhooks, or automations."
            span: 2
            visual: |
              portal / api / automation
                       │
                       ▼
              environment provider
              ├─ E2B sandbox
              ├─ Daytona workspace
              ├─ Docker container
              ├─ git worktree
              └─ remote Codebolt server
          - title: "Scale from CLI or Desktop"
            tag: "Handoff"
            description: "Start local in the <a href='/products/cli'>CLI</a> or <a href='/products/editor'>Editor</a>, then scale the same work into Cloud when you need longer runs, remote capacity, team visibility, or scheduled execution."
          - title: "Connect local instances"
            tag: "Local + Cloud"
            description: "Use the cloud plugin to connect local Codebolt instances to Cloud, manage local sessions from the portal, and hand work off between local and cloud runtimes without losing context."
          - title: "Automations and goals"
            tag: "Always-on"
            description: "Define goals, scheduled runs, webhook triggers, and API-triggered jobs so agents can operate on a cadence instead of waiting for a human to open a prompt."
          - title: "Backend agents for native apps"
            tag: "App backend"
            description: "Use Cloud agents as scalable backend workers for Codebolt-native applications. Apps can invoke agents directly through the API and let Cloud handle routing, sandboxing, execution, and run state."

      - type: feature-block
        kicker: "01 · SANDBOX AGENTS"
        heading: "Start cloud agents in the sandbox you choose"
        body: "Codebolt Cloud can launch agent work into provider-backed environments instead of forcing everything into one hosted runtime. Use Codebolt-managed sandboxes, connect your own E2B or Daytona accounts, route work to Docker or worktree environments, or build a custom provider for your infrastructure. The portal, API, and automations all talk to the same environment model."
        cta: { label: "Read environment orchestration docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/08a_multi-environment-orchestration/01_overview" }
        image: "/images/Start_cloud_agents_in_the_sandbox.gif"
        imageAlt: "Codebolt Cloud starting agents in provider-backed sandbox environments"

      - type: feature-block
        kicker: "02 · LOCAL HANDOFF"
        heading: "Manage local Codebolt sessions from Cloud"
        body: "Cloud can connect to local Codebolt instances through the cloud plugin. That gives you a shared portal for local sessions, cloud sessions, and handoffs between them. You can begin in the desktop app or CLI, promote a run to cloud infrastructure, or keep a local machine as an environment Cloud can coordinate."
        reverse: true
        image: "/images/control_local_from_cloud.gif"
        imageAlt: "Codebolt Cloud portal managing and coordinating local Codebolt sessions remotely"

      - type: feature-block
        kicker: "03 · AUTOMATIONS"
        heading: "Turn prompts into scheduled goals"
        body: "Cloud agents do not have to start from a person typing in a chat box. Define recurring goals, cron-style schedules, webhook triggers, or API-triggered jobs. Agents can triage issues, run maintenance, generate reports, watch repos, check deployments, or execute business workflows on a schedule."
        image: "/images/Turn_prompts_into_scheduled_goals.gif"
        imageAlt: "Codebolt Cloud turning prompts into scheduled automation goals"

      - type: feature-block
        kicker: "04 · APP BACKENDS"
        heading: "Use Cloud agents as the backend for Codebolt-native applications"
        body: "Codebolt-native applications do not need to run every agent inside the user's local editor session. They can call the Cloud API, start the right agent in the right sandbox, stream status back to the application UI, and scale invocations independently from the frontend. The application owns the workflow; Codebolt Cloud supplies the agent runtime, provider routing, environment lifecycle, memory, logs, and execution state."
        reverse: true
        cta: { label: "Read custom agentic apps", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/04b_custom-agentic-applications/01_overview" }
        diagram: |
          Codebolt-native app
              │
              ├─ frontend / dynamic panel
              ├─ plugin or app backend
              │
              ▼ API
          Codebolt Cloud agents
              ├─ route to provider
              ├─ start sandbox
              ├─ run agent workflow
              ├─ stream events
              └─ persist run state

          app UX scales separately
          agent execution scales in Cloud

      - type: feature-block
        kicker: "05 · OPERATIONS"
        heading: "Track usage, cost, and runtime activity"
        body: "When agents run across local machines, cloud sandboxes, API jobs, and scheduled automations, visibility matters. Codebolt Cloud gives teams a central place to track run history, usage, costs, token consumption, environment activity, and operational status across the whole agent fleet."
        diagram: |
          Usage dashboard
              ├─ agent runs
              ├─ tokens + model cost
              ├─ sandbox runtime
              ├─ local/cloud activity
              ├─ failures + retries
              └─ team/project views

      - type: feature-block
        kicker: "06 · REGISTRY"
        heading: "Manage public and private marketplaces"
        body: "Cloud also acts as the registry layer for your agent ecosystem. Publish and install agents, plugins, MCP servers, templates, and reusable packages. Keep some public, keep internal ones private, mirror approved marketplace entries, and give teams a controlled catalog instead of unmanaged scripts."
        cta: { label: "Read marketplace docs", href: "https://docs.codebolt.ai/docs/02_using-codebolt/04_agents/04_the-marketplace" }
        diagram: |
          Codebolt registry
              ├─ public marketplace
              ├─ private org registry
              ├─ agents
              ├─ plugins
              ├─ MCP servers
              └─ templates

          approved tools, reusable workflows,
          and team-specific packages

      - type: cta-block
        heading: "Start local. Scale through Cloud when the work grows."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Explore the Engine", href: "/engine", variant: "secondary" }

  # ── Product: SDK ───────────────────────────
  - slug: "products/sdk"
    title: "Codebolt SDK — Build, Extend, and Scale on the Engine"
    sections:

      - type: page-header
        eyebrow: "CODEBOLT SDK"
        title: "The SDK layer for scalable agent software"
        subtitle: "Build custom agents, custom clients, plugins, providers, and Codebolt-native applications on top of the same engine that powers the Editor, CLI, Cloud, and autonomous agents."
        buttons:
          - { label: "Read SDK Docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/01_overview", variant: "primary" }
          - { label: "Codebolt Native Apps", href: "/engine/codebolt-native-applications", variant: "secondary" }
        pills:
          - "Agent SDK"
          - "Client SDK"
          - "Plugin SDK"
          - "Provider SDK"

      - type: centered-text
        variant: "thesis"
        text: "The SDK is the scalability layer of Codebolt. Use the Agent SDK and agent framework to control agent behavior, the Client SDK to build custom interfaces and integrate other applications, the Plugin SDK to extend the engine, and the Provider SDK to connect agent execution across platforms and environments."

      - type: bento-grid
        kicker: "SDK LAYERS"
        heading: "Build at every layer of the engine"
        description: "Codebolt is not just an app with an API. It exposes the layers you need to create agents, build interfaces, extend runtime behavior, connect external systems, and scale execution."
        columns: 4
        gap: "none"
        items:
          - title: "Agent SDK"
            tag: "codeboltjs"
            description: "Use <a href='https://docs.codebolt.ai/docs/05_reference/02_codeboltjs/01_intro'>codeboltjs</a> to create custom agents with direct access to files, git, terminal, browser, LLMs, memory, tasks, dynamic panels, environments, evals, and engine APIs."
            span: 2
            visual: |
              custom agent
              ├─ codebolt.fs / git / terminal
              ├─ codebolt.llm / browser / mcp
              ├─ memory + knowledge
              ├─ tasks + jobs + plans
              └─ dynamic panels + environments
          - title: "Agent framework"
            tag: "@codebolt/agent"
            description: "Build agents like you would with LangChain, Mastra, or other frameworks, but Codebolt-aware. Compose tools, workflows, processors, message modifiers, compaction, and execution control for agents tailored to your workflow."
          - title: "Client SDK"
            tag: "Custom clients"
            description: "Use the <a href='/engine/codebolt-native-applications'>Client SDK</a> to build custom web apps, internal tools, dashboards, vertical IDEs, mobile surfaces, or product integrations that talk to Codebolt over REST and WebSocket APIs."
          - title: "Plugin SDK"
            tag: "Runtime extension"
            description: "Use the <a href='https://docs.codebolt.ai/docs/04_build-on-codebolt/05_plugins/01_overview'>Plugin SDK</a> to add backend capabilities, commands, routes, hooks, dynamic panels, provider integrations, marketplace packages, and app-specific runtime logic."
          - title: "Provider SDK"
            tag: "Agent routing"
            description: "Create custom agent providers and execution bridges so Codebolt can chain agent connections across platforms, environments, remote servers, and specialized runtimes."
          - title: "Native applications"
            tag: "Composable"
            description: "Combine SDK layers to create <a href='/engine/codebolt-native-applications'>Codebolt-native applications</a>: a custom app UI, plugin backend, custom agents, provider routing, and cloud or self-hosted execution on the same engine."

      - type: feature-block
        kicker: "01 · AGENT SDK"
        heading: "Create custom agents tailored to your workflow"
        body: "Codebolt lets teams build agents the way they build software: with code, modules, tools, workflows, and explicit control over the agent loop. The codeboltjs Agent SDK gives agents direct access to Codebolt engine capabilities, while the @codebolt/agent framework provides a higher-level interface for tools, workflows, reusable processor pieces, message modifiers, loop detection, and conversation compaction. Use it when a generic prompt is not enough and the agent needs to follow your product, team, or domain workflow."
        cta: { label: "Read codeboltjs docs", href: "https://docs.codebolt.ai/docs/05_reference/02_codeboltjs/01_intro" }
        diagram: |
          Agent SDK + framework
          ├─ system prompt + instructions
          ├─ allowed tools
          ├─ message modifiers
          ├─ pre/post inference processors
          ├─ pre/post tool processors
          ├─ workflows
          ├─ compaction
          └─ Codebolt engine modules

          custom agent behavior
          without leaving the engine

      - type: feature-block
        kicker: "02 · CLIENT SDK"
        heading: "Build your own interfaces and integrations"
        body: "The Editor and CLI are clients of the engine. With the Client SDK, your application can be one too. Build a custom UI, vertical workspace, internal operations console, product-specific dashboard, or integration from another application. The client layer can call Codebolt APIs, subscribe to real-time sockets, manage threads, tasks, jobs, agents, environments, memory, git, files, and application state."
        reverse: true
        cta: { label: "Explore native apps", href: "/engine/codebolt-native-applications" }
        diagram: |
          your application
              │ REST + WebSocket
              ▼
          Codebolt Client SDK
              │
              ├─ chat + threads
              ├─ agents + tasks + jobs
              ├─ files + git + terminal
              ├─ memory + knowledge
              ├─ environments + providers
              └─ application state

          custom interface
          same engine

      - type: feature-block
        kicker: "03 · PLUGIN SDK"
        heading: "Extend the runtime, not just the UI"
        body: "Plugins let you add capabilities inside the Codebolt engine itself. A plugin can expose routes, connect to external APIs, register hooks, open dynamic panels, mediate application requests, push live events, add provider behavior, and serve as the backend for a Codebolt-native application. That means your product logic can live close to agents, memory, tasks, environments, and execution rather than in a disconnected service."
        cta: { label: "Read plugin docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/05_plugins/01_overview" }
        diagram: |
          plugin runtime
          ├─ lifecycle: onStart / onStop
          ├─ HTTP-style routes
          ├─ WebSocket + multiplexed events
          ├─ hooks + commands
          ├─ dynamic panels
          ├─ external API adapters
          └─ engine API access

          plugins become backend
          capabilities for apps and agents

      - type: feature-block
        kicker: "04 · PROVIDER SDK"
        heading: "Route agent execution across platforms"
        body: "The provider layer lets Codebolt connect to execution sources beyond one local runtime. Build custom providers to bridge agent connections across platforms, environments, remote machines, cloud sandboxes, or specialized agent systems. This is how the SDK story becomes a scaling story: agent work can move through the right provider instead of being trapped inside one client or one machine."
        reverse: true
        cta: { label: "Read provider commands", href: "https://docs.codebolt.ai/docs/02_using-codebolt/02_surfaces/03_cli/04_provider-commands" }
        diagram: |
          Codebolt runtime
              │ execution request
              ▼
          provider layer
              ├─ local engine
              ├─ remote Codebolt server
              ├─ cloud sandbox
              ├─ custom agent platform
              └─ specialized runtime

          one agent graph
          many execution backends

      - type: feature-block
        kicker: "05 · CODEBOLT-NATIVE APPS"
        heading: "Combine SDKs into full applications"
        body: "The real power appears when the SDK layers are used together. Use the Agent SDK to control the agent flow, the Plugin SDK to provide backend application logic, the Client SDK to create the interface, and the Provider SDK to route execution across environments. The result is a Codebolt-native application: software that uses the Codebolt engine as its backend instead of rebuilding agents, plugins, memory, tasks, orchestration, and scaling from scratch."
        cta: { label: "Open native applications page", href: "/engine/codebolt-native-applications" }
        diagram: |
          Codebolt-native application
          ├─ Client SDK: custom UI / product
          ├─ Plugin SDK: backend logic
          ├─ Agent SDK: workflow agents
          ├─ Provider SDK: execution routing
          └─ Codebolt engine
              ├─ memory + tasks + jobs
              ├─ plugins + tools + MCP
              ├─ environments + cloud
              └─ observability + evals

      - type: bento-grid
        kicker: "WHAT YOU CAN BUILD"
        heading: "The SDK is for scaling beyond the default surfaces"
        description: "Use SDKs when you need something more specific than a stock editor, one terminal session, or one hosted agent."
        columns: 3
        gap: "none"
        items:
          - title: "Workflow-specific agents"
            tag: "Agents"
            description: "Create agents for code review, migration, compliance, support, research, release management, data labeling, product planning, or any domain workflow."
          - title: "Custom product interfaces"
            tag: "Clients"
            description: "Build your own UI on top of Codebolt: dashboards, vertical IDEs, internal portals, mobile apps, customer-facing tools, or embedded product surfaces."
          - title: "Engine extensions"
