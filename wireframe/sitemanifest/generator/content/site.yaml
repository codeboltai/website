          - { label: "EXTENSIBILITY", value: "170+" }

      - type: quote-block
        variant: "muted"
        align: "center"
        quote: "Every tool is scoped by environment capabilities. allTools vs allSearchableTools — ~30 tools are actively given to the LLM per turn while 600+ are discoverable via ToolSearchEngine. Same SDK at every scale: codebolt.fs.readFile works identically in a CLI script, an IDE agent, a Docker sandbox, or a remote cloud environment."
        attribution: "Tool Registry · Design Notes"

      - type: diagram-section
        heading: "The Engine Stack"
        layers:
          - { label: "Interface Layer — IDE, TUI, CLI, Web", tag: "surface", style: "surface" }
          - { label: "Communication Layer — Agent, Plugin, Client SDKs", tag: "runtime", style: "runtime" }
          - { label: "Coordination Layer — Stigmergy, Deliberation, Pheromones", tag: "coordination", style: "drift" }
          - { label: "Intelligence Layer — Drift Engine, Narrative Versioning (Rust)", tag: "intelligence", style: "versioning" }
          - { label: "Infrastructure Layer — Governance, Environments, Providers", tag: "core", style: "governance" }
        annotation: "Other tools are Layer 1-2. Agent frameworks are Layer 2 only. Codebolt is all five."

      - type: accordion
        heading: "Engine Architecture"
        items:
          - question: "Three Communication Channels"
            answer: "The Agent Channel (codeboltjs) lets external agents connect as child processes with 63+ API modules. The Plugin Channel (plugin SDK) provides WebSocket actions, multiplexed events, and HTTP REST — enabling applications to run inside the engine without separate agent instances. The Client Channel (client SDK) connects UIs with 72 REST modules and 33 WebSocket modules. Agents do work. Plugins connect the engine to the world. Clients give you control."
          - question: "HostBridge: Run Anywhere"
            answer: "The engine never calls platform APIs directly. It defines a HostBridge interface for process spawning, SQLite, Kuzu graph DB, and ONNX inference. Each runtime implements its own bridge: Electron uses UtilityProcess and TypeORM, CLI uses child_process and better-sqlite3, TUI connects via WebSocket proxy. One codebase powers desktop IDE, CLI, headless server, and TUI with identical capabilities."
          - question: "The Provider/Environment System"
            answer: "Providers manage compute environments. The Docker provider creates containers running a dockerserver that connects back to the main instance. Each environment has a full lifecycle (CREATED → RUNNING → STOPPED) with heartbeat monitoring. The Narrative Engine snapshots state per-environment, and git bundles transfer state between them. This enables hierarchical setups where one Codebolt instance orchestrates many others."
          - question: "Agent Lifecycle"
            answer: "Agents are discovered from a marketplace, cached locally, and spawned as child processes. They connect via codeboltjs, call waitForReady(), then handle messages and invoke 63+ API modules. Agents can spawn child agents, participate in swarms, join deliberation councils, create review-merge requests, and manage environments — all through the SDK."
          - question: "Plugin Lifecycle"
            answer: "Plugins are discovered from project .codeboltPlugins/ and global ~/.codebolt/plugins/. Each declares itself in package.json with a codebolt.plugin key. The PluginProcessManager handles lifecycle and trigger-based auto-start. Plugins can do anything agents can, plus subscribe to real-time events and make HTTP API calls. They run inside the engine — no separate instance needed."

      - type: accordion
        heading: "Research Foundations"
        items:
          - question: "Stigmergy-Based Coordination"
            answer: "Agents communicate indirectly through structured shared state instead of direct message passing. Each agent reads from and writes to a shared environment, allowing coordination to emerge without explicit messaging. This is how biological swarms scale to millions — and how Codebolt scales beyond message-passing architectures."
          - question: "Pheromone-Based Task Ownership"
            answer: "Agents deposit pheromones on tasks and files to signal interest and ownership. Configurable pheromone types. Aggregation system for conflict resolution. Lock/unlock mechanisms for exclusive access. This prevents coordination breakdown when agents independently target the same work."
          - question: "The Narrative Engine (Rust)"
            answer: "A Rust-based flight recorder with shadow git for snapshot versioning. Narrative hierarchy: Objective → Thread → Agent Run → Snapshot. Per-thread commit branches. Git bundles for cross-environment transfer. Full execution trace system. Every change carries its narrative — the intent behind it, not just the diff."
          - question: "Drift Tracking"
            answer: "Two-level architecture. Local Rust engine instances assess structural, scope, constraint, and coverage drift within individual agent contexts. The global JavaScript layer aggregates signals across all agents, detecting systemic drift that no single agent would catch."
          - question: "Agent Deliberation Council"
            answer: "Structured deliberations: propose options, respond, vote, reach consensus. Types: decision, review, brainstorm, approval, vote. All stored per-project and fully traceable. Agents make architectural decisions collectively, not by one agent guessing."

