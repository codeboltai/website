              Agent A ──┐
              Agent B ──┤ Environment
              Agent C ──┘ (coordinated)
          - title: "Drift Tracking"
            body: "The system evaluates structural, scope, and coverage drift continuously. When agents deviate from intent, you know before the damage compounds."
