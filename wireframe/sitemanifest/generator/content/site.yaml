      - type: accordion
        heading: "FAQ"
        items:
          - question: "How is Codebolt different from Claude Code?"
            answer: "Claude Code is an agent — a great one. You use it. But you can't customize the agentic loop, run multiple agents, or build applications on top of it. Codebolt is the engine that can do what Claude Code does AND scale to multi-agent orchestration, personal agents, and autonomous companies. Start the same way, grow far beyond."
          - question: "How is Codebolt different from Cursor?"
            answer: "Cursor is an IDE with built-in AI agents. Great editor, fixed agents. Codebolt is an engine with a built-in IDE — plus CLI, TUI, and headless modes. You write custom agents, install plugins, and scale to multi-agent. Same quality editor (Monaco), far more flexibility."
          - question: "How is Codebolt different from OpenClaw?"
            answer: "OpenClaw is a personal AI assistant — it manages your inbox, calendar, and daily tasks. Codebolt can do the same thing (run 24/7 with persistent memory and plugins), but the engine also scales to multi-agent orchestration, team coordination, and autonomous companies. OpenClaw is one format. Codebolt is the engine that powers every format."
          - question: "How is Codebolt different from Paperclip?"
            answer: "Paperclip orchestrates agents but doesn't run them — you still need Claude Code, OpenClaw, Cursor, etc. as the actual agents. Codebolt IS the engine. It runs agents AND orchestrates them. One system instead of five tools stitched together."
          - question: "How is Codebolt different from Hermes Agent?"
            answer: "Hermes is a self-improving personal agent by Nous Research — great learning loop and multi-platform messaging. Codebolt can do the same (persistent memory, plugins, always-on), but the engine also scales to multi-agent orchestration and autonomous companies. Hermes is one agent. Codebolt is the engine that can run hundreds."
          - question: "How is Codebolt different from Letta?"
            answer: "Letta is a stateful agent platform — memory-first agents that persist across sessions. Codebolt has the same (3-tier memory, context assembly), plus multi-agent coordination, plugin system, multi-environment scaling, and multiple interface formats (CLI, IDE, TUI, Web). Letta is a great memory system. Codebolt is a complete engine."
          - question: "How is Codebolt different from LangChain or CrewAI?"
            answer: "LangChain and CrewAI are libraries — you import them into your code. Codebolt is a complete engine — IDE, execution environment, coordination system, and infrastructure. Frameworks give you tools to build agents. Codebolt gives them a place to run, coordinate, and scale."
          - question: "I'm using one agent today. Is this for me?"
            answer: "Yes. Start with the CLI and one agent. You get more power than any free coding tool because you control the agent loop, not just the prompt. When you're ready for more, the engine scales with you."
          - question: "Can I run this headless in CI/CD?"
            answer: "Yes. The CLI runs in headless server mode. Spawn environments, run agents, transfer state, monitor progress — all without a GUI."
          - question: "Which AI models does Codebolt support?"
            answer: "All of them. 17+ cloud providers (OpenAI, Anthropic, Google, Mistral, Groq, DeepSeek, etc.) plus local models via Ollama and LM Studio. Per-agent and per-task model selection."

