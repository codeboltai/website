pages:

  # ── Homepage ────────────────────────────────
  - slug: ""
    title: "Codebolt — The Most Powerful Agent Engine Ever Built"
    navbar_variant: "transparent"
    sections:

      - type: hero
        heading: "The Most Powerful Agent Engine Ever Built"
        subheading: "One engine that can be a coding CLI, an IDE, a personal agent, a large-scale orchestration system, or the infrastructure for an autonomous company. Start simple. Scale without limits."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "See the Engine", href: "/engine", variant: "secondary" }

      - type: highlight-banner
        tone: "accent"
        content: |
          Start like Claude Code. Scale like nothing else exists. <span class="text-primary">One engine. Every scale.</span>

      - type: stat-grid
        tone: "muted"
        columns: 4
        stats:
          - { label: "SDK Modules", value: "63+" }
          - { label: "LLM Providers", value: "17+" }
          - { label: "Communication Channels", value: "3" }
          - { label: "Environments", value: "Unlimited" }

      - type: centered-text
        variant: "thesis"
        text: "Claude Code is an agent. OpenClaw is an assistant. Cursor is an editor. Codebolt is the engine that can become any of them — and scale beyond all of them."

      # ── Codebolt in Multiple Formats ──
      - type: card-grid
        heading: "One Engine. Every Format."
        columns: 2
        cards:
          - title: "Codebolt as CLI"
            body: "A coding agent in your terminal. Like Claude Code, but with a 63-module SDK, any LLM provider, and the ability to spawn environments, run plugins, and scale to multi-agent when you're ready. Start here."
            visual: |
              $ codebolt --agent my-agent
              $ codebolt --prompt "refactor auth"
              $ codebolt --server (headless)
          - title: "Codebolt as IDE"
            body: "A full desktop IDE with Monaco editor, integrated terminal, file explorer, and agent workspace. Like Cursor, but you control the agents. Write custom agents. Install plugins. Coordinate multiple agents on the same codebase."
            visual: |
              Electron + Monaco Editor
              Agent panel + Terminal
              Plugin system + TUI sidebar
          - title: "Codebolt as Personal Agent"
            body: "A 24/7 agent with persistent memory, plugin integrations, and proactive capabilities. Like OpenClaw, but running on a platform with 63+ SDK modules, multi-environment support, and a plugin system that connects to everything."
            visual: |
              Persistent memory (3-tier)
              Plugin integrations
              Proactive scheduling
              Always running, always learning
          - title: "Codebolt as Orchestration Engine"
            body: "Run 50-100+ agents across Docker, cloud, and hierarchical environments. Stigmergy-based coordination, agent deliberation councils, automatic review and merge, drift tracking. The infrastructure for autonomous companies."
            visual: |
              50+ agents → coordinated
              Multi-environment scaling
              Auto review & merge
              Drift tracking + guardrails

      - type: quote-block
        variant: "muted"
        align: "center"
        quote: "The same engine that powers a simple coding CLI also powers a 100-agent autonomous company. Everything you build — agents, plugins, memory, workflows — carries forward as you scale."
        attribution: "Codebolt Engineering"

      # ── About the Engine ──
      - type: centered-text
        variant: "identity"
        text: "About the Engine"

      - type: feature-block
        heading: "Scales from one agent to an autonomous company"
        body: "Codebolt is an advanced agent execution engine that scales from running a single coding agent to orchestrating hundreds of agents across multiple systems. It is more extensible than any other system in the market — giving you complete control over agents and their execution. It incorporates stigmergy-based coordination, narrative management, drift tracking, and swarm intelligence to handle 100+ agents running across multiple environments simultaneously."
        diagram: |
          1 agent ──→ CLI / coding tool
                    ↓
          5 agents ──→ IDE / team workspace
                    ↓
          20 agents ──→ personal agent / workflows
                    ↓
          100+ agents ──→ autonomous company

      - type: comparison-columns
        problem:
          heading: "Other tools"
          items:
            - "Claude Code — great CLI agent, but you can't customize the loop or scale beyond one agent"
            - "Cursor — great IDE, but agents are fixed and there's no plugin system"
            - "OpenClaw — great personal agent, but no multi-agent coordination or enterprise scaling"
            - "LangChain/CrewAI — agent frameworks, but no execution environment"
            - "Each tool is one thing. If you outgrow it, you start over."
        solution:
          heading: "Codebolt"
          items:
            - "One engine that starts as a CLI and scales to orchestrate 100+ agents"
            - "Full control over the agentic loop — write agents in code, not prompts"
            - "Plugin system with 3 communication channels — plugins run inside the platform"
            - "Multi-environment scaling across local, Docker, cloud, and hierarchical setups"
            - "Everything carries forward. Agents, plugins, memory, workflows — nothing gets rebuilt."

      - type: icon-grid
        tone: "muted"
        kicker: "ENGINE CAPABILITIES"
        title: |
          What makes the engine powerful
          63+ modules. 3 channels. Unlimited scale.
        description: "Every capability is available at every scale — from CLI to autonomous company."
        columns: 3
        features:
          - icon: "layers"
            title: "63+ SDK Modules"
            description: "Filesystem, git, browser, terminal, LLM, vector DB, memory, knowledge graph, code search, and more."
          - icon: "cpu"
            title: "3 Communication Channels"
            description: "Agent channel (codeboltjs), Plugin channel (WS + HTTP), Client channel (UI/TUI/Web). Each serves a purpose."
          - icon: "git-branch"
            title: "Multi-Environment"
            description: "Local, Docker, cloud, hierarchical. State transfer via git bundles. Heartbeat monitoring. Full lifecycle management."
          - icon: "shield"
            title: "Guardrails & Governance"
            description: "Policy engine with LLM risk classification. Per-agent, per-environment, per-phase scoping. Allow, deny, or escalate."
          - icon: "code"
            title: "17+ LLM Providers"
            description: "OpenAI, Anthropic, Google, Mistral, Groq, DeepSeek, Ollama, LM Studio. Per-agent, per-task model selection."
          - icon: "zap"
            title: "Built-in Review & Merge"
            description: "Agents review each other's work. Conflict detection. Pheromone coordination. No GitHub PR bottleneck."

      - type: card-grid
        heading: "The Progression"
        cards:
          - title: "Day 1 — Coding CLI"
            body: "Install Codebolt. Run it in your terminal. Use a built-in agent or bring your own. Like Claude Code but with any model, full SDK access, and room to grow."
            visual: |
              $ npm i -g codebolt
              $ codebolt
              → Start coding with AI
          - title: "Week 2 — Custom Agents"
            body: "Write your first agent in 10 lines of JavaScript. Full access to 63+ SDK modules. Your logic, your tools, your rules. No other tool gives you this for free."
            visual: |
              import { codebolt } from 'codeboltjs';
              codebolt.onMessage(async (msg) => {
                // your agent, your logic
              });
          - title: "Month 2 — IDE + Plugins"
            body: "Switch to the desktop IDE. Install plugins that connect to GitHub, Jira, Slack. Build custom plugins. Multiple agents coordinating on your codebase."
            visual: |
              IDE + Monaco Editor
              Plugins: CI/CD, review, deploy
              3+ agents coordinating
          - title: "Month 6 — Personal Agent"
            body: "Your agent runs 24/7. Persistent memory. Proactive scheduling. Plugin integrations handle email, calendar, monitoring. Like OpenClaw but on a platform that scales."
            visual: |
              Always-on agent
              Memory persists across sessions
              Plugins handle the world
          - title: "Year 1 — Orchestration Engine"
            body: "50+ agents across Docker and cloud environments. Stigmergy coordination. Deliberation councils. Automatic review and merge. Drift tracking. Your infrastructure, not your bottleneck."
            visual: |
              50+ agents → 5 environments
              Auto review & merge
              Drift tracking + guardrails
          - title: "Year 2 — Autonomous Company"
            body: "Applications run as plugins inside the engine. Each handles a domain — engineering, testing, deployment, monitoring. Agents coordinate across all of them. You direct the vision."
            visual: |
              Plugin: Engineering
              Plugin: QA & Testing
              Plugin: Deployment
              Plugin: Monitoring
              All autonomous. You direct.

      - type: persona-grid
        personas:
          - label: "Solo Developers"
            body: "Start with the CLI. Use one agent. Write custom agents when you're ready. More power than any free coding tool — because you control the agent, not just the prompt."
          - label: "Teams Scaling AI"
            body: "When two agents edit the same repo, the platform resolves conflicts. Coordination, drift tracking, and multi-environment management — so you focus on the product."
          - label: "AI Startup Founders"
            body: "Build your company on the engine. Applications run as plugins — no separate agent instances needed. Scale across environments as you grow."
          - label: "Enterprise & Production"
            body: "Governance, audit trails, deterministic replay, and guardrails. Every agent decision is traceable. Every change is attributable. Deploy agents in production with confidence."
          - label: "Platform Engineers"
            body: "Run headless in CI/CD. Spawn Docker environments. Transfer state between them. Monitor with real-time events. The engine was built for infrastructure people."
          - label: "AI Researchers"
            body: "Stigmergy-based coordination. Pheromone systems. Narrative versioning. Agent deliberation councils. Research-grounded architecture with published foundations."

      - type: cta-block
        heading: "One engine. Start simple. Scale without limits."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Explore the Engine", href: "/engine", variant: "secondary" }

  # ── Engine ─────────────────────────────────
  - slug: "engine"
    title: "The Engine — Codebolt"
    sections:

      - type: page-header
        title: "The Codebolt Engine"
        subtitle: "An advanced agent execution engine. As simple as a coding CLI. As powerful as autonomous company infrastructure."

      - type: centered-text
        variant: "thesis"
        text: "Codebolt is not an agent — it's the engine that runs agents. Not a framework — it's the execution environment where agents, plugins, and applications operate. Every other tool is one thing. Codebolt is the engine that becomes what you need."

      - type: diagram-section
        heading: "Engine Architecture"
        layers:
          - { label: "Interface Layer — IDE, TUI, CLI, Web", tag: "surface", style: "surface" }
          - { label: "Communication Layer — Agent SDK, Plugin SDK, Client SDK", tag: "runtime", style: "runtime" }
          - { label: "Coordination Layer — Stigmergy, Deliberation, Pheromones", tag: "coordination", style: "drift" }
          - { label: "Intelligence Layer — Drift Engine, Narrative Versioning (Rust)", tag: "intelligence", style: "versioning" }
          - { label: "Infrastructure Layer — Governance, Environments, Providers", tag: "core", style: "governance" }
        annotation: "Other tools operate at Layer 1-2. Agent frameworks at Layer 2. Codebolt is all five layers — a complete engine."

      - type: feature-block
        heading: "Custom Agents — Full Control"
        body: "Write agents in JavaScript using the 63-module SDK. Agents connect as child processes via codeboltjs, with full access to filesystem, git, terminal, browser, LLM, vector DB, memory systems, knowledge graphs, and more. You control every step of the agent loop — not prompts, code. This is what separates an engine from a tool."
        diagram: |
          codebolt.onMessage(async (msg) => {
            const code = await codebolt.fs.readFile('main.ts');
            const review = await codebolt.llm.chat(`Review: ${code}`);
            await codebolt.git.commit(review.summary);
            await codebolt.chat.sendMessage(review);
          });
          // 63+ modules available

      - type: feature-block
        heading: "Plugin System — Applications Inside the Engine"
        body: "Plugins connect through three communication channels — WebSocket actions, multiplexed events, and HTTP REST. Unlike every other SDK, plugins run inside the agentic environment. They don't need separate agent instances. This means your CI/CD pipeline, code review system, deployment automation, or monitoring dashboard runs natively inside the engine with full access to agentic capabilities."
        reverse: true
        diagram: |
          ┌──────────────────────────────┐
          │  Your Plugin                 │
          ├──────────────────────────────┤
          │ WS channel → fs, git, llm   │
          │ Mux channel → events, tasks │
          │ HTTP → CRUD, projects        │
          ├──────────────────────────────┤
          │ Runs inside the engine.      │
          │ No separate agent instance.  │
          └──────────────────────────────┘

      - type: feature-block
        heading: "Multi-Environment Scaling"
        body: "The provider system lets one Codebolt instance treat another as a coordinated environment — spawning, monitoring, and transferring state between them. Run agents across local, Docker, cloud, and hierarchical setups. Each environment has full lifecycle management with heartbeat monitoring. Git bundles transfer state between environments. This is how you go from one machine to a hundred."
        diagram: |
          Main Codebolt Instance
                │
          ┌─────┼──────┐
          ↓     ↓      ↓
          local docker  cloud
          env    env    env
          │      │      │
          └──────┼──────┘
           state transfer via git bundles
           heartbeat monitoring

      - type: feature-block
        heading: "Stigmergy-Based Coordination"
        body: "Traditional multi-agent systems use direct message passing — fragile and doesn't scale. Codebolt uses stigmergy: agents communicate through structured shared state. Pheromone-based task ownership prevents conflicts. The environment manages sequencing, dependencies, and resources. This is how biological swarms scale to millions — and how Codebolt scales beyond what message-passing architectures can handle."
        reverse: true
        diagram: |
          Agent A → shared state ← Agent B
                         ↕
          Agent C → shared state ← Agent D
          Pheromones: ownership signals
          No direct messaging needed
          Scales: 2 agents → 200 agents

      - type: feature-block
        heading: "Agent Deliberation Council"
        body: "Agents propose options, debate tradeoffs, vote, and reach consensus. Deliberation types include decision, review, brainstorm, approval, and vote. Every deliberation is stored and fully traceable. This is how agents make architectural decisions together — not by one agent guessing, but by multiple agents reasoning collectively."
        diagram: |
          Agent A: proposes option 1
          Agent B: proposes option 2
                ↓
          Discussion + tradeoff analysis
                ↓
          Vote: consensus reached
                ↓
          Decision logged + traceable

      - type: feature-block
        heading: "Drift Tracking — Two Levels"
        body: "Local Rust engine instances assess drift within each agent context — structural, scope, constraint, and coverage drift. The global JavaScript coordination layer aggregates signals across all agents, detecting systemic drift that no single agent would catch. When agents deviate from intent, the system flags it before it compounds."
        reverse: true
        diagram: |
          Intent → Plan → Code → Output
            ↓        ↓       ↓
          [drift]  [drift]  [drift]
          Rust (local) + JS (global)
          4 dimensions tracked

      - type: feature-block
        heading: "Narrative Engine (Rust)"
        body: "A Rust-based flight recorder that captures the full reasoning chain for every agent action. Shadow git for snapshot versioning. Per-thread commit history. Agent attribution for every change. Git bundle export for cross-environment transfer. Deterministic replay of any decision point."
        diagram: |
          t0 → t1 → t2 → t3
          │    │    │    │
          Full decision trace graph
          Per-thread git refs
          Intent + diff + attribution
          [replay any point]

      - type: feature-block
        heading: "Governance & Guardrails"
        body: "The policy engine evaluates agent actions against configurable rules. Scoped by agent role, agent ID, environment, provider, and execution phase. LLM-based risk classification. Decisions: allow, deny, or escalate to human. Every decision logged for audit. This is how you let agents run autonomously without losing control."
        reverse: true
        diagram: |
          Agent action requested
                ↓
          Guardrail evaluation:
          - Role: junior agent
          - Environment: production
          - Risk: HIGH (LLM classified)
                ↓
          Decision: ESCALATE
          → Human approves/denies
          → Logged + auditable

      - type: feature-block
        heading: "Three-Tier Memory"
        body: "Episodic memory for time-based recall. Persistent memory with chunking, embedding, and retrieval pipelines. The Context Assembly Engine assembles optimal context from all memory types using rules, pipelines, and token budgets. Agents don't just remember — they know what to remember and when."
        diagram: |
          ┌─────────────────────────┐
          │ Context Assembly Engine │
          ├─────────────────────────┤
          │ Episodic → time-based   │
          │ Persistent → structured │
          │ Rules → what to include │
          │ Token budget → limits   │
          ├─────────────────────────┤
          │ Optimal context → LLM   │
          └─────────────────────────┘

      - type: cta-block
        heading: "The engine that scales with your ambition."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "See All Formats", href: "/formats", variant: "secondary" }

  # ── Formats ────────────────────────────────
  - slug: "formats"
    title: "Formats — Codebolt"
    sections:

      - type: page-header
        title: "One Engine. Every Format."
        subtitle: "Same engine, same SDK, same plugins. Different interface for different needs."

      - type: centered-text
        variant: "thesis"
        text: "Most tools force you to choose: CLI or IDE, personal agent or team tool, simple or powerful. Codebolt is one engine that runs in every format. Everything you build in one format works in all others."

      - type: feature-block
        heading: "Codebolt as CLI"
        body: "Install globally, run in your terminal. Use built-in agents or bring your own. Headless server mode for CI/CD. Single prompt mode for automation. Full agent and plugin SDK available. Like Claude Code but with model freedom (17+ providers), custom agents, and a growth path to multi-agent."
        diagram: |
          $ npm i -g codebolt
          $ codebolt                    # TUI mode
          $ codebolt --server           # headless
          $ codebolt --prompt "..."     # single task
          $ codebolt --agent my-agent   # custom agent
          $ codebolt --web              # browser UI

      - type: feature-block
        heading: "Codebolt as IDE"
        body: "Full Electron desktop application with Monaco editor (VS Code-compatible), integrated terminal, file explorer, and dockview panels. Agent workspace shows real-time agent activity. Plugin panel for extensions. Not a VS Code fork — built from scratch with agent coordination as the foundation. 40+ file type associations, codebolt:// protocol, cross-platform."
        reverse: true
        diagram: |
          ┌─────────────────────────────────┐
          │ Monaco Editor    │ Agent Panel  │
          │ (VS Code engine) │ (real-time)  │
          ├─────────────────────────────────┤
          │ Terminal  │ File Explorer       │
          │ (xterm)   │ Plugins │ Excalidraw│
          └─────────────────────────────────┘
          Cross-platform: macOS, Windows, Linux

      - type: feature-block
        heading: "Codebolt as Personal Agent"
        body: "Run the engine 24/7. Three-tier persistent memory means your agent remembers everything across sessions. Plugins connect to email, calendar, monitoring, external services — anything. Proactive scheduling via hooks and cron. Like OpenClaw but backed by a platform with 63+ SDK modules, multi-environment support, and a plugin system designed for extensibility."
        diagram: |
          Always-on engine
                │
          ┌─────┼─────────────┐
          │ Memory (3-tier)    │
          │ Plugins (external) │
          │ Hooks (proactive)  │
          │ Any LLM provider   │
          └───────────────────┘
          Your personal agent, your rules

      - type: feature-block
        heading: "Codebolt as Orchestration Engine"
        body: "Run 50-100+ agents across Docker, cloud, and hierarchical environments simultaneously. Stigmergy-based coordination. Agent deliberation councils for collective decisions. Automatic review and merge without GitHub PR bottleneck. Drift tracking across all agents. Guardrail engine with per-role, per-environment policies. The HostBridge abstraction means identical capabilities whether running on desktop, CLI, or headless server."
        reverse: true
        diagram: |
          ┌── Orchestration Layer ──────────┐
          │ 50+ agents                      │
          │ 5+ environments                 │
          │ Stigmergy coordination          │
          │ Deliberation councils            │
          │ Auto review & merge             │
          │ Drift tracking (Rust + JS)      │
          │ Guardrails + audit trails       │
          └─────────────────────────────────┘

      - type: feature-block
        heading: "Codebolt as Autonomous Company"
        body: "Build entire business domains as plugins that run inside the engine. Engineering, QA, deployment, monitoring — each is a plugin with full access to agentic capabilities. Agents coordinate across all plugins. The provider system scales environments as demand grows. No other system lets you build autonomous companies without requiring each application to run its own agent instances."
        diagram: |
          Plugin: Engineering ──┐
          Plugin: QA Testing ───┤
          Plugin: Deployment ───┤→ One Engine
          Plugin: Monitoring ───┤   All coordinated
          Plugin: Custom ───────┘   Scales horizontally

      - type: centered-text
        variant: "identity"
        text: "Same engine. Same SDK. Same plugins. Same memory. Whatever you build in one format carries forward to the next."

      - type: cta-block
        heading: "Pick your format. Start building."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Explore the Engine", href: "/engine", variant: "secondary" }

