                subtitle: "environmentsServices.ts · 2500+ lines"
                accent: "amber"
                body:
                  - heading: "LIFECYCLE"
                    items:
                      - { type: "arrow", text: "CREATED → STARTING → RUNNING" }
                      - { type: "arrow", text: "STOPPING → STOPPED" }
                      - "Plus: ERROR · UNCONNECTABLE · DISCONNECTED · ARCHIVED"
                  - heading: "EVENTS"
                    items:
