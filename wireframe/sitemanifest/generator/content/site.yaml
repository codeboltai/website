          heading: "What exists today"
          items:
            - "Coding copilots (Cursor, Copilot) — you USE an agent, you can't build one"
            - "Personal AI (OpenClaw, Manus) — great for your inbox, not your codebase"
            - "Agent frameworks (LangChain) — libraries, not execution environments"
            - "Running 3 independent agents ≠ 3 coordinated agents"
            - "No tool handles conflict resolution, drift tracking, or multi-environment state"
        solution:
          heading: "What Codebolt provides"
          items:
            - "Write custom agents with a 63-module SDK — filesystem, git, terminal, browser, LLM, memory"
            - "Build applications as plugins that run inside the agentic environment"
            - "Coordinate agents with stigmergy, pheromones, and deliberation councils"
            - "Scale across local, Docker, cloud, and hierarchical environments"
            - "Built-in review/merge, guardrails, audit trails, and deterministic replay"

