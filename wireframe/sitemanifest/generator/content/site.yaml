            visual: |
              import { codebolt } from 'codeboltjs';
              codebolt.onMessage(async (msg) => {
                const files = await codebolt.fs.readDir('/');
                const analysis = await codebolt.llm.chat(…);
                await codebolt.git.commit(analysis);
              });
