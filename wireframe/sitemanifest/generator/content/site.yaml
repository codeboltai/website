      - type: structure-diagram
        kicker: "EXTENSION SYSTEM"
        title: "PLUGIN + ENVIRONMENT SUBSYSTEM"
        subtitle: "plugin lifecycle · provider registry · heartbeat monitoring"
        sections:
          - number: "1"
            label: "PLUGIN LIFECYCLE"
            meta: "discover → load → start → running → stop"
            columns: 2
            cards:
              - title: "Plugin Service"
                subtitle: "pluginService.ts · 400+ lines"
                accent: "cyan"
                body:
                  - heading: "DISCOVERS"
                    items:
                      - { type: "ref", text: "~/.codebolt/plugins/", suffix: "— global" }
                      - { type: "ref", text: "{project}/.codeboltPlugins/", suffix: "— per-project" }
                      - "Validates package.json with codebolt.plugin key"
                  - heading: "LIFECYCLE STATES"
                    items:
                      - "Discovered · Loaded · Initialized"
                      - "Started · Stopped · Error"
                  - heading: "AUTO-START TRIGGERS"
                    items:
                      - "On startup · on event · on demand"
              - title: "Plugin Process Manager"
                subtitle: "PluginProcessManager.ts · 300+ lines"
                accent: "cyan"
                body:
                  - heading: "OWNS"
                    items:
                      - "Child process spawning + stdio"
                      - "Signal propagation · timeout mgmt"
                      - "Crash detection + auto-recovery"
                  - heading: "TIMEOUTS"
                    items:
                      - "Spawn 30s · shutdown 5s · force 3s"
                  - heading: "STATUS STATES"
                    items:
                      - "STARTING · RUNNING · STOPPING"
                      - "STOPPED · FAILED · CRASHED"
          - number: "2"
            label: "PLUGIN COMMUNICATION"
            meta: "three simultaneous channels"
            columns: 3
            cards:
              - title: "Channel 1 · WebSocket"
                subtitle: "full-duplex streaming"
                accent: "emerald"
                body:
                  - heading: "USED FOR"
                    items:
                      - "fs · git · terminal · llm calls"
                      - "Same protocol as agents (cliLib)"
                  - heading: "ENDPOINT"
                    items:
                      - { type: "ref", text: "/plugin", suffix: "— server WS" }
              - title: "Channel 2 · Mux Events"
                subtitle: "multiplexed subscriptions"
                accent: "emerald"
                body:
                  - heading: "SUBSCRIBES TO"
                    items:
                      - "task updates · chat events"
                      - "job status · swarm events"
                      - "calendar · review-merge"
                  - heading: "PATTERN"
                    items:
                      - "Event-driven side observer"
              - title: "Channel 3 · HTTP REST"
                subtitle: "CRUD over HTTP"
                accent: "emerald"
                body:
                  - heading: "FOR"
                    items:
                      - "Threads · tasks · projects"
                      - "Knowledge · memory · environments"
                  - heading: "MODULES"
                    items:
                      - "Same 72 REST modules as Client SDK"
          - number: "3"
            label: "ENVIRONMENT + PROVIDER"
            meta: "compute lifecycle · heartbeat · state transfer"
            columns: 2
            cards:
              - title: "Environment Service"
                subtitle: "environmentsServices.ts · 2500+ lines"
                accent: "amber"
                body:
                  - heading: "LIFECYCLE"
                    items:
                      - { type: "arrow", text: "CREATED → STARTING → RUNNING" }
                      - { type: "arrow", text: "STOPPING → STOPPED" }
                      - "Plus: ERROR · UNCONNECTABLE · DISCONNECTED · ARCHIVED"
                  - heading: "EVENTS"
                    items:
                      - "STATE_CHANGED · PROCESS_STARTED"
                      - "HEALTH_CHECK_PASSED/FAILED"
                      - "RESOURCE_CLEANUP"
                  - heading: "STATE TRANSFER"
                    items:
                      - { type: "ref", text: "safeCreateSnapshotArchive" }
                      - { type: "ref", text: "importSnapshotBundle" }
              - title: "Heartbeat Manager"
                subtitle: "managers/HeartbeatManager.ts"
                accent: "amber"
                body:
                  - heading: "CONFIGURATION"
                    items:
                      - "Provider interval: 10s"
                      - "Environment interval: 15s"
                      - "Warning threshold: 2 missed"
                      - "Restart threshold: 3 missed"
                      - "Max restart attempts: 2"
                      - "Restart cooldown: 60s"
                  - heading: "STATUS ESCALATION"
                    items:
                      - { type: "arrow", text: "healthy → warning → critical → dead" }
                  - heading: "ACTIONS"
                    items:
                      - "Auto-restart on critical"
                      - "Emit events · update UI"
        stateRail:
          label: "RUNTIME STATE — PLUGIN + ENVIRONMENT TRACKING"
          columns: 6
          items:
            - { name: "pluginRegistry", desc: "discovered plugins" }
            - { name: "pluginProcesses", desc: "running children" }
            - { name: "environmentRecords", desc: "lifecycle state" }
            - { name: "providerRegistry", desc: "cloud + local" }
            - { name: "heartbeatStatus", desc: "health tracking" }
            - { name: "claimsRegistry", desc: "gateway permissions" }
        distinctions:
          - label: "DISTINCTION"
            text: "Plugins run in separate child processes — crash of one plugin never affects the server or other plugins."
          - label: "DISTINCTION"
            text: "Providers are plugins too. The RemoteExecutionPlugin claims the ExecutionGateway to enable cross-environment agent proxy calls."
          - label: "DISTINCTION"
            text: "Heartbeat is bidirectional: the server pings providers and providers ping the server, so both sides detect failure."

