  - slug: "engine/system-extensibility"
    title: "System Extensibility — Codebolt"
    sections:

      - type: page-header
        title: "System Extensibility"
        subtitle: "Extend the engine at every layer. Custom agents, custom plugins, custom clients."

      - type: centered-text
        variant: "thesis"
        text: "Most tools give you a prompt box. Codebolt gives you three SDKs. The Agent SDK for building agents. The Plugin SDK for building applications inside the engine. The Client SDK for building any interface on top. Every layer of the system is open."

      - type: feature-block
        heading: "Agent SDK — codeboltjs"
        body: "Write agents in JavaScript/TypeScript. Agents connect as child processes via WebSocket and get access to 63+ API modules — filesystem, git, terminal, browser automation, LLM (any provider), vector database, memory systems, knowledge graphs, code search, and more. You control every step of the agent loop. Not prompts — code."
        diagram: |
          import { codebolt } from 'codeboltjs';

          codebolt.onMessage(async (msg) => {
            const files = await codebolt.fs.readDir('/src');
            const code = await codebolt.fs.readFile('main.ts');
            const review = await codebolt.llm.chat({...});
            await codebolt.git.commit(review.summary);
            await codebolt.chat.sendMessage(review);
          });
          // 63+ modules. Full control.

      - type: feature-block
        heading: "Plugin SDK — Three Communication Channels"
        body: "Plugins connect to the engine through three channels simultaneously. Channel 1: WebSocket (same as agents — filesystem, git, terminal, LLM access). Channel 2: Multiplexed events (real-time subscriptions to tasks, chat, jobs, swarm, calendar, review-merge). Channel 3: HTTP REST (CRUD for threads, tasks, projects, environments). Plugins run inside the engine — no separate agent instance needed."
        reverse: true
        diagram: |
          ┌──────────────────────────────────┐
          │  Your Plugin                     │
          ├──────────────────────────────────┤
          │ Ch.1 WS     → fs, git, llm, ... │
          │ Ch.2 Mux    → events, tasks, ... │
          │ Ch.3 HTTP   → CRUD, projects, ...│
          ├──────────────────────────────────┤
          │ onStart() → receives PluginContext│
          │ onMessage() → incoming messages  │
          │ Lifecycle managed by engine      │
          │ Trigger-based auto-start         │
          └──────────────────────────────────┘

      - type: feature-block
        heading: "Client SDK — Build Any Interface"
        body: "72 lazily-initialized REST API modules covering every domain: chat, agents, git, tasks, browser, file, LLM, vector DB, knowledge, swarm, orchestrator, environments, memory, calendar, and more. 33 WebSocket modules for real-time events: shell PTY, chat, editor, LSP, browser, tasks, jobs, swarm, debug. Connection presets (MINIMAL, STANDARD, FULL) and unified event filtering with wildcards and predicates."
        diagram: |
          const client = new CodeBoltClient({
            defaultPreset: 'standard'
          });

          // 72 REST APIs
          const tasks = await client.tasks.getTasks();
          const agents = await client.agents.list();

          // 33 WebSocket streams
          client.onEvents('tasks.*', (data) => {
            updateDashboard(data);
          });

          // Build: dashboards, mobile apps,
          // Slack bots, VS Code extensions,
          // CLI tools, anything.

      - type: feature-block
        heading: "Plugin Discovery & Lifecycle"
        body: "Plugins are discovered from project .codeboltPlugins/ directories and global ~/.codebolt/plugins/. Each plugin declares itself in package.json with a codebolt.plugin key. The PluginProcessManager handles loading, starting, stopping, and trigger-based auto-start. Plugins receive a PluginContext with their ID, directory, and manifest. Built-in plugins include cloud integration, remote execution, and test execution."
        reverse: true
        diagram: |
          Discovery:
          ├─ .codeboltPlugins/ (per-project)
          └─ ~/.codebolt/plugins/ (global)

          Lifecycle:
          discover → load → start → running
                              ↕
                    stop ← trigger-based

          Built-in:
          ├─ cloud-plugin
          ├─ remote-execution-plugin
          └─ test-execution-plugin

      - type: cta-block
        heading: "Three SDKs. Every layer open."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Back to Engine", href: "/engine", variant: "secondary" }

  # ── Engine: Agent Extensibility ────────────
  - slug: "engine/agent-extensibility"
    title: "Agent Extensibility — Codebolt"
    sections:

      - type: page-header
        title: "Agent Extensibility"
        subtitle: "Multiple agent types. 675+ skills. From no-code remix to full code custom."

      - type: centered-text
        variant: "thesis"
        text: "Every agent in Codebolt is extensible. Remix agents let you customize without code. Flow agents give you visual composition. Custom agents give you full SDK access. All agents share the same 675+ skill library and capability system."

      - type: feature-block
        heading: "Remix Agents — No-Code Customization"
        body: "Remix agents inherit from a base agent and add custom instructions in YAML frontmatter + Markdown body. Stored as .md files in .codebolt/agents/remix/ — git-friendly, versionable, mergeable. Declare supported languages, frameworks, routing rules, and LLM model fallback chains. No code required."
        diagram: |
          .codebolt/agents/remix/my-agent.md:
          ---
          name: Python Testing Expert
          baseAgent: code-generation
          metadata:
            agent_routing:
              supportedlanguages: [python]
            defaultagentllm:
              modelorder: [gpt-4, claude, local]
          ---
          You are a Python testing expert.
          Write pytest tests with fixtures...

      - type: feature-block
        heading: "Flow Agents — Visual Composition"
        body: "Build agent workflows visually using the LiteGraph-based flow editor. Create .agentflow files with nodes, connections, and data flow. The runtime service executes the flow graph. Combine multiple agent capabilities into complex workflows without writing orchestration code."
        reverse: true
        diagram: |
          ┌─────────┐    ┌─────────┐    ┌─────────┐
          │ Analyze  │───→│ Generate │───→│ Review  │
          │ Code     │    │ Tests    │    │ Output  │
          └─────────┘    └─────────┘    └─────────┘
               │                              │
               └──────── feedback ────────────┘

          Visual editor. .agentflow files.
          Runtime executes the graph.

      - type: feature-block
        heading: "Custom Agents — Full SDK Access"
        body: "Write agents in JavaScript/TypeScript with complete control over the agentic loop. Connect via codeboltjs as child processes. Access all 63+ SDK modules. Implement custom decision logic, tool selection, memory management, and error handling. Your agent is your program."
        diagram: |
          import { codebolt } from 'codeboltjs';

          codebolt.onMessage(async (msg) => {
            // Step 1: Analyze
            const code = await codebolt.fs.readDir('/src');
            // Step 2: Decide (your logic)
            const plan = await codebolt.llm.chat({...});
            // Step 3: Execute
            await codebolt.terminal.run('npm test');
            // Step 4: Report
            await codebolt.chat.sendMessage(result);
          });

      - type: feature-block
        heading: "Remote Agents"
        body: "Agents running in external environments connect via HTTP/WebSocket endpoints. A remote agent has the same capabilities as a local one — full SDK access through the network. This enables distributed agent architectures where specialized agents live on specialized hardware."
        reverse: true
        diagram: |
          Local Codebolt Instance
                │
          ┌─────┼──────────────────┐
          │ Remote Agent (GPU VM)  │
          │ → connects via WS      │
          │ → full SDK access      │
          │ → specialized hardware │
          └────────────────────────┘

      - type: feature-block
        heading: "675+ Skills Organized by Domain"
        body: "72 tool domains with 675+ individual tools. File operations (read, write, search, diff, create). Git (commit, push, pull, branch, merge, revert). Browser (navigate, screenshot, click, type, scroll). Terminal (execute, stream, manage PTY). LLM (chat, embed, count tokens). Vector DB (store, query, semantic search). Agent control (start, stop, list, spawn sub-agents). Memory & knowledge (persist, retrieve, graph queries). Skills are scoped by environment capabilities."
        diagram: |
          Agent declares needed capabilities:
          → browser-automation
          → llm-embedding
          → vector-storage

          Environment checks:
          → Playwright available? ✓
          → ONNX.js available? ✓
          → Redis running? ✓

          Agent gains access to:
          675+ tools across 72 domains
          Scoped by what's available

      - type: feature-block
        heading: "Role-Specific LLM Configuration"
        body: "Each agent can declare different LLM configurations for different roles. Use GPT-4 for planning, Claude for code generation, a local model for repetitive tasks. Define fallback chains — if the primary model is unavailable, automatically try alternatives. Per-agent, per-task, per-role model selection. 17+ cloud providers plus Ollama and LM Studio."
        reverse: true
        diagram: |
          metadata:
            llm_role:
              - role: planning
                modelorder: [gpt-4, claude-opus]
              - role: coding
                modelorder: [claude-sonnet, gpt-4]
              - role: review
                modelorder: [local-llama, gemini]

          Fallback: if primary unavailable,
          try next in chain automatically.

      - type: cta-block
        heading: "Every agent is extensible."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Back to Engine", href: "/engine", variant: "secondary" }

  # -- Engine: Dynamic Scalable Evolving Memory
  - slug: "engine/dynamic-scalable-evolving-memory"
    title: "Dynamic Scalable Evolving Memory - Codebolt"
    sections:

      - type: product-hero-stack
        eyebrow: "DYNAMIC SCALABLE EVOLVING MEMORY"
        title: "A memory substrate agents can grow, reshape, and inject at runtime"
        subtitle: "Codebolt memory is not a fixed conversation summary. It is an active engine layer that can ingest chats, code, prompts, tasks, events, and relationships; create new memory structures; evolve context rules; and inject the right memory into each agent run under budget."
        buttons:
          - { label: "Explore Architecture", href: "/architecture", variant: "primary" }
          - { label: "Back to Engine", href: "/engine", variant: "secondary" }
        stackTitle: "Memory runtime"
        stackItems:
          - { label: "Scalable", value: "memory grows as the system is used" }
          - { label: "Dynamic", value: "memory structures are primitives, not fixed schemas" }
          - { label: "Evolving", value: "agents can change structures and context rules" }
          - { label: "Injectable", value: "CAE injects memory by rules and budgets" }
          - { label: "Active", value: "background memory processes keep working" }
          - { label: "Reactive", value: "hooks and events trigger memory updates" }
        footer: "The memory layer is part of the engine runtime, not a prompt appendix."

      - type: centered-text
        variant: "thesis"
        text: "Most agent memory products start with a fixed shape: summaries, preferences, key points, maybe mistakes. Codebolt ships memory primitives. You can decide what memory means for a project: unfinished tasks, negative patterns, positive patterns, object relationships, code facts, prompt behavior, agent habits, customer context, or a structure no one anticipated when the agent started."

      - type: bento-grid
        kicker: "SIX MEMORY PROPERTIES"
        heading: "Dynamic, scalable, evolving memory"
        description: "The important part is not only that agents remember. It is that the memory substrate can grow, restructure, react, and decide what should enter context."
        columns: 3
        items:
          - title: "Scalable memory"
            tag: "SCALABLE"
            span: 2
            description: "Memory grows as Codebolt is used. Agent chats, code changes, prompts, tool traces, tasks, decisions, failures, and relationships can be ingested into durable stores and converted into useful structures such as positive patterns, negative patterns, object relationships, unresolved work, and project facts."
            visual: |
              usage keeps producing signal
              ├─ chats
              ├─ code
              ├─ prompts
              ├─ tools
              ├─ tasks
              └─ events
                    ↓
              memory keeps compounding
          - title: "Dynamic structures"
            tag: "DYNAMIC"
            description: "The memory shape is not predefined by Codebolt. If you do not want conversation summaries, skip them. If you only want unfinished tasks, create that memory. If you need object graphs, failure patterns, or domain-specific state, define those instead."
          - title: "Evolving schemas and rules"
            tag: "EVOLVING"
            description: "Agents can change memory structures at runtime. They can create new memory definitions, adjust ingestion, improve retrieval pipelines, and add Context Assembly rules that control what future agents receive."
          - title: "Injectable context"
            tag: "INJECTABLE"
            description: "Memory does not blindly flood the prompt. The Context Assembly Engine injects memory by scope variables, rules, retrieval pipelines, contribution rules, and token budgets."
          - title: "Active and reactive memory"
            tag: "ACTIVE"
            span: 2
            description: "Memory work can run in the background and react to the system. Hooks, events, schedules, task outcomes, conversation lifecycle events, and custom plugins can trigger ingestion, updates, consolidation, and new derived memory."
            visual: |
              event happens
                    ↓
              hook / ingestion pipeline
                    ↓
              update memory
                    ↓
              CAE changes future context

              memory is not passive storage

      - type: feature-block
        kicker: "01 · MEMORY PRIMITIVES"
        heading: "Not one memory format. A system for creating memory formats."
        body: "Codebolt separates memory into primitives: storage types, ingestion pipelines, retrieval pipelines, context rules, contribution rules, and budgets. Together they let a project define the memory it actually needs instead of accepting a fixed vendor schema."
        diagram: |
          YOU CAN DEFINE:
          ├─ unfinished tasks memory
          ├─ negative pattern memory
          ├─ positive pattern memory
          ├─ object relationship memory
          ├─ codebase fact memory
          ├─ prompt behavior memory
          └─ domain-specific memory

          USING PRIMITIVES:
          ├─ episodic logs
          ├─ persistent memory definitions
          ├─ vector search
          ├─ knowledge graph
          ├─ key-value state
          ├─ ingestion pipelines
          ├─ retrieval pipelines
          └─ context assembly rules

      - type: accordion-showcase
        kicker: "RUNTIME EVOLUTION"
        heading: "How memory changes while the system runs"
        description: "The memory layer can collect signal, derive structures, modify schemas, and change injection behavior without waiting for a new product release."
        visual:
          label: "Dynamic memory loop"
          code: |
            observe work
                  |
                  v
            create / update structures
                  |
                  v
            add rules + pipelines
                  |
                  v
            inject under budget
                  |
                  v
            future agents inherit
        items:
          - question: "Scale from raw usage"
            answer: "The memory system can consume agent chat, code, prompts, tool results, task state, project files, application events, and plugin events. Over time that raw usage becomes structured project intelligence."
          - question: "Create new structures"
            answer: "A project can add new persistent memory definitions for the exact shape it needs: unfinished tasks, issue clusters, component relationships, repeated user corrections, agent mistakes, winning strategies, or business-specific entities."
          - question: "Change structures at runtime"
            answer: "Because memory structures are engine primitives, agents and plugins can update schemas, ingestion behavior, and retrieval pipelines while work is happening. The structure of memory can evolve with the problem."
          - question: "Control injection"
            answer: "Context Assembly rules determine which memories are injected for a given agent, task, phase, thread, project, user, or swarm. Memory is selected and budgeted before it enters the prompt."
          - question: "React in the background"
            answer: "Hooks, events, schedules, and lifecycle triggers can run memory work without a user prompt. Memory can consolidate, update relationships, record failures, and prepare future context while agents continue working."

      - type: tabs-showcase
        kicker: "WHAT CAN MEMORY BECOME"
        heading: "The memory shape is programmable"
        description: "Codebolt can support normal chat memory, but the stronger idea is that memory can become whatever durable intelligence the agent system needs."
        tabs:
          - label: "Patterns"
            title: "Positive and negative pattern memory"
            body: "Track what works and what fails. Agents can record repeated mistakes, constraints that were missed, review feedback, successful approaches, and patterns that should influence future work."
            points:
              - "Negative patterns: failed assumptions, repeated bugs, bad plans"
              - "Positive patterns: validated approaches, successful workflows"
              - "Useful for self-correction and agent evaluation"
            visual:
              label: "pattern memory"
              code: |
                mistake_pattern
                ├─ trigger
                ├─ evidence
                ├─ correction
                └─ inject_when
          - label: "Tasks"
            title: "Unfinished work memory"
            body: "Instead of summarizing every conversation, a project can keep memory focused on open loops: unfinished tasks, blocked decisions, abandoned branches, stale todos, skipped tests, and follow-up actions."
            points:
              - "Created from chats, plans, TODOs, jobs, commits, and events"
              - "Injected only when relevant to the current task or file"
              - "Useful for long-running autonomous work"
            visual:
              label: "unfinished tasks"
              code: |
                open_loop
                ├─ task
                ├─ blocker
                ├─ owner
                └─ next_action
          - label: "Objects"
            title: "Object relationship memory"
            body: "Memory can become a relationship graph for code, product, people, tasks, agents, files, APIs, prompts, business objects, or any domain-specific entity."
            points:
              - "Relationships can be discovered from code and runtime events"
              - "Graph expansion adds related context"
              - "Useful for multi-agent coordination and architecture work"
            visual:
              label: "object graph"
              code: |
                Component -> uses -> API
                Agent -> owns -> Task
                Prompt -> caused -> Failure
                File -> implements -> Feature
          - label: "Signals"
            title: "Active and reactive signal memory"
            body: "Memory can keep working after the chat turn ends. Background processors, hooks, schedules, task events, action events, and plugin events can update memory continuously."
            points:
              - "Runs from event triggers, not only user prompts"
              - "Can consolidate and update derived memories"
              - "Fits monitoring and long-term autonomous agents"
            visual:
              label: "reactive memory"
              code: |
                onTaskFailure -> store pattern
                onAction     -> update object
                onSchedule   -> consolidate
                onWebhook    -> ingest event
          - label: "Injection"
            title: "Rule-based context injection"
            body: "The memory structure is only half the system. Context Assembly decides which memory should enter a given agent run, where it should be placed, and how much budget it gets."
            points:
              - "Rules evaluate scope variables and custom variables"
              - "Budgets prevent memory from flooding the prompt"
              - "Traces explain why memory was included"
            visual:
              label: "context injection"
              code: |
                if task_type = refactor
                and phase = debugging
                include:
                  - past_failures
                  - related_files
                  - review_notes

      - type: feature-block
        kicker: "02 · SCALABLE + INJECTABLE"
        heading: "Memory can grow without flooding every agent"
        body: "Scalable memory creates a second problem: the more the system learns, the less any single agent can read. Codebolt solves that through Context Assembly. Memory can grow in the background, but each agent receives only the slice selected by rules, retrieval pipelines, contribution logic, and token budgets."
        reverse: true
        diagram: |
          memory keeps growing:
          ├─ conversations
          ├─ code facts
          ├─ object graph
          ├─ positive patterns
          ├─ negative patterns
          └─ unfinished tasks

          CAE decides:
          ├─ which memory applies
          ├─ which retrieval pipeline to run
          ├─ where context is placed
          └─ how much budget it receives

          agent gets focused context,
          not the whole database

      - type: cta-block
        heading: "Give agents memory they can scale, reshape, and inject."
        buttons:
          - { label: "Explore Architecture", href: "/architecture", variant: "primary" }
          - { label: "Back to Features", href: "/engine", variant: "secondary" }

  # ── Engine: Multi-Agent (Single Env) ───────
  - slug: "engine/multi-agent"
    title: "Multi-Agent Scaling — Codebolt"
    sections:

      - type: page-header
        title: "Multi-Agent Scaling"
        subtitle: "Within a single environment: sub-agents, parallel execution, coordination, deliberation, and autonomous review."

      - type: centered-text
        variant: "thesis"
        text: "Running multiple agents isn't the hard part. Coordinating them is. Codebolt provides sub-agent spawning, grouped parallel execution, stigmergy-based coordination, pheromone ownership, deliberation councils, automatic review-merge, and drift tracking — all within a single environment."

      - type: feature-block
        heading: "Sub-Agent Spawning"
        body: "Any agent can spawn background child threads that run as full agent instances in parallel. Not async tasks — real agents with complete SDK access. Register children individually or in groups. Wait for individual completion, grouped completion, or any external event. Message-driven parent-child communication via WebSocket."
        diagram: |
          Parent Agent
            ├─ spawn('reviewer', task1) → Child 1
            ├─ spawn('tester', task2)  → Child 2
            ├─ spawn('docs', task3)    → Child 3
            │
            │  addToGroup('batch-1', [1,2,3])
            │
            └─ await groupCompletion('batch-1')
                      ↓
               All 3 complete in parallel
               → Merge results → Continue

      - type: feature-block
        heading: "Stigmergy-Based Coordination"
        body: "Traditional multi-agent systems use direct message passing — fragile, creates coupling, doesn't scale. Codebolt uses stigmergy: agents communicate indirectly through structured shared state. Each agent reads from and writes to a shared environment. Coordination emerges without explicit messaging. This is how biological swarms scale to millions."
        reverse: true
        diagram: |
          Message Passing (others):
          A → B → C → D (fragile chain)

          Stigmergy (Codebolt):
          A → [shared state] ← B
          C → [shared state] ← D
          No direct coupling.
          Scales: 2 → 200+ agents.

      - type: feature-block
        heading: "Pheromone-Based Task Ownership"
        body: "Agents deposit pheromones on tasks and files to signal interest and ownership. Configurable pheromone types. Aggregation system for conflict resolution when multiple agents target the same work. Lock/unlock mechanisms for exclusive access. This prevents the coordination breakdown that happens when independent agents collide."
        diagram: |
          Agent A deposits pheromone:
          → file: auth.ts (ownership)
          → task: refactor-auth (working)

          Agent B checks pheromones:
          → auth.ts: claimed by A
          → picks different task instead

          No collision. No merge conflict.
          Automatic coordination.

      - type: feature-block
        heading: "Agent Deliberation Council"
        body: "Agents propose options, debate tradeoffs, vote, and reach consensus. Deliberation types: decision, review, brainstorm, approval, vote. All stored per-project in .codebolt/agentdeliberation/ and fully traceable. This is how agents make architectural decisions collectively — not by one agent guessing."
        reverse: true
        diagram: |
          Agent A: proposes microservices
          Agent B: proposes monolith
          Agent C: analyzes tradeoffs
                ↓
          Vote: 2 for monolith, 1 for micro
                ↓
          Consensus: monolith
          Decision: logged + traceable
          Rationale: preserved

      - type: feature-block
        heading: "Automatic Review & Merge"
        body: "Agents create review-merge requests for their changes. Other agents provide feedback — approve, request changes, or comment. Conflict detection runs before merge. Pheromone-based coordination prevents overlapping work. The shadow git system handles the actual merge operations. No GitHub PR bottleneck. Agents do long tasks in parallel, review each other, and merge autonomously."
        diagram: |
          Agent A: implements feature
                ↓
          Review request created
                ↓
          Agent B: reviews → approves
          Agent C: checks conflicts → clear
                ↓
          Auto-merged by shadow git
          No human needed. Fully traced.

      - type: feature-block
        heading: "Drift Tracking — Two Levels"
        body: "Local Rust engine instances assess drift within each agent context — structural drift (architecture diverging from plan), scope drift (features expanding beyond intent), constraint drift (violations of rules), coverage drift (gaps in implementation). The global JavaScript layer aggregates signals across all agents, detecting systemic drift that no single agent would catch."
        reverse: true
        diagram: |
          Level 1: Rust (per-agent)
          → structural drift
          → scope drift
          → constraint drift
          → coverage drift

          Level 2: JavaScript (global)
          → aggregate all agent signals
          → detect systemic patterns
          → flag before it compounds

      - type: cta-block
        heading: "Coordination, not collision."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Back to Engine", href: "/engine", variant: "secondary" }

  # ── Engine: Multi-Environment Scaling ──────
  - slug: "engine/multi-environment"
    title: "Multi-Environment Scaling — Codebolt"
    sections:

      - type: page-header
        title: "Multi-Environment Scaling"
        subtitle: "Chain environments together. Proxy execution across machines. Any topology."

      - type: centered-text
        variant: "thesis"
        text: "One Codebolt instance can treat another as a coordinated environment. Agents in Environment A trigger work in Environment B, which can forward to Environment C. Linear chains, fan-out trees, peer-to-peer meshes. The proxy execution system is plugin-based — not hardcoded — so any environment can participate."

      - type: feature-block
        heading: "Proxy Execution — How It Works"
        body: "The RemoteExecutionPlugin runs in Environment B and claims the ExecutionGateway. It starts a ProviderServer on WebSocket port 3100. Environment A's provider connects to this WebSocket. When Agent A sends an execution request, the gateway routes it to Environment B. Environment B executes and streams results back in real-time. Notifications (progress, logs) flow bidirectionally."
        diagram: |
          Env A (your laptop)
          ├─ Agent sends ExecutionRequest
          ├─ Provider connects to Env B:3100
          │
          ↓ WebSocket bridge
          │
          Env B (Docker GPU server)
          ├─ RemoteExecutionPlugin (active)
          ├─ Claims ExecutionGateway
          ├─ ProviderServer on port 3100
          ├─ Executes request
          └─ Streams results back to Env A

      - type: feature-block
        heading: "Environment Chaining — Any Topology"
        body: "Environments can chain arbitrarily. Env A calls Env B which calls Env C. Or Env A fans out to B, C, and D simultaneously. Or environments form peer-to-peer meshes. Each environment runs its own full Codebolt instance. The proxy is plugin-based — any environment can claim the execution gateway. Lazy routing means gateways are only active when the RemoteExecutionPlugin is running."
        reverse: true
        diagram: |
          Linear:   A → B → C → D
          Fan-out:  A → [B, C, D]
          Tree:     A → B → [D, E]
                    A → C → [F, G]
          Mesh:     A ↔ B ↔ C ↔ A
          Hub:      [B, C, D] → A → [E, F]

          Any topology. Plugin-based routing.
          Each node = full Codebolt instance.

      - type: feature-block
        heading: "State Transfer via Git Bundles"
        body: "The Narrative Engine snapshots workspace state per-environment using shadow git with per-thread refs. Git bundles package these snapshots for transfer between environments. Import/export as tar.gz or git bundles. Bidirectional — both environments can exchange state. The narrative hierarchy (Objective → Thread → Agent Run → Snapshot) is preserved across transfers."
        diagram: |
          Env A:
          [workspace state] → shadow git
                           → git bundle (export)
                           → transfer to Env B

          Env B:
          git bundle (import) → shadow git
                             → [workspace restored]

          Hierarchy preserved:
          Objective → Thread → Agent Run → Snapshot

      - type: feature-block
        heading: "Provider System — Local Is First-Class"
        body: "The provider registry treats local, Docker, cloud, and hybrid environments identically. No special-case code for local vs remote. Providers declare capabilities (GPU, Python, browser, etc.). The engine routes work to the right provider based on capability requirements. Environment lifecycle: CREATED → STARTING → RUNNING → STOPPING → STOPPED, with heartbeat monitoring every 30 seconds."
        reverse: true
        diagram: |
          Provider Registry:
          ├─ local    (category: local)
          ├─ docker   (category: local)
          ├─ e2b      (category: cloud)
          ├─ cloud-vm (category: cloud)
          └─ hybrid   (category: hybrid)

          All identical interface.
          Capabilities declared per-provider.
          Route by capability match.
          Heartbeat: 30s health checks.

      - type: feature-block
        heading: "Use Cases for Multi-Environment"
        body: "GPU offloading — local agent sends training jobs to cloud GPU. Sandboxed execution — run untrusted code in isolated Docker containers. Distributed teams — each developer's Codebolt connects to a shared orchestration server. Progressive scaling — start local, add Docker, add cloud as you grow. Hierarchical — parent instance manages child instances, spawning and closing environments as needed."
        diagram: |
          GPU offload:
          laptop → cloud A100 → results back

          Sandboxed execution:
          main env → Docker sandbox → safe

          Distributed team:
          Dev A ←→ Orchestrator ←→ Dev B

          Progressive scaling:
          local → +Docker → +cloud → +more

      - type: cta-block
        heading: "Chain environments. Scale without limits."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Back to Engine", href: "/engine", variant: "secondary" }

  # ── Engine: Codebolt Native Applications ──
  - slug: "engine/codebolt-native-applications"
    title: "Codebolt Native Applications — Build Apps on the Agent Engine"
    sections:

      - type: product-hero
        eyebrow: "CODEBOLT NATIVE APPLICATIONS"
        title: "Applications that use the agent engine as their backend"
        subtitle: "Cloud-native applications were designed around cloud primitives. Codebolt-native applications are designed around Codebolt primitives: agents, plugins, memory, tasks, environments, dynamic panels, and cloud-scale execution."
        buttons:
          - { label: "Read App Docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/04b_custom-agentic-applications/01_overview", variant: "primary" }
          - { label: "Explore the SDK", href: "/products/sdk", variant: "secondary" }
        media:
          label: "Codebolt-native architecture"
          placeholder: "App UI + plugin backend + agent runtime"
          alt: "Codebolt native application architecture"

      - type: centered-text
        variant: "thesis"
        text: "A Codebolt-native application is not just a web app with an AI chat box. It is an application whose workflow, backend, and runtime behavior are built around the Codebolt engine. The app can call agents, manage tasks, open dynamic panels, run plugins, coordinate environments, use memory, and scale work through local or cloud agent runtimes."

      - type: bento-grid
        kicker: "APPLICATION MODEL"
        heading: "Four ways to build on the engine"
        description: "Choose the level of integration that matches your product. Start with APIs, move into plugin-backed applications, embed UI directly inside Codebolt, or host the engine yourself."
        columns: 4
        gap: "none"
        items:
          - title: "Client SDK or Cloud API"
            tag: "External app"
            description: "Connect a third-party product to Codebolt through the <a href='/products/sdk'>Client SDK</a> or Cloud API. Your app keeps its own UI while Codebolt supplies agents, threads, tasks, jobs, git, memory, environments, and real-time sockets."
            span: 2
            visual: |
              your product
                 │ REST + WebSocket
                 ▼
              Codebolt server / Cloud API
              ├─ agents + threads
              ├─ tasks + jobs
              ├─ memory + knowledge
              └─ environments + tools
          - title: "Plugin-backed application"
            tag: "Plugin SDK"
            description: "Use the <a href='https://docs.codebolt.ai/docs/04_build-on-codebolt/05_plugins/01_overview'>Plugin SDK</a> as the backend for app features. The plugin can expose Hono-style routes, validate requests, run engine APIs, push events, and keep application logic close to the runtime."
          - title: "Dynamic panels"
            tag: "In-app UI"
            description: "Open <a href='https://docs.codebolt.ai/docs/04_build-on-codebolt/04_custom-uis/05_dynamic-panels'>dynamic panels</a> inside Codebolt so the application UI lives directly in the editor. Agents and plugins can open, update, stream to, and close panels during a workflow."
          - title: "Self-hosted engine"
            tag: "Embedded runtime"
            description: "Run Codebolt on your own server or infrastructure like an agent framework, but with engine-level capabilities already included: agents, plugins, memory, orchestration, provider routing, environments, and UI extension points."
          - title: "Cloud-scale backend agents"
            tag: "Scale"
            description: "Let applications invoke Cloud agents as backend workers. Codebolt Cloud can route runs, start sandboxes, stream status, preserve run state, and scale agent invocations independently from the application frontend."
          - title: "Runtime-native features"
            tag: "Engine"
            description: "Applications inherit engine primitives instead of rebuilding them: agent management, multi-agent coordination, plugin execution, memory, evals, tasks, jobs, environment lifecycle, logs, and provider/model routing."

      - type: feature-block
        kicker: "01 · CLIENT SDK AND API"
        heading: "Build any interface on top of Codebolt"
        body: "A third-party product can connect directly to a local Codebolt server or Codebolt Cloud using the Client SDK and APIs. That product can keep its own frontend, auth, domain model, and business workflow while delegating agent execution, task management, jobs, git operations, memory, environment control, and real-time updates to Codebolt. This is the lightest way to make an existing product Codebolt-native."
        cta: { label: "Explore the SDK", href: "/products/sdk" }
        diagram: |
          React / SaaS / internal tool
              │
              ├─ REST APIs
              ├─ WebSocket events
              └─ Cloud API
                    │
                    ▼
          Codebolt runtime
              ├─ chat + threads
              ├─ tasks + jobs
              ├─ agents + execution
              ├─ git + files
              ├─ memory + knowledge
              └─ environments

      - type: feature-block
        kicker: "02 · PLUGIN BACKEND"
        heading: "Use a plugin as the application backend"
        body: "For deeper integration, a Codebolt plugin can become the backend for a web application surface. The feedback form plugin is the small version of this pattern: the UI calls a plugin route, the plugin handles the request, updates state, emits events, and can use the full engine context. Larger applications can use the same shape for approvals, dashboards, review tools, business workflows, or vertical agent products."
        reverse: true
        cta: { label: "Read plugin-backed UI docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/04b_custom-agentic-applications/04_plugin-backed-uis" }
        diagram: |
          UI panel
              │ codeboltPlugin.fetch('/feedback')
              ▼
          plugin.dynamicPanel.router(panelId)
              ├─ validate request
              ├─ call engine APIs
              ├─ run agents / jobs
              ├─ emit live events
              └─ return JSON

          plugin is the backend
          Codebolt is the runtime

      - type: feature-block
        kicker: "03 · DYNAMIC PANELS"
        heading: "Turn Codebolt into the application shell"
        body: "A Codebolt-native application can run inside the Codebolt Editor itself. Dynamic panels let plugins and agents create application UI at runtime, stream data into it, receive user actions, and adapt the interface to the workflow. That means Codebolt can become a planning tool, review console, support dashboard, data labeling surface, operations cockpit, or any domain app that needs agents as first-class workers."
        cta: { label: "Explore dynamic panels", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/04_custom-uis/05_dynamic-panels" }
        diagram: |
          Codebolt Editor
              │
              ├─ project workspace
              ├─ agent threads
              ├─ terminal / files / git
              └─ dynamic app panels
                     ▲
                     │ messages + events
                     ▼
          plugin backend + engine APIs

          the editor becomes your app shell

      - type: feature-block
        kicker: "04 · CLOUD AND SELF-HOST"
        heading: "Run the same application locally, in Cloud, or on your infrastructure"
        body: "The application does not have to care whether work runs on a laptop, a cloud sandbox, a local server, or your own infrastructure. Codebolt can be used like an agent framework, but the framework already includes runtime UI, plugin lifecycle, memory, task state, environment routing, multi-agent coordination, and operational visibility. For Codebolt Cloud, applications can call backend agents through the API and scale each invocation independently."
        reverse: true
        cta: { label: "Explore Cloud", href: "/products/cloud" }
        diagram: |
          Codebolt-native app
              │
              ├─ local Codebolt server
              ├─ Codebolt Cloud API
              ├─ self-hosted engine
              └─ remote environments

          same app contract
          different execution topology

      - type: comparison-columns
        problem:
          heading: "Normal AI apps"
          items:
            - "Treat AI as a chat sidebar or one-off API call"
            - "Rebuild agent state, memory, task tracking, logs, and execution management from scratch"
            - "Need a separate backend for orchestration, tool access, scheduling, and long-running jobs"
            - "Often stop at one agent in one environment"
            - "Have to invent their own UI extension and plugin model"
        solution:
          heading: "Codebolt-native apps"
          items:
            - "Use Codebolt as the backend runtime for agents, plugins, memory, jobs, tasks, and environments"
            - "Can run as standalone apps, plugin-backed apps, dynamic panels, Cloud API clients, or self-hosted engine deployments"
            - "Get multi-agent coordination and multi-environment scaling as runtime capabilities"
            - "Can turn the Codebolt Editor into a custom application shell"
            - "Build domain software on top of an engine that can evolve the agents, plugins, and UI around the workflow"

      - type: feature-block
        kicker: "05 · WHAT YOU GET BY DEFAULT"
        heading: "Application infrastructure that already understands agents"
        body: "The reason this matters is leverage. A Codebolt-native application starts with the engine features already in place: agent portfolios, custom agents, plugins, memory, tasks, jobs, files, git, terminals, environment providers, model routing, event streams, observability, evaluations, and dynamic UI. Instead of building a server around an agent, you build the application on an engine that already knows how agent work behaves."
        diagram: |
          engine capabilities
          ├─ agent management
          ├─ custom agents + plugins
          ├─ memory + knowledge
          ├─ tasks + jobs + goals
          ├─ files + git + terminals
          ├─ model/provider routing
          ├─ local/cloud environments
          ├─ observability + evals
          └─ dynamic panels

          your app composes these
          instead of rebuilding them

      - type: cta-block
        heading: "Build applications around the engine, not beside it."
        buttons:
          - { label: "Read App Docs", href: "https://docs.codebolt.ai/docs/04_build-on-codebolt/04b_custom-agentic-applications/01_overview", variant: "primary" }
          - { label: "Explore Codebolt Editor", href: "/products/editor", variant: "secondary" }

