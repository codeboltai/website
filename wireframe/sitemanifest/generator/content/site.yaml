  # ── Use Case: Orchestration ────────────────
  - slug: "use-cases/orchestration"
    title: "Codebolt Orchestration — Multi-Agent at Scale"
    sections:

      - type: page-header
        title: "Codebolt as Orchestration Engine"
        subtitle: "50-100+ agents across multiple environments. Coordination, governance, and scaling — built into the engine."

      - type: centered-text
        variant: "thesis"
        text: "When you need more than one agent, you need orchestration. Not a layer on top of 5 different tools — an engine that runs agents AND coordinates them. Stigmergy-based coordination, agent deliberation councils, automatic review and merge, drift tracking, and guardrails."

      - type: feature-block
        heading: "Stigmergy-based coordination"
        body: "Traditional multi-agent systems use direct message passing — fragile and doesn't scale. Codebolt uses stigmergy: agents communicate through structured shared state. Pheromone-based task ownership prevents conflicts. The engine manages sequencing, dependencies, and resource allocation."
        diagram: |
          Agent A → shared state ← Agent B
                         ↕
          Agent C → shared state ← Agent D
          Pheromones: ownership signals
          No direct messaging needed
          Scales: 2 agents → 200 agents

      - type: feature-block
        heading: "Multi-environment scaling"
        body: "The provider system lets one Codebolt instance treat another as a coordinated environment. Run agents across local, Docker, cloud, and hierarchical setups. Each environment has full lifecycle management with heartbeat monitoring. Git bundles transfer state between environments."
        reverse: true
        diagram: |
          Main Instance
                │
          ┌─────┼──────┐
          ↓     ↓      ↓
          local docker  cloud
          │      │      │
          └──────┼──────┘
           git bundle state transfer
           heartbeat monitoring

      - type: feature-block
        heading: "What Paperclip can't do"
        body: "Paperclip orchestrates agents but doesn't run them. You need to bring Claude Code, OpenClaw, Cursor, and wire them together. Codebolt IS the engine — it runs agents AND orchestrates them. One system instead of five tools stitched together. And every agent has access to the full 63-module SDK, not just whatever each external tool exposes."
        diagram: |
          Paperclip:
          ✓ Org charts, budgets, governance
          ✗ Doesn't run agents
          ✗ Requires external tools
          ✗ Limited by each tool's API

          Codebolt Orchestration:
          ✓ Runs agents (63-module SDK)
          ✓ Coordinates (stigmergy)
          ✓ Governance (guardrails)
          ✓ One engine, not five tools

      - type: feature-block
        heading: "Agent deliberation and automatic review"
        body: "Agents propose options, debate tradeoffs, vote, and reach consensus. Review-merge requests let agents review each other's work without GitHub PR bottleneck. Conflict detection runs before merge. Drift tracking catches deviation across all agents. Every decision is logged and traceable."
        reverse: true
        diagram: |
          Agent A: implements feature
          Agent B: reviews code
          Agent C: checks for conflicts
          Agent D: runs tests
                ↓
          Auto-merged. Decision logged.
          No human bottleneck needed.

      - type: cta-block
        heading: "Orchestration built into the engine."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Explore the Engine", href: "/engine", variant: "secondary" }

