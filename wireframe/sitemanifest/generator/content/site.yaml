        text: "We saw the gap between what AI agents promise and what they can actually deliver. The bottleneck isn't intelligence — it's the engine. We built the engine."

      - type: two-column-text
        columns:
          - heading: "What everyone is building"
            body: "Smarter models. Better prompts. Faster autocomplete. Personal assistants for your inbox. Copilots that finish your sentences. Each tool does one thing."
