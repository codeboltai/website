            cta: { label: "Talk to Engineering", href: "mailto:eng@codebolt.ai", variant: "secondary" }

      - type: accordion
        heading: "FAQ"
        items:
          - question: "How is Codebolt different from Cursor or Claude Code?"
            answer: "Cursor and Claude Code are agents you use. Codebolt is a platform you build on. You can write custom agents with a full 63-module SDK, build applications as plugins, and coordinate multiple agents across environments. They're tools. Codebolt is infrastructure."
          - question: "How is Codebolt different from OpenClaw or personal AI assistants?"
            answer: "OpenClaw is a great personal assistant for your inbox, calendar, and daily tasks. Codebolt is a development platform for building, running, and coordinating AI agents that write software. Different purpose, different architecture. You might use both — OpenClaw for personal automation, Codebolt for development."
          - question: "How is Codebolt different from LangChain or CrewAI?"
            answer: "LangChain and CrewAI are libraries for building agents. Codebolt is a complete platform — IDE, execution environment, coordination engine, and deployment infrastructure. Frameworks give you tools to build agents. Codebolt gives you a place for them to run, coordinate, and scale."
          - question: "I'm using one agent today. Is this for me?"
            answer: "Yes. Start with one agent and the full SDK. You get more power than any free coding tool because you control the agent loop, not just the prompt. When you're ready to add more agents, the platform scales with you."
          - question: "Can I run this headless in CI/CD?"
            answer: "Yes. Codebolt runs as a headless server via the CLI. Spawn Docker environments, run agents, transfer state, and monitor progress — all without a GUI."
          - question: "Is Codebolt a VS Code fork?"
            answer: "No. Codebolt is built from the ground up. The architecture starts with agent coordination as the foundation. The editor uses Monaco (the same editor component as VS Code) but the platform, runtime, and coordination layers are entirely original."
          - question: "Which AI models does Codebolt support?"
            answer: "All of them. 17+ cloud providers (OpenAI, Anthropic, Google, Mistral, Groq, DeepSeek, etc.) plus local models via Ollama and LM Studio. Per-agent and per-task model selection. Use GPT for planning, Claude for coding, and a local model for repetitive tasks — all in the same workflow."

