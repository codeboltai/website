                      - "Environment interval: 15s"
                      - "Warning threshold: 2 missed"
                      - "Restart threshold: 3 missed"
                      - "Max restart attempts: 2"
                      - "Restart cooldown: 60s"
                  - heading: "STATUS ESCALATION"
                    items:
                      - { type: "arrow", text: "healthy → warning → critical → dead" }
                  - heading: "ACTIONS"
                    items:
                      - "Auto-restart on critical"
                      - "Emit events · update UI"
        stateRail:
          label: "RUNTIME STATE — PLUGIN + ENVIRONMENT TRACKING"
          columns: 6
          items:
            - { name: "pluginRegistry", desc: "discovered plugins" }
            - { name: "pluginProcesses", desc: "running children" }
            - { name: "environmentRecords", desc: "lifecycle state" }
            - { name: "providerRegistry", desc: "cloud + local" }
            - { name: "heartbeatStatus", desc: "health tracking" }
            - { name: "claimsRegistry", desc: "gateway permissions" }
        distinctions:
          - label: "DISTINCTION"
            text: "Plugins run in separate child processes — crash of one plugin never affects the server or other plugins."
          - label: "DISTINCTION"
            text: "Providers are plugins too. The RemoteExecutionPlugin claims the ExecutionGateway to enable cross-environment agent proxy calls."
          - label: "DISTINCTION"
            text: "Heartbeat is bidirectional: the server pings providers and providers ping the server, so both sides detect failure."

