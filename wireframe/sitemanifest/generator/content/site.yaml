pages:

  # ── Homepage ────────────────────────────────
  - slug: ""
    title: "Codebolt — The Most Powerful Agent Engine Ever Built"
    navbar_variant: "transparent"
    sections:

      - type: hero
        heading: "The Most Powerful Agent Engine Ever Built"
        subheading: "One engine that can be a coding CLI, an IDE, a personal agent, a large-scale orchestration system, or the infrastructure for an autonomous company. Start simple. Scale without limits."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "See the Engine", href: "/engine", variant: "secondary" }

      - type: highlight-banner
        tone: "accent"
        content: |
          Start like Claude Code. Scale like nothing else exists. <span class="text-primary">One engine. Every scale.</span>

      - type: stat-grid
        tone: "muted"
        columns: 4
        stats:
          - { label: "SDK Modules", value: "63+" }
          - { label: "LLM Providers", value: "17+" }
          - { label: "Communication Channels", value: "3" }
          - { label: "Environments", value: "Unlimited" }

      - type: centered-text
        variant: "thesis"
        text: "Claude Code is an agent. OpenClaw is an assistant. Cursor is an editor. Codebolt is the engine that can become any of them — and scale beyond all of them."

      # ── Scale Spectrum ──
      - type: progression-strip
        kicker: "THE SCALE SPECTRUM"
        heading: "One Engine. Every Scale."
        description: "The same engine powers every level. Start anywhere. Scale without rebuilding."
        steps:
          - label: "CLI"
            description: "A coding agent in your terminal. One agent, full SDK."
            reference: "Like Claude Code"
          - label: "IDE"
            description: "Desktop editor with agent workspace and plugin panel."
            reference: "Like Cursor"
          - label: "Personal Agent"
            description: "24/7 agent with persistent memory and plugin integrations."
            reference: "Like OpenClaw / Hermes"
          - label: "Orchestration"
            description: "50-100+ agents coordinated across environments."
            reference: "Beyond any single tool"
          - label: "Autonomous Company"
            description: "Business domains as plugins. Agents coordinate across all of them."
            reference: "Like Paperclip, but built-in"

      # ── Codebolt in Multiple Formats ──
      - type: card-grid
        heading: "One Engine. Every Format."
        columns: 2
        cards:
          - title: "Codebolt as CLI"
            body: "A coding agent in your terminal. Like Claude Code, but with a 63-module SDK, any LLM provider, and the ability to spawn environments, run plugins, and scale to multi-agent when you're ready. Start here."
            visual: |
              $ codebolt --agent my-agent
              $ codebolt --prompt "refactor auth"
              $ codebolt --server (headless)
          - title: "Codebolt as IDE"
            body: "A full desktop IDE with Monaco editor, integrated terminal, file explorer, and agent workspace. Like Cursor, but you control the agents. Write custom agents. Install plugins. Coordinate multiple agents on the same codebase."
            visual: |
              Electron + Monaco Editor
              Agent panel + Terminal
              Plugin system + TUI sidebar
          - title: "Codebolt as Personal Agent"
            body: "A 24/7 agent with persistent memory, plugin integrations, and proactive capabilities. Like OpenClaw, but running on a platform with 63+ SDK modules, multi-environment support, and a plugin system that connects to everything."
            visual: |
              Persistent memory (3-tier)
              Plugin integrations
              Proactive scheduling
              Always running, always learning
          - title: "Codebolt as Orchestration Engine"
            body: "Run 50-100+ agents across Docker, cloud, and hierarchical environments. Stigmergy-based coordination, agent deliberation councils, automatic review and merge, drift tracking. The infrastructure for autonomous companies."
            visual: |
              50+ agents → coordinated
              Multi-environment scaling
              Auto review & merge
              Drift tracking + guardrails

      - type: quote-block
        variant: "muted"
        align: "center"
        quote: "The same engine that powers a simple coding CLI also powers a 100-agent autonomous company. Everything you build — agents, plugins, memory, workflows — carries forward as you scale."
        attribution: "Codebolt Engineering"

      # ── About the Engine ──
      - type: centered-text
        variant: "identity"
        text: "About the Engine"

      - type: feature-block
        heading: "Scales from one agent to an autonomous company"
        body: "Codebolt is an advanced agent execution engine that scales from running a single coding agent to orchestrating hundreds of agents across multiple systems. It is more extensible than any other system in the market — giving you complete control over agents and their execution. It incorporates stigmergy-based coordination, narrative management, drift tracking, and swarm intelligence to handle 100+ agents running across multiple environments simultaneously."
        diagram: |
          1 agent ──→ CLI / coding tool
                    ↓
          5 agents ──→ IDE / team workspace
                    ↓
          20 agents ──→ personal agent / workflows
                    ↓
          100+ agents ──→ autonomous company

      - type: comparison-columns
        problem:
          heading: "Other tools"
          items:
            - "Claude Code — great CLI agent, but you can't customize the loop or scale beyond one agent"
            - "Cursor — great IDE, but agents are fixed and there's no plugin system"
            - "OpenClaw — great personal agent, but no multi-agent coordination or enterprise scaling"
            - "LangChain/CrewAI — agent frameworks, but no execution environment"
            - "Each tool is one thing. If you outgrow it, you start over."
        solution:
          heading: "Codebolt"
          items:
            - "One engine that starts as a CLI and scales to orchestrate 100+ agents"
            - "Full control over the agentic loop — write agents in code, not prompts"
            - "Plugin system with 3 communication channels — plugins run inside the platform"
            - "Multi-environment scaling across local, Docker, cloud, and hierarchical setups"
            - "Everything carries forward. Agents, plugins, memory, workflows — nothing gets rebuilt."

      # ── Competitive Landscape ──
      - type: comparison-table
        kicker: "COMPETITIVE LANDSCAPE"
        heading: "How Codebolt compares"
        description: "Every tool does one thing. Codebolt is the engine that does all of them."
        highlightColumn: 1
        columns:
          - "Capability"
          - "Codebolt"
          - "Claude Code"
          - "OpenClaw"
          - "Paperclip"
          - "Hermes"
          - "Letta"
          - "Cursor"
        rows:
          - label: "What it is"
            values:
              - "Agent engine (CLI → autonomous company)"
              - "CLI coding agent"
              - "Personal AI assistant"
              - "Company orchestrator (manages agents, doesn't run them)"
              - "Self-improving agent framework"
              - "Stateful agent platform"
              - "AI-enhanced IDE"
          - label: "Runs agents"
            values: ["Yes — custom agents via 63-module SDK", "Built-in only", "Built-in only", "No — orchestrates external agents", "Yes — function-calling", "Yes — stateful agents", "Built-in only"]
          - label: "Multi-agent orchestration"
            values: ["Yes — stigmergy, deliberation, 100+ agents", "No", "No", "Yes — org charts, roles, budgets", "No", "Limited", "No"]
          - label: "Scales to"
            values: ["1 to 100+ agents, multi-environment", "1 agent", "1 agent", "Depends on agents you bring", "1 agent (subagents)", "1-10 agents", "1 agent"]
          - label: "Memory system"
            values: ["3-tier (episodic, persistent, context assembly)", "Session only", "Persistent", "None", "Persistent + learning loop", "Persistent (core feature)", "Session only"]
          - label: "Plugin system"
            values: ["Yes — 3 channels (WS, Mux, HTTP)", "Skills (limited)", "Skills/integrations", "Agent adapters", "Skills (agentskills.io)", "No", "VS Code extensions"]
          - label: "Formats"
            values: ["CLI + IDE + TUI + Web + headless", "CLI + IDE extensions", "Web + chat apps", "Web dashboard", "CLI + chat apps", "CLI + API", "IDE only"]
          - label: "Self-improving"
            values: ["Yes — memory compounds, context optimizes", "No", "Yes — writes own skills", "No", "Yes — learning loop", "Yes — background subagents", "No"]

      - type: icon-grid
        tone: "muted"
        kicker: "ENGINE CAPABILITIES"
        title: |
          What makes the engine powerful
          63+ modules. 3 channels. Unlimited scale.
        description: "Every capability is available at every scale — from CLI to autonomous company."
        columns: 3
        features:
          - icon: "layers"
            title: "63+ SDK Modules"
            description: "Filesystem, git, browser, terminal, LLM, vector DB, memory, knowledge graph, code search, and more."
          - icon: "cpu"
            title: "3 Communication Channels"
            description: "Agent channel (codeboltjs), Plugin channel (WS + HTTP), Client channel (UI/TUI/Web). Each serves a purpose."
          - icon: "git-branch"
            title: "Multi-Environment"
            description: "Local, Docker, cloud, hierarchical. State transfer via git bundles. Heartbeat monitoring. Full lifecycle management."
          - icon: "shield"
            title: "Guardrails & Governance"
            description: "Policy engine with LLM risk classification. Per-agent, per-environment, per-phase scoping. Allow, deny, or escalate."
          - icon: "code"
            title: "17+ LLM Providers"
            description: "OpenAI, Anthropic, Google, Mistral, Groq, DeepSeek, Ollama, LM Studio. Per-agent, per-task model selection."
          - icon: "zap"
            title: "Built-in Review & Merge"
            description: "Agents review each other's work. Conflict detection. Pheromone coordination. No GitHub PR bottleneck."

      # ── Reach Everywhere ──
      - type: connectivity-grid
        kicker: "REACH"
        heading: "Reachable from everywhere"
        description: "The engine connects to your entire workflow through its plugin system. Native interfaces plus anything plugins can reach."
        columns: 4
        items:
          - { label: "Terminal / CLI", category: "interface" }
          - { label: "Desktop IDE", category: "interface" }
          - { label: "Web UI", category: "interface" }
          - { label: "TUI", category: "interface" }
          - { label: "WhatsApp", category: "messaging" }
          - { label: "Telegram", category: "messaging" }
