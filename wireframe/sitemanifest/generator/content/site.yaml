  # ── Features ────────────────────────────────
  - slug: "features"
    title: "Features — Codebolt"
    sections:

      - type: page-header
        title: "What the environment handles."
        subtitle: "Every capability exists because it solves a real problem at scale."

      - type: feature-block
        heading: "Agents coordinate. They don't collide."
        body: "Traditional multi-agent setups are parallel LLM calls sharing a context buffer. Codebolt uses stigmergy-based coordination — agents communicate through structured shared state, not fragile message passing. The environment manages sequencing, dependencies, and resource allocation."
        diagram: |
          ┌──────────────────────┐
          │  Agent Coordination  │
          │         Flow         │
          ├──────────────────────┤
          │ Agent A → shared state│
          │ Agent B → shared state│
          │ Agent C → shared state│
          ├──────────────────────┤
          │ sequencing │ deps    │
          │ resource allocation  │
          └──────────────────────┘

      - type: feature-block
        heading: "Drift tracking catches what code review can't."
        body: "The drift engine evaluates structural, scope, constraint, and coverage drift at two levels: local assessment within Rust engine instances and global coordination in JavaScript. When agents deviate from the original intent, the system flags it before the deviation compounds."
        reverse: true
        diagram: |
          Intent
            ↓
          Plan → [drift check]
            ↓
          Code → [drift check]
            ↓
          Output

          Rust (local) + JS (global)

      - type: feature-block
        heading: "One codebase. Multiple environments. Zero manual merging."
        body: "Agents operate across local, staging, feature branches, and production contexts simultaneously. The narrative versioning system tracks what changed, why, and by which agent — then reconciles across environments automatically."
        diagram: |
          local ─────┐
          staging ────┤
          feature/a ──┤→ reconciliation
          feature/b ──┤   engine
          production ─┘

      - type: feature-block
        heading: "Agent conflicts are a system problem. The system solves them."
        body: "When two agents make incompatible changes to the same file, the environment resolves it using structured arbitration. No merge conflicts in your terminal. No manual intervention. The system handles disagreements the way a well-run engineering team would — with clear rules and traceable decisions."
        reverse: true
        diagram: |
          conflict detected
                ↓
          structured arbitration
                ↓
          resolution applied
                ↓
          decision logged

      - type: feature-block
        heading: "Every agent decision is traceable and replayable."
        body: "The execution trace graph captures the full reasoning chain for every agent action. You can replay any decision, audit any change, and understand exactly why your codebase looks the way it does. This is what makes enterprise deployment possible."
        diagram: |
          t0 → t1 → t2 → t3
          │    │    │    │
          decision trace graph

          [replay any point]
          [audit any change]

      - type: feature-block
        heading: "Structured intelligence modules. Not prompt templates."
        body: "AI Playbooks encode domain knowledge, architectural constraints, and decision patterns into structured modules that agents consume. They're how you give agents context without giving them your entire codebase. Reusable, composable, versionable."
        reverse: true
        diagram: |
          ┌─ Playbook ──────────┐
          │ domain knowledge    │
          │ constraints         │
          │ decision patterns   │
          ├──────────────────────┤
          │ composable          │
          │ versionable         │
          │ reusable            │
          └──────────────────────┘

      - type: cta-block
        heading: "See how it's built."
        buttons:
          - { label: "Explore Architecture", href: "/architecture", variant: "primary" }
          - { label: "Get Started", href: "/pricing", variant: "secondary" }

  # ── Architecture ────────────────────────────
  - slug: "architecture"
    title: "Architecture — Codebolt"
    sections:

      - type: page-header
        title: "Architecture"
        subtitle: "Codebolt is built from the ground up. Here's how."

      - type: diagram-section
        heading: "The 5-Layer Stack"
        layers:
          - { label: "Layer 1 — Editor Interface", tag: "surface", style: "surface" }
          - { label: "Layer 2 — Agent Runtime", tag: "runtime", style: "runtime" }
          - { label: "Layer 3 — Drift Engine", tag: "Rust", style: "drift" }
          - { label: "Layer 4 — Narrative Versioning", tag: "git-tree", style: "versioning" }
          - { label: "Layer 5 — Governance & Coordination Loop", tag: "core", style: "governance" }
        annotation: "Most competitors stop at Layer 2."

      - type: accordion
        heading: "Technical Deep-Dives"
        items:
          - question: "Stigmergy-Based Coordination"
            answer: "Traditional multi-agent systems rely on direct message passing — agents send instructions to each other, creating fragile coupling and scaling bottlenecks. Codebolt uses stigmergy: agents communicate indirectly through structured shared state. Each agent reads from and writes to a shared environment, allowing coordination to emerge without explicit messaging. This is how biological swarms scale to millions of agents — and it's how Codebolt scales beyond the limits of message-passing architectures."
          - question: "The Narrative Engine"
            answer: "The narrative engine is a Rust-based system that maintains a complete record of agent actions, decisions, and reasoning. It uses git trees for snapshot versioning, enabling agent attribution (which agent changed what and why), cross-environment coordination (reconciling work across branches and contexts), and full replay capability. Every change carries its narrative — the intent behind it, not just the diff."
          - question: "Drift Tracking Architecture"
            answer: "Drift tracking operates at two levels. The local Rust engine instances assess drift within individual agent contexts — structural drift (architecture diverging from plan), scope drift (features expanding beyond intent), constraint drift (violations of specified rules), and coverage drift (gaps in implementation). The global JavaScript coordination layer aggregates these signals across all agents, detecting systemic drift patterns that no single agent would catch alone."
          - question: "SCAAB Bundles"
            answer: "SCAAB (Structured Context for Agent-Addressable Bundles) packages encode domain knowledge, architectural decisions, and operational constraints into portable bundles that agents can consume. They provide structured context without requiring agents to process an entire codebase. Bundles are composable, versionable, and designed for cross-agent knowledge sharing."
          - question: "IntentGraph & PlanGraph"
            answer: "IntentGraph captures what should happen — a directed graph of goals, constraints, and success criteria. PlanGraph captures how it should happen — a dependency-ordered execution plan derived from the IntentGraph. Together, they provide the reference frame for drift detection: as agents execute, the system continuously compares actual outcomes against the IntentGraph to catch deviation early."

      - type: accordion
        heading: "Published Research"
        items:
          - question: "Swarm Versioning"
            icon: "→"
            answer: "A framework for versioning agent-generated code at scale, using narrative-preserving git tree structures."
          - question: "IntentGraph"
            icon: "→"
            answer: "Modeling developer intent as a directed graph for drift detection in multi-agent software engineering."
          - question: "StigmergySwarm"
            icon: "→"
            answer: "Applying stigmergic coordination patterns from biological swarm intelligence to multi-agent code generation."

      - type: cta-block
        heading: "Convinced by the engineering."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Read the Docs", href: "https://docs.codebolt.ai", variant: "secondary", external: true }

