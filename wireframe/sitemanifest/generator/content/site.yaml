          - title: "Ground-Up Architecture"
            body: "Not a VS Code fork. Not a wrapper. Built from scratch with agent coordination as the foundation, not a feature bolted on later."
            visual: |
              ┌─ Governance ─┐
              │ Drift Engine │
              │ Agent Runtime│
