  # ── Features ────────────────────────────────
  - slug: "features"
    title: "Features — Codebolt"
    sections:

      - type: page-header
        title: "What the platform handles."
        subtitle: "Every feature solves a real problem that emerges when agents work together at scale."

      - type: feature-block
        heading: "Write custom agents. Not prompts."
        body: "Most tools give you a prompt box. Codebolt gives you a 63-module SDK. Write agents in JavaScript with full access to filesystem, git, browser automation, terminal, LLM, vector database, memory systems, knowledge graphs, and more. Your agent connects as a child process, performs actions through the platform, and results appear in your workspace. This is agent programming, not prompt engineering."
        diagram: |
          codebolt.onMessage(async (msg) => {
            // Your agent logic
            const files = await codebolt.fs.readDir('/src');
            const code = await codebolt.fs.readFile('main.ts');
            const review = await codebolt.llm.chat(
              `Review: ${code}`
            );
            await codebolt.chat.sendMessage(review);
          });
          // 63+ modules available

      - type: feature-block
        heading: "Build applications as plugins. No separate agent needed."
        body: "Plugins connect to the platform through three communication channels — WebSocket actions, multiplexed events, and HTTP REST. Unlike other SDKs, plugins run inside the agentic environment. They don't need to start their own agent instance. This means your CI/CD pipeline, code review system, or deployment automation runs natively inside the platform with full access to agentic capabilities."
        reverse: true
        diagram: |
          ┌──────────────────────────────┐
          │  Your Plugin                 │
          ├──────────────────────────────┤
          │ WS channel → fs, git, llm    │
          │ Mux channel → events, tasks  │
          │ HTTP → CRUD, projects        │
          ├──────────────────────────────┤
          │ Runs inside the platform.    │
          │ No separate agent instance.  │
          └──────────────────────────────┘

      - type: feature-block
        heading: "Agents coordinate. They don't collide."
        body: "Traditional multi-agent setups are parallel LLM calls fighting over shared state. Codebolt uses stigmergy-based coordination — agents communicate through structured shared state, not fragile message passing. Pheromone-based task ownership prevents agents from stepping on each other's work. The environment manages sequencing, dependencies, and resource allocation."
        diagram: |
          ┌──────────────────────────┐
          │  Stigmergy Coordination  │
          ├──────────────────────────┤
          │ Agent A → shared state   │
          │ Agent B → shared state   │
          │ Agent C → shared state   │
          ├──────────────────────────┤
          │ Pheromones: ownership     │
          │ Sequencing: dependencies  │
          │ Resources: allocation     │
          └──────────────────────────┘

      - type: feature-block
        heading: "Multi-environment scaling. One platform, many worlds."
        body: "Agents operate across local, Docker, cloud, and hierarchical environments simultaneously. The provider system lets one Codebolt instance treat another as a coordinated environment — spawning, monitoring, and transferring state between them. Each environment runs its own agent instances with heartbeat monitoring and full lifecycle management. Build once, deploy everywhere."
        reverse: true
        diagram: |
          Main Codebolt Instance
                │
          ┌─────┼──────┐
          ↓     ↓      ↓
          local docker  cloud
          env    env    env
          │      │      │
          └──────┼──────┘
           reconciled by platform
           state transfer via git bundles

      - type: feature-block
        heading: "Agent conflicts are a system problem. The system solves them."
        body: "When two agents make incompatible changes to the same file, the platform resolves it using structured arbitration. No merge conflicts in your terminal. No manual intervention. The system handles disagreements with clear rules and traceable decisions. This is what makes running 50 agents on one codebase possible."
        diagram: |
          conflict detected
                ↓
          structured arbitration
                ↓
          resolution applied
                ↓
          decision logged + traceable

      - type: feature-block
        heading: "Automatic review and merge. No GitHub PR bottleneck."
        body: "Agents create review-merge requests for their changes. Other agents provide feedback — approve, request changes, or comment. Conflict detection runs before merge. Pheromone-based coordination prevents overlapping work. This enables agents to do long tasks in parallel, review each other's output, and merge without human intervention. Autonomous software development requires autonomous code review."
        reverse: true
        diagram: |
          Agent A: implements feature
                ↓
          Review request created
                ↓
          Agent B: reviews, approves
                ↓
          Agent C: checks conflicts
                ↓
          Auto-merged. No human needed.

      - type: feature-block
        heading: "Agent Deliberation Council"
        body: "Agents can propose options, debate, vote, and reach consensus. The deliberation system supports decision, review, brainstorm, approval, and vote types. This is how agents make architectural decisions together — not by one agent guessing, but by multiple agents reasoning and agreeing. The system logs every deliberation for full traceability."
        diagram: |
          Agent A proposes option 1
          Agent B proposes option 2
                ↓
          Agents discuss tradeoffs
                ↓
          Vote: 3 for option 1, 2 for option 2
                ↓
          Consensus reached. Decision logged.

      - type: feature-block
        heading: "Drift tracking catches what code review can't."
        body: "The drift engine evaluates structural, scope, constraint, and coverage drift at two levels: local Rust assessment within each agent context, and global JavaScript coordination across all agents. When agents deviate from the original intent, the system flags it before the deviation compounds. This is how you maintain coherence across 50 agents working simultaneously."
        reverse: true
        diagram: |
          Intent
            ↓
          Plan → [drift check]
            ↓
          Code → [drift check]
            ↓
          Output
          Rust (local) + JS (global)
          4 dimensions: structure, scope,
          constraints, coverage

      - type: feature-block
        heading: "Every decision is traceable and replayable."
        body: "The Rust-based Narrative Engine captures the full reasoning chain for every agent action. Per-thread git history with snapshot versioning. Agent attribution for every change — what changed, why, and by which agent. You can replay any decision, audit any change, and understand exactly why your codebase looks the way it does. This is what makes enterprise deployment possible."
        diagram: |
          t0 → t1 → t2 → t3
          │    │    │    │
          Full decision trace graph
          Per-thread git refs
          Intent + diff + attribution
          [replay any point]

      - type: feature-block
        heading: "Governance, guardrails, and guardrails for guardrails."
        body: "The policy engine evaluates rules and LLM classification for agent tool permissions. Scoped by agent role, agent ID, environment, provider, and execution phase. Decisions: allow, deny, or ask (require human approval). Per-agent and per-task LLM selection. Local model support including fine-tuned models. This is how you let agents run autonomously without losing control."
        reverse: true
        diagram: |
          Agent wants to: delete production DB
                ↓
          Guardrail engine evaluates:
          - Agent role: junior
          - Environment: production
          - Risk classification: HIGH
                ↓
          Decision: DENY
          Escalate to human: ASK
                ↓
          All decisions logged + auditable

      - type: feature-block
        heading: "Three-tier memory. Because context is everything."
        body: "Episodic memory provides time-based recall of past interactions. Persistent memory stores structured knowledge with chunking, embedding, and retrieval pipelines. The Context Assembly Engine assembles optimal context from all memory types using rules, pipelines, and token budgets. Agents don't just remember — they know what to remember."
        diagram: |
          ┌────────────────────────────┐
          │  Context Assembly Engine   │
          ├────────────────────────────┤
          │ Episodic → time-based      │
          │ Persistent → structured    │
          │ Rules → what to include    │
          │ Pipelines → how to process │
          │ Token budget → constraints │
          ├────────────────────────────┤
          │ Optimal context to LLM     │
          └────────────────────────────┘

      - type: feature-block
        heading: "One platform. Every interface."
        body: "Desktop IDE (Electron with Monaco editor). Web interface. Go-based TUI with sidebar panels. Full CLI with headless server mode. All backed by the same core engine through the HostBridge abstraction. Use the interface that fits your workflow — the platform stays the same."
        reverse: true
        diagram: |
          ┌─ Electron IDE ──────┐
          │ Web UI              │
          │ Go TUI              │
          │ CLI / Headless      │
          ├─────────────────────┤
          │ HostBridge           │
          │ (portability layer)  │
          ├─────────────────────┤
          │ Core Engine          │
          └─────────────────────┘

      - type: cta-block
        heading: "See how it's built."
        buttons:
          - { label: "Explore Architecture", href: "/architecture", variant: "primary" }
          - { label: "View Use Cases", href: "/use-cases", variant: "secondary" }

  # ── Architecture ────────────────────────────
  - slug: "architecture"
    title: "Architecture — Codebolt"
    sections:

      - type: page-header
        title: "Architecture"
        subtitle: "Codebolt is built from the ground up as an agent platform, not an editor with agents bolted on."

      - type: diagram-section
        heading: "The Platform Stack"
        layers:
          - { label: "Interface Layer — IDE, TUI, CLI, Web", tag: "surface", style: "surface" }
          - { label: "Communication Layer — Agent, Plugin, Client SDKs", tag: "runtime", style: "runtime" }
          - { label: "Coordination Layer — Stigmergy, Deliberation, Pheromones", tag: "coordination", style: "drift" }
          - { label: "Intelligence Layer — Drift Engine, Narrative Versioning (Rust)", tag: "Rust", style: "versioning" }
          - { label: "Infrastructure Layer — Governance, Environments, Providers", tag: "core", style: "governance" }
        annotation: "Other tools are Layer 1-2. Agent frameworks are Layer 2 only. Codebolt is all five."

      - type: accordion
        heading: "Platform Architecture"
        items:
          - question: "Three Communication Channels"
            answer: "Codebolt exposes three communication paths. The Agent Channel (codeboltjs) lets external agents connect as child processes with 63+ API modules. The Plugin Channel (plugin SDK) provides three sub-channels — WebSocket for actions, multiplexed events for real-time updates, and HTTP REST for CRUD — enabling applications to run inside the platform without separate agent instances. The Client Channel (client SDK) connects UIs (Electron, Web, TUI) with 72 REST modules and 33 WebSocket modules. Each channel serves a distinct purpose: agents do work, plugins connect the platform to the world, clients give you control."
          - question: "HostBridge: Run Anywhere"
            answer: "The core engine never calls platform APIs directly. Instead, it defines a HostBridge interface for process spawning, SQLite, Kuzu graph DB, and ONNX inference. Each runtime implements its own bridge: Electron uses UtilityProcess and TypeORM, CLI uses child_process and better-sqlite3, TUI connects via WebSocket proxy. This is how one codebase powers a desktop IDE, a CLI tool, and a headless server with identical capabilities."
          - question: "The Provider/Environment System"
            answer: "Providers manage compute environments. The built-in Docker provider creates containers running a dockerserver that connects back to the main instance. Each environment has a full lifecycle — CREATED, STARTING, RUNNING, STOPPING, STOPPED — with heartbeat monitoring. The Narrative Engine snapshots workspace state per-environment, and git bundles transfer state between them. The main system controls environment spawning and closing, and even agents have access to environment management. This enables hierarchical setups where one Codebolt instance orchestrates many others."
          - question: "Agent Lifecycle"
            answer: "Agents are discovered from a marketplace API, cached locally, and spawned as child processes. They connect via codeboltjs, call waitForReady(), then handle messages and invoke API modules. The platform manages agent registration, status tracking, and lifecycle events. Agents can spawn child agents, participate in swarms, join deliberation councils, create review-merge requests, and manage other agents — all through the SDK."
          - question: "Plugin Lifecycle"
            answer: "Plugins are discovered from project .codeboltPlugins/ directories and global ~/.codebolt/plugins/. Each plugin declares itself in package.json with a codebolt.plugin key. The PluginProcessManager handles loading, starting, stopping, and trigger-based auto-start. Plugins receive a PluginContext with their ID, directory, and manifest. They can perform any action an agent can, plus subscribe to real-time events and make HTTP API calls."

      - type: accordion
        heading: "Research Foundations"
        items:
          - question: "Stigmergy-Based Coordination"
            answer: "Traditional multi-agent systems rely on direct message passing — agents send instructions to each other, creating fragile coupling and scaling bottlenecks. Codebolt uses stigmergy: agents communicate indirectly through structured shared state. Each agent reads from and writes to a shared environment, allowing coordination to emerge without explicit messaging. This is how biological swarms scale to millions of agents — and it's how Codebolt scales beyond the limits of message-passing architectures."
          - question: "Pheromone-Based Task Ownership"
            answer: "Inspired by ant colony optimization, agents deposit 'pheromones' on tasks and files to signal interest and ownership. Pheromone types are configurable. The aggregation system handles conflict resolution when multiple agents show interest in the same work. Lock/unlock mechanisms provide exclusive access when needed. This prevents the coordination breakdown that happens when agents independently decide to work on the same code."
          - question: "The Narrative Engine (Rust)"
            answer: "A Rust-based 'flight recorder' that maintains a complete record of agent actions, decisions, and reasoning. It uses shadow git for snapshot versioning with a narrative hierarchy: Objective → Thread → Agent Run → Snapshot. Per-thread commit branches (refs/threads/<thread_id>) provide agent-specific history. Git bundles transfer snapshots between environments. Every change carries its narrative — the intent behind it, not just the diff."
          - question: "Drift Tracking: Two-Level Architecture"
            answer: "Drift tracking operates at two levels. Local Rust engine instances assess drift within individual agent contexts — structural drift (architecture diverging from plan), scope drift (features expanding beyond intent), constraint drift (violations of specified rules), and coverage drift (gaps in implementation). The global JavaScript coordination layer aggregates these signals across all agents, detecting systemic drift patterns that no single agent would catch alone."
          - question: "Agent Deliberation Council"
            answer: "Agents participate in structured deliberations: propose options, respond, vote, and reach consensus. Deliberation types include decision, review, brainstorm, approval, and vote. All deliberations are stored per-project and fully traceable. This enables agents to make architectural decisions collectively rather than having one agent guess at the right approach."

      - type: accordion
        heading: "Published Research"
        items:
          - question: "Swarm Versioning"
            icon: "→"
            answer: "A framework for versioning agent-generated code at scale, using narrative-preserving git tree structures."
          - question: "IntentGraph"
            icon: "→"
            answer: "Modeling developer intent as a directed graph for drift detection in multi-agent software engineering."
          - question: "StigmergySwarm"
            icon: "→"
            answer: "Applying stigmergic coordination patterns from biological swarm intelligence to multi-agent code generation."

      - type: cta-block
        heading: "Convinced by the engineering."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Read the Docs", href: "https://docs.codebolt.ai", variant: "secondary", external: true }

