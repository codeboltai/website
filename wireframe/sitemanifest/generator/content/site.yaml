              Zero human intervention

      - type: card-grid
        heading: "Enterprise & Teams"
        cards:
          - title: "Governance for Production Agents"
            body: "The guardrail engine evaluates agent actions against configurable policies scoped by role, environment, and execution phase. LLM-based risk classification. Allow, deny, or require human approval. Every decision is logged for audit."
            visual: |
              Policy: production access
              Role: senior agents only
              Risk: LLM-classified
              Decision: logged + auditable
          - title: "Audit Trails & Deterministic Replay"
            body: "Every agent decision is captured in the Narrative Engine's execution trace graph. Replay any point in time. Audit any change. Understand why the codebase looks the way it does. This is what compliance teams need before approving AI in production."
            visual: |
              t0 → t1 → t2 → t3
              Full trace for every agent
              Replay any decision
              Audit any change
          - title: "Team Coordination at Scale"
            body: "When multiple engineers use AI on the same codebase, you need coordination. Pheromone-based ownership prevents conflicting work. Drift tracking catches misalignment. Deliberation councils help agents make collective decisions. The platform handles the complexity so your team doesn't have to."
            visual: |
              Engineer A + Agent 1
              Engineer B + Agent 2
              Engineer C + Agent 3
              → coordinated by platform

      - type: cta-block
        heading: "Whatever you're building, Codebolt scales with you."
        buttons:
          - { label: "Get Started", href: "/pricing", variant: "primary" }
          - { label: "Explore Features", href: "/features", variant: "secondary" }

