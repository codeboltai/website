# ─────────────────────────────────────────────
# PAGES
# ─────────────────────────────────────────────

pages:

  # ── Homepage ────────────────────────────────
  - slug: ""
    title: "Codebolt — AI Engine for Agent-Native Software"
    navbar_variant: "transparent"
    sections:

      - type: hero
        eyebrow: "AGENT-NATIVE SOFTWARE"
        heading: "The self-evolving, swarm-scale AI agent engine"
        headingAccent:
          - "self-evolving"
          - "swarm-scale"
        subheading: "Build software with Codebolt. Run and coordinate hundreds of autonomous agents across laptops, cloud, and fleets. Ship Codebolt-native applications that run directly on the engine runtime."
        buttons:
          - { label: "Download", href: "/download", variant: "primary" }
          - { label: "Read the Docs", href: "/docs", variant: "secondary" }
        media:
          label: "Remote Chat"
          src: "/images/cloud.png"
          alt: "Codebolt remote chat workspace showing a live autonomous agent completing build and server tasks"
          placeholder: "Remote Chat Workspace"

      - type: start-tabs
        eyebrow: "Use Codebolt where you work"
        tabs:
          - label: "CLI"
            body: "Install globally with npm. Run in your terminal. Use a built-in agent or write your own — full SDK access, any LLM provider."
            code: "npm i -g codebolt"
            primary: { label: "Install Guide", href: "/products/cli" }
            more: { label: "View CLI", href: "/products/cli" }
            media:
              label: "~ codebolt"
              src: "/images/cli-1.png"
              alt: "Codebolt CLI terminal interface"
              placeholder: "CLI Terminal"
          - label: "Editor"
            body: "Polished desktop IDE with the engine running locally. Monaco editor, agent workspace, plugin panel. Available for macOS, Windows, and Linux."
            primary: { label: "Download Editor", href: "/download" }
            more: { label: "View Editor", href: "/products/editor" }
            media:
              label: "Codebolt Editor"
              src: "/images/desktop-1.png"
              alt: "Codebolt desktop editor interface"
              placeholder: "Desktop IDE"
          - label: "Cloud"
            body: "Hosted engine in your browser. No install. Spawn workspaces, run agents on managed sandboxes, share state with your team."
            primary: { label: "Open Cloud", href: "https://cloud.codebolt.ai" }
            more: { label: "View Cloud", href: "/products/cloud" }
            media:
              label: "Remote Chat"
              src: "/images/cloud.png"
              alt: "Codebolt remote chat workspace showing a live autonomous agent completing build and server tasks"
              placeholder: "Browser Workspace"
          - label: "SDK"
            body: "Embed the engine in your own product. Agent SDK (63+ modules), Plugin SDK (3 channels), Client SDK (72 REST + 33 WS). Self-host the engine or call it as a service."
            code: "npm i codeboltjs"
            primary: { label: "Get the SDK", href: "/products/sdk" }
            more: { label: "View SDK", href: "/products/sdk" }
            media:
              label: "codeboltjs"
              src: "/images/sdk-editor.png"
              alt: "Codebolt Agent SDK TypeScript editor example"
              placeholder: "Engine, embedded"

      - type: highlight-banner
        tone: "accent"
        content: |
          Start like Claude Code. Scale like nothing else exists. <span class="text-primary">One engine. Every scale.</span>

      - type: stat-grid
        tone: "muted"
        columns: 3
        stats:
          - { label: "SDK Modules", value: "63+" }
          - { label: "LLM Providers", value: "17+" }
          - { label: "Communication Channels", value: "3" }
          - { label: "Environments", value: "Unlimited" }

      - type: centered-text
        variant: "thesis"
        text: "Claude Code is an agent. OpenClaw is an assistant. Cursor is an editor. Codebolt is the engine that can become any of them — and scale beyond all of them."

      # ── What is Agent-Native Software? ──
      - type: icon-grid
        tone: "muted"
        kicker: "WHAT IS AGENT-NATIVE SOFTWARE"
        title: |
          Software that runs itself, improves itself,
          distributes itself, and composes with other software like it.
        description: "Agent-native software has properties traditional software doesn't. Codebolt is the engine that makes them possible."
        columns: 5
        features:
          - icon: "zap"
            title: "Runs itself"
            description: "Autonomous loops, hooks, schedules, webhooks. The agent stays in motion without you driving it. You don't have to be in the loop for work to happen."
          - icon: "git-branch"
            title: "Improves itself"
            description: "Define what good looks like with eval tasks. The optimizer iterates on prompts, tools, and configs across runs. Your agents get measurably better with use, not worse."
          - icon: "layers"
            title: "Distributes itself"
            description: "Lives where customers already are — Slack, Telegram, Discord, email, web. The Routing Gateway carries the same agent to every surface, no glue code."
          - icon: "cpu"
            title: "Composes"
            description: "Agents call agents. Multi-agent by default. Stigmergy, deliberation councils, review-merge — coordination is built in, not bolted on."

      # ── What you can build / run ─────────────────
      - type: section-header
        kicker: "WHAT YOU CAN BUILD"
        kickerDot: "primary"
        align: "center"
        title: "Four things you do on the engine"
        description: "Build software. Build a custom harness. Run autonomous. Build on top — the same engine covers the full arc, from your first agent to applications that run on top of Codebolt."

      - type: feature-block
        kicker: "01 · BUILD WITH CODEBOLT"
        heading: "Build software (and more) with Codebolt"
        body: "Use the <a class='inline-tag' href='/products/editor'>Editor</a>, <a class='inline-tag' href='/products/cli'>CLI</a>, or terminal as a coding partner — like Claude Code, but with <a class='inline-tag' href='/products/sdk'>custom agents</a>, any LLM, and full SDK access. Then push beyond software: spin up agents that draft documents, edit videos, run research, generate decks. Anything an agent can do, you can build a workflow for."
        cta: { label: "See the products", href: "/products/editor" }
        diagram: |
          SOFTWARE
          ├─ codebolt --prompt "refactor user.ts"
          ├─ Editor → multi-agent codebase work
          └─ CLI → build / test / ship loops

          BEYOND SOFTWARE
          ├─ docs-agent      → drafts + reviews
          ├─ video-agent     → edits, captions, cuts
          ├─ research-agent  → gather, summarize, cite
          └─ your-agent      → any domain, any tool

      - type: feature-block
        kicker: "02 · BUILD YOUR HARNESS"
        heading: "Build your custom harness"
        body: "Don't settle for someone else's agent loop. Write <a class='inline-tag' href='/products/sdk'>custom agents</a> in JavaScript with the 63-module SDK — full control over prompts, tools, memory, and routing. Build <a class='inline-tag' href='/engine/system-extensibility'>custom plugins</a> that run inside the engine on three communication channels. Or ship <a class='inline-tag' href='/products/sdk'>custom UIs</a> on top of the Client SDK. Your agents, your tools, your rules."
        reverse: true
        cta: { label: "Explore Agent + Plugin SDKs", href: "/products/sdk" }
        image: "/images/harness-code.png"
        imageAlt: "Custom Agent and Plugin SDK code"
        diagram: |
          // Custom Agent — 10 lines, full power
          import { codebolt } from 'codeboltjs';

          codebolt.onMessage(async (msg) => {
            const plan  = await codebolt.llm.plan(msg);
            const code  = await codebolt.fs.read(plan.file);
            const next  = await codebolt.llm.edit(code, plan);
            await codebolt.fs.write(plan.file, next);
            await codebolt.git.commit(`agent: ${plan.summary}`);
          });

          // Custom Plugin — runs inside the engine
          // 3 channels: WebSocket · Mux · HTTP

      # ── BENTO EXPERIMENT (Build harness variant) ──
      - type: bento-grid
        kicker: "BENTO VARIANT · BUILD HARNESS"
        heading: "Build your custom harness"
        description: "Same content as the section above, in a bento grid layout. Compare and pick the one you like."
        columns: 3
        gap: "none"
        items:
          - title: "Custom Agents"
            tag: "AGENT SDK"
            description: "Write agents in JavaScript with 63+ SDK modules. Full control over the agentic loop — prompts, tools, memory, routing."
            href: "/products/sdk"
            span: 2
            visual: |
              import { codebolt } from 'codeboltjs';

              codebolt.onMessage(async (msg) => {
                const plan = await codebolt.llm.plan(msg);
                const code = await codebolt.fs.read(plan.file);
                const next = await codebolt.llm.edit(code, plan);
                await codebolt.fs.write(plan.file, next);
                await codebolt.git.commit(plan.summary);
              });
          - title: "Custom Plugins"
            tag: "PLUGIN SDK"
            description: "Run inside the engine on three channels — WebSocket actions, multiplexed events, HTTP REST."
            href: "/engine/system-extensibility"
            span: 1
            visual: |
              Agent Ch.   → codeboltjs
              Plugin Ch.  → WS · Mux · HTTP
              Client Ch.  → 72 REST + 33 WS
          - title: "Remix Agents"
            tag: "NO-CODE"
            description: "Inherit a base agent. Customize in YAML + Markdown. Git-friendly. No code required."
            span: 1
            visual: |
              # remix.yaml
              base: code-reviewer
              prompts:
                + style: terse
                + lang:  ts
          - title: "Flow Agents"
            tag: "VISUAL"
            description: "Drag-and-drop agent workflows. LiteGraph editor. Compose agents with no code."
            span: 1
            visual: |
              ┌─────┐   ┌─────┐
              │Plan │──▶│Edit │
              └─────┘   └──┬──┘
                           ▼
                       ┌──────┐
                       │Review│
                       └──────┘
          - title: "Custom UI"
            tag: "CLIENT SDK"
            description: "Build dashboards, panels, mobile apps. 72 REST + 33 WebSocket modules."
            href: "/products/sdk"
            span: 1
            visual: |
              72 REST modules
              33 WebSocket modules
              → any UI you want

      - type: feature-block
        kicker: "03 · RUN AUTONOMOUS"
        heading: "Run an autonomous organization"
        body: "Promote your agents to always-on. The <a class='inline-tag' href='/products/autonomous-agent'>24/7 Autonomous Agent</a> runs locally or on <a class='inline-tag' href='/products/cloud'>Codebolt Cloud</a> — proactive scheduling, persistent memory, plugin integrations to the messengers and APIs your business already uses. From one always-on assistant to a full <a class='inline-tag' href='/use-cases/autonomous-companies'>autonomous company</a> with agents managing engineering, QA, deployment, and monitoring as plugins."
        cta: { label: "See the autonomous agent", href: "/products/autonomous-agent" }
        diagram: |
          24/7 AUTONOMOUS AGENT
          ├─ Local or Cloud
          ├─ Persistent memory (3-tier)
          ├─ Hooks · Schedules · Webhooks
          ├─ Plugins → Slack, Email, Calendar, GitHub
          └─ Reaches customers wherever they are

          AUTONOMOUS COMPANY
          ┌───────────┬───────────┬───────────┐
          │ Eng Plugin│ QA Plugin │ Ops Plugin│
          ├───────────┴───────────┴───────────┤
          │   Coordination · Stigmergy · Review│
          │           You direct.              │
          └────────────────────────────────────┘

      - type: feature-block
        kicker: "04 · BUILD ON TOP"
        heading: "Build on top of Codebolt"
        body: "The engine is a substrate, not a destination. Ship <a class='inline-tag' href='/engine/system-extensibility'>custom applications as plugins</a> that ride inside the engine — they get memory, scheduling, multi-agent coordination, and routing for free. Or build <a class='inline-tag' href='/products/cloud'>cloud-native apps</a> on Codebolt Cloud that share the same workspaces, sandboxes, and agent runtime your team already uses."
        reverse: true
        cta: { label: "Explore the Cloud", href: "/products/cloud" }
        diagram: |
          PLUGINS — apps inside the engine
          ├─ vertical IDE         (your own surface)
          ├─ domain workflow      (compliance, sales, ops)
          ├─ developer tool       (review, deploy, monitor)
          └─ runs alongside agents, shares memory + routing

          CLOUD APPS — apps on the hosted engine
          ├─ Browser portal     ← your UI
          ├─ Managed sandboxes  ← your runtime
          ├─ Shared workspaces  ← your team
          └─ Same engine inside.

      # ── ACCORDION EXPERIMENT (Build on top variant) ──
      - type: feature-accordion
        kicker: "ACCORDION VARIANT · BUILD ON TOP"
        heading: "Build on top of Codebolt"
        description: "Same content as the section above, in an accordion-with-visual layout. Click any row to swap the panel."
        items:
          - title: "Custom Plugins"
            icon: "PLG"
            description: "Ship your application as a plugin that runs inside the engine. Get memory, scheduling, multi-agent coordination, and routing for free."
            href: "/engine/system-extensibility"
            visual: |
              YOUR APP (plugin)
              ┌─────────────────────────┐
              │  Your code              │
              │  ↓ Plugin SDK           │
              │  WS · Mux · HTTP        │
              └─────────────────────────┘
                       ↓
                  ENGINE CORE
              ┌─────────────────────────┐
              │ Memory · Scheduling     │
              │ Coordination · Routing  │
              └─────────────────────────┘
          - title: "Cloud-Native Apps"
            icon: "CLD"
            description: "Build apps on Codebolt Cloud that share the same workspaces, sandboxes, and agent runtime your team already uses."
            href: "/products/cloud"
            visual: |
              cloud.codebolt.ai
              ┌─────────────────────────┐
              │  Browser portal    ← UI │
              │  Managed sandboxes ← run│
              │  Shared workspaces ← team│
              │  Same engine inside.    │
              └─────────────────────────┘
                       ↓
              YOUR APP rides the cloud.
          - title: "Vertical IDEs"
            icon: "IDE"
            description: "Compose panels and plugins into a domain-specific IDE — your customers see your surface, not Codebolt's."
            visual: |
              YOUR VERTICAL IDE
              ┌────────────┬────────────┐
              │ Code Panel │ Domain     │
              │            │ Workflow   │
              ├────────────┴────────────┤
              │ Terminal · Custom Tools │
              └─────────────────────────┘
              built from engine parts.
          - title: "Domain Workflows"
            icon: "WF "
            description: "Package compliance, sales, ops, or any vertical workflow as a plugin. Agents pick it up automatically."
            visual: |
              DOMAIN WORKFLOW
              ┌─────────────────────────┐
              │ trigger → policy → log  │
              │   ↓                     │
              │ agent picks task        │
              │   ↓                     │
              │ executes via plugin SDK │
              └─────────────────────────┘
          - title: "Developer Tools"
            icon: "DEV"
            description: "Ship review, deploy, monitor, lint, or any developer-facing tool as a plugin on the engine."
            visual: |
              DEV TOOL PLUGIN
              ┌─────────────────────────┐
              │ Review · Deploy · Lint  │
              │ Monitor · Test · Audit  │
              ├─────────────────────────┤
              │ All on the same engine, │
              │ same agents, same memory│
              └─────────────────────────┘

      # ── Why it's different ──────────────────────
      - type: section-header
        kicker: "WHY IT'S DIFFERENT"
        kickerDot: "primary"
        align: "center"
        title: "Two properties no other agent tool has"
        description: "Self-Improving by design. Hyper-Scaling by architecture. Most agent tools get worse with use and stop at a single environment — Codebolt's engine gets measurably better and scales to 100+ agents across machines."

      - type: feature-block
        kicker: "05 · SELF-IMPROVING"
        heading: "Self-Improving by design"
        body: "Define what good looks like with <a class='inline-tag' href='/architecture'>eval tasks</a>. The optimizer iterates on prompts, tools, and configs across runs and keeps the winners. <a class='inline-tag' href='/architecture'>Three-tier memory</a> compounds knowledge across sessions — episodic, persistent, and a context-assembly engine that decides what each agent sees. The engine even generates new <a class='inline-tag' href='/products/sdk'>agents and plugins</a> dynamically when the work calls for it. Agents get measurably better with use, not worse."
        cta: { label: "Read the architecture", href: "/architecture" }
        diagram: |
          EVALS · OPTIMIZATION
          eval task → score
            ↓
          optimizer → tweak prompt / tools / config
            ↓
          re-run → new score
            ↓
          keep winners. Forever loop.

          MEMORY EVOLUTION
          ├─ Episodic   (what happened, with whom)
          ├─ Persistent (what to remember, forever)
          └─ Context Assembly (what this agent sees now)

          DYNAMIC GENERATION
          ├─ Agents generated on demand
          └─ Plugins composed from existing parts

      - type: feature-block
        kicker: "06 · HYPER-SCALING"
        heading: "Hyper-Scaling by architecture"
        body: "One agent in your terminal is the same engine that coordinates 100+ agents across <a class='inline-tag' href='/engine/multi-environment'>local, Docker, and cloud</a>. Proxy execution chains environments — Env A → B → C, any topology. <a class='inline-tag' href='/engine/multi-agent'>Stigmergy</a> gives you bio-inspired coordination: pheromone task ownership, deliberation councils, automatic review and merge — no GitHub-PR bottleneck. Coordination is built in, not bolted on."
        reverse: true
        cta: { label: "See multi-agent + multi-environment", href: "/engine/multi-environment" }
        diagram: |
          MULTI-ENVIRONMENT
          local ──→ Docker ──→ cloud
                 ↕ proxy execution
          Any topology. Git bundles transfer state.

          COORDINATION
          ├─ Sub-agents (parallel children)
          ├─ Pheromones (task ownership)
          ├─ Deliberation (consensus)
          └─ Auto review & merge (no PR queue)

          STIGMERGY
          Agents leave traces in shared state.
          Other agents pick up the trace.
          Coordination without central control.

      # ── Scale Spectrum ──
      - type: progression-strip
        kicker: "THE SCALE SPECTRUM"
        heading: "One Engine. Every Scale."
        description: "The same engine powers every level. Start anywhere. Scale without rebuilding."
        steps:
          - label: "CLI"
            description: "A coding agent in your terminal. One agent, full SDK."
            reference: "Like Claude Code"
          - label: "Editor"
            description: "Desktop editor with agent workspace and plugin panel."
            reference: "Like Cursor"
          - label: "24/7 Agent"
            description: "Always-on agent with persistent memory and plugin integrations."
            reference: "Like OpenClaw / Hermes"
          - label: "Orchestration"
            description: "50-100+ agents coordinated across environments."
            reference: "Beyond any single tool"
          - label: "Autonomous Company"
            description: "Business domains as plugins. Agents coordinate across all of them."
            reference: "Like Paperclip, but built-in"

      # ── Codebolt Surfaces (Showcase Strip) ──
      - type: showcase-strip
        kicker: "ENGINE · SURFACES"
        heading: "One engine. Every surface."
        subtitle: "Same engine, same SDK, same plugins — different interface for different needs."
        columns: 4
        items:
          - title: "CLI"
            description: "Terminal client. Like Claude Code, but with custom agents and a growth path to multi-agent."
            href: "/products/cli"
            visual: |
              $ codebolt
              $ codebolt --agent my-agent
              $ codebolt --server
              $ codebolt --prompt "..."
          - title: "Editor"
            description: "Desktop editor with Monaco, agent workspace, and plugin panel. Not a fork."
            href: "/products/editor"
            visual: |
              ┌──────────┬──────────┐
              │ Editor   │ Agents   │
              ├──────────┴──────────┤
              │ Terminal │ Plugins  │
              └─────────────────────┘
          - title: "24/7 Autonomous Agent"
            description: "Always-on agent with persistent memory and plugin integrations. Reaches your customers wherever they are."
            href: "/products/autonomous-agent"
            visual: |
              Always-on engine
              ├─ Memory (3-tier)
              ├─ Plugins (external)
              ├─ Hooks (proactive)
              └─ Any LLM provider
          - title: "Cloud"
            description: "Hosted engine with a browser portal. Sandbox runs, shared workspaces, no install."
            href: "/products/cloud"
            visual: |
              cloud.codebolt.ai
              ├─ Browser portal
              ├─ Managed sandboxes
              ├─ Shared workspaces
              └─ Same engine inside

      - type: sdk-callout
        kicker: "BUILD YOUR OWN SURFACE"
        heading: "SDK for products that need the engine inside."
        description: "Use the Agent SDK, Plugin SDK, and Client SDK to embed Codebolt in your own product, ship agent-native apps, or run the engine headless on your infrastructure."
        features:
          - "Agent SDK"
          - "Plugin SDK"
          - "Client SDK"
          - "Self-hosted engine"
        cta: { label: "Explore the SDK", href: "/products/sdk" }

      # ── Engine Pillars (Feature Showcase — Windsurf style) ──
      - type: feature-showcase
        kicker: "THE ENGINE"
        heading: "The pillars of the engine"
        subtitle: "Extensible at every layer. Self-improving by design. Moldable at the surface."
        gap: "none"
        heroFeatures:
          - title: "System Extensibility"
            description: "Three SDKs. Agent SDK (63+ modules), Plugin SDK (3 channels), Client SDK (72 REST + 33 WS). The system is open at every layer."
            href: "/engine/system-extensibility"
            tag: "EXTEND THE SYSTEM"
            visual: |
              Agent SDK → codeboltjs (63+ modules)
              Plugin SDK → WS + Mux + HTTP
              Client SDK → 72 REST + 33 WS
              All open. All extensible.
          - title: "Agent Extensibility"
            description: "Remix agents (no-code YAML), Flow agents (visual graph), Custom agents (full code). 675+ skills across 72 domains. Role-specific LLM configs."
            href: "/engine/agent-extensibility"
            tag: "EXTEND ANY AGENT"
            visual: |
