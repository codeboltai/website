<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Agent-Browser Test Recording</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; background: #111; color: #eee; }
    h1 { color: #0af; }
    .result { background: #1a2a1a; border: 1px solid #3a5; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
    .label { color: #8cf; font-weight: bold; }
    video { width: 100%; border-radius: 8px; margin: 1rem 0; }
    img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>Website Agent-Browser Test Recording</h1>
  <div class="result">
    <p><span class="label">Test:</span> Verify hero heading changed from "agent engine" to "orchestration engine"</p>
    <p><span class="label">Result:</span> PASSED — Heading reads "The self-evolving, swarm-scale AI orchestration engine"</p>
    <p><span class="label">URL tested:</span> http://localhost:64502/</p>
  </div>
  <h2>Test Recording</h2>
  <video controls autoplay muted>
    <source src="test-recording.webm" type="video/webm">
    Your browser does not support the video tag.
  </video>
  <h2>Screenshot</h2>
  <img src="screenshot-hero.png" alt="Homepage hero section screenshot showing the updated heading">
</body>
</html>
