<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud agents as app backends</title>
  <desc id="desc">A Codebolt-native app calls the Cloud API, which routes to agents, sandboxes, events, and run state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FB7185" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#100A12" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">APP BACKEND</text>
  <rect x="68" y="112" width="118" height="96" rx="13" fill="#111827" stroke="#475569"/>
  <text x="127" y="150" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">App UI</text>
  <text x="127" y="176" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">panel / product</text>
  <path d="M204 160H286" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="304" y="116" width="102" height="88" rx="13" fill="#2A0F18" stroke="#FB7185"/>
  <text x="355" y="152" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Cloud API</text>
  <text x="355" y="176" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="11">invoke agent</text>
  <path d="M424 160H488" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="496" y="96" width="34" height="128" rx="9" fill="#111827" stroke="#475569"/>
  <text x="513" y="244" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="10">runs</text>
</svg>
