<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Automations and scheduled goals</title>
  <desc id="desc">Recurring goals, schedules, webhooks, and API jobs trigger cloud agents on a cadence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FBBF24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#101006" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">ALWAYS-ON GOALS</text>
  <g fill="#111827" stroke="#475569">
    <rect x="66" y="92" width="120" height="36" rx="8"/>
    <rect x="66" y="144" width="120" height="36" rx="8"/>
    <rect x="66" y="196" width="120" height="36" rx="8"/>
  </g>
  <text x="126" y="115" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">schedule</text>
  <text x="126" y="167" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">webhook</text>
  <text x="126" y="219" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">API job</text>
  <path d="M204 162H284" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="302" y="118" width="120" height="88" rx="14" fill="#251A06" stroke="#FBBF24"/>
  <text x="362" y="155" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Goal</text>
  <text x="362" y="179" text-anchor="middle" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="11">run policy</text>
  <path d="M440 162H492" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="504" cy="162" r="28" fill="#111827" stroke="#475569"/>
  <text x="504" y="158" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">Agent</text>
  <text x="504" y="175" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="10">run</text>
</svg>
