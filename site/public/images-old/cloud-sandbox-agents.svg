<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Start cloud agents in provider-backed sandboxes</title>
  <desc id="desc">Portal, API, and automations launch agent work through an environment provider into managed or self-owned sandbox environments.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#07111F" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SANDBOX AGENTS</text>
  <g fill="#111827" stroke="#475569">
    <rect x="82" y="128" width="146" height="48" rx="10"/>
    <rect x="82" y="210" width="146" height="48" rx="10"/>
    <rect x="82" y="292" width="146" height="48" rx="10"/>
  </g>
  <text x="155" y="157" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">portal launch</text>
  <text x="155" y="239" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">API launch</text>
  <text x="155" y="321" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">automation</text>
  <path d="M252 234H348" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="366" y="164" width="150" height="140" rx="16" fill="#071B2B" stroke="#38BDF8"/>
  <text x="441" y="212" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">Provider</text>
  <text x="441" y="240" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">environment model</text>
  <text x="441" y="266" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">lifecycle control</text>
  <path d="M536 234H622" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="640" y="112" width="146" height="42" rx="9"/>
    <rect x="640" y="168" width="146" height="42" rx="9"/>
    <rect x="640" y="224" width="146" height="42" rx="9"/>
    <rect x="640" y="280" width="146" height="42" rx="9"/>
    <rect x="640" y="336" width="146" height="42" rx="9"/>
  </g>
  <text x="713" y="138" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">managed sandbox</text>
  <text x="713" y="194" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">E2B / Daytona</text>
  <text x="713" y="250" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Docker</text>
  <text x="713" y="306" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">worktree</text>
  <text x="713" y="362" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">remote server</text>
