<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Planning tools beside code</title>
  <desc id="desc">Roadmaps, specs, UI flows, requirement plans, action plans, and tasks live beside code as shared source of truth.</desc>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#101006" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">PLANNING TOOLS</text>
  <g fill="#111827" stroke="#475569">
    <rect x="80" y="94" width="120" height="38" rx="9"/><rect x="220" y="94" width="120" height="38" rx="9"/><rect x="360" y="94" width="120" height="38" rx="9"/>
    <rect x="80" y="170" width="120" height="38" rx="9"/><rect x="220" y="170" width="120" height="38" rx="9"/><rect x="360" y="170" width="120" height="38" rx="9"/>
  </g>
  <text x="140" y="118" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">roadmap</text>
  <text x="280" y="118" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">specs</text>
  <text x="420" y="118" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">UI flow</text>
  <text x="140" y="194" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">requirements</text>
  <text x="280" y="194" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">action plan</text>
  <text x="420" y="194" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">tasks</text>
  <rect x="168" y="244" width="224" height="30" rx="7" fill="#251A06" stroke="#FBBF24"/>
  <text x="280" y="264" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="11">humans + agents share truth</text>
</svg>
