<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Editor observability panels</title>
  <desc id="desc">Agent logs, LLM calls, token budgets, console output, narrative graphs, and run history are visible inside the editor.</desc>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#100A12" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">OBSERVABILITY</text>
  <rect x="74" y="100" width="412" height="150" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="100" y="132" width="92" height="70" rx="9" fill="#2A0F18" stroke="#FB7185"/>
  <rect x="218" y="132" width="92" height="70" rx="9" fill="#251A06" stroke="#FBBF24"/>
  <rect x="336" y="132" width="92" height="70" rx="9" fill="#17142A" stroke="#A78BFA"/>
  <text x="146" y="171" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="11">logs</text>
  <text x="264" y="171" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="11">tokens</text>
  <text x="382" y="171" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="11">trace graph</text>
  <rect x="154" y="224" width="252" height="26" rx="7" fill="#0F172A" stroke="#334155"/>
  <text x="280" y="241" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="10">run history + console stream</text>
</svg>
