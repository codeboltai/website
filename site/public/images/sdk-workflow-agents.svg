<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow-specific agents</title>
  <desc id="desc">Domain workflows such as review, migration, compliance, support, research, and release management become custom agents.</desc>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#07111F" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">WORKFLOW AGENTS</text>
  <circle cx="280" cy="168" r="46" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="280" y="164" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Agent</text>
  <text x="280" y="183" text-anchor="middle" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="10">workflow</text>
  <g fill="#111827" stroke="#475569">
    <rect x="58" y="92" width="112" height="34" rx="8"/>
    <rect x="58" y="210" width="112" height="34" rx="8"/>
    <rect x="390" y="92" width="112" height="34" rx="8"/>
    <rect x="390" y="210" width="112" height="34" rx="8"/>
  </g>
  <text x="114" y="114" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">review</text>
  <text x="114" y="232" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">migration</text>
  <text x="446" y="114" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">support</text>
  <text x="446" y="232" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">release</text>
</svg>
