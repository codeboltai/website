<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Manage local Codebolt sessions from Cloud</title>
  <desc id="desc">A cloud plugin connects desktop and CLI sessions to the Cloud portal for session management, handoff, and coordinated environments.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#090A17" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">LOCAL HANDOFF</text>
  <rect x="92" y="154" width="160" height="78" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="92" y="274" width="160" height="78" rx="14" fill="#111827" stroke="#475569"/>
  <text x="172" y="199" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Desktop app</text>
  <text x="172" y="319" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">CLI session</text>
  <path d="M276 254H374" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="392" y="190" width="148" height="128" rx="16" fill="#17142A" stroke="#A78BFA"/>
  <text x="466" y="238" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">Cloud plugin</text>
  <text x="466" y="266" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">session bridge</text>
  <text x="466" y="292" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">context handoff</text>
  <path d="M560 254H648" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="666" y="184" width="126" height="140" rx="16" fill="#111827" stroke="#475569"/>
  <text x="729" y="234" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Cloud portal</text>
  <text x="729" y="262" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">observe</text>
  <text x="729" y="286" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">promote</text>
</svg>
