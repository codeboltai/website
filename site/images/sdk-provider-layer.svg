<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Provider SDK execution routing</title>
  <desc id="desc">The provider SDK routes agent execution to local engines, remote servers, cloud sandboxes, custom platforms, and specialized runtimes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FBBF24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#101006" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">PROVIDER SDK</text>
  <rect x="60" y="132" width="132" height="76" rx="14" fill="#251A06" stroke="#FBBF24"/>
  <text x="126" y="165" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Provider</text>
  <text x="126" y="188" text-anchor="middle" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="11">route request</text>
  <path d="M210 170H280" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="298" y="78" width="174" height="38" rx="9"/>
    <rect x="298" y="128" width="174" height="38" rx="9"/>
    <rect x="298" y="178" width="174" height="38" rx="9"/>
    <rect x="298" y="228" width="174" height="38" rx="9"/>
  </g>
  <text x="385" y="102" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">local engine</text>
  <text x="385" y="152" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">remote server</text>
  <text x="385" y="202" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">cloud sandbox</text>
  <text x="385" y="252" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">custom platform</text>
</svg>
