    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#090A17" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SCALABLE SYSTEMS</text>
  <circle cx="120" cy="168" r="34" fill="#111827" stroke="#475569"/>
  <text x="120" y="173" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">one</text>
  <path d="M170 168H238" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#17142A" stroke="#A78BFA">
    <circle cx="278" cy="128" r="24"/>
    <circle cx="278" cy="208" r="24"/>
    <circle cx="342" cy="168" r="24"/>
  </g>
  <text x="300" y="260" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">multi-agent</text>
  <path d="M382 168H438" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="454" y="120" width="44" height="96" rx="10" fill="#111827" stroke="#475569"/>
  <text x="476" y="240" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">envs</text>
</svg>
