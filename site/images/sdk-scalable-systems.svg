<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scalable agent systems</title>
  <desc id="desc">A custom agent scales into multi-agent and multi-environment workflows on the same foundation.</desc>
