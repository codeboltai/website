<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent workspace</title>
  <desc id="desc">Run built-in agents, remixes, custom agents, third-party agents, and remote agents from portfolios and thread panels.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9" stroke="#5EEAD4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#07111A" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">AGENT WORKSPACE</text>
  <rect x="70" y="100" width="132" height="112" rx="14" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="136" y="142" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Portfolio</text>
  <text x="136" y="168" text-anchor="middle" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="11">agent catalog</text>
  <path d="M220 156H292" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="310" y="72" width="136" height="34" rx="8"/><rect x="310" y="122" width="136" height="34" rx="8"/>
    <rect x="310" y="172" width="136" height="34" rx="8"/><rect x="310" y="222" width="136" height="34" rx="8"/>
  </g>
  <text x="378" y="94" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">built-in</text>
  <text x="378" y="144" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">remix</text>
  <text x="378" y="194" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">custom</text>
  <text x="378" y="244" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">remote</text>
