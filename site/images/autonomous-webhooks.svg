<svg width="760" height="420" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Webhook-triggered autonomous work</title>
  <desc id="desc">Remote systems post payloads and metadata to a webhook endpoint, which routes to an agent run and replies back through a platform plugin.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FB7185" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="420" rx="22" fill="#050816"/>
  <rect x="42" y="42" width="676" height="336" rx="18" fill="#120A12" stroke="#1F2937"/>
  <text x="76" y="86" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">WEBHOOK TRIGGER</text>
  <rect x="76" y="142" width="140" height="126" rx="14" fill="#111827" stroke="#475569"/>
  <text x="146" y="180" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Remote</text>
  <text x="146" y="202" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">system</text>
  <text x="146" y="232" text-anchor="middle" fill="#FDA4AF" font-family="Inter, ui-sans-serif, system-ui" font-size="12">POST /webhook</text>
  <path d="M234 205H316" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="334" y="126" width="160" height="158" rx="14" fill="#2A0F18" stroke="#FB7185"/>
  <text x="414" y="164" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Route</text>
  <text x="414" y="195" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="12">payload</text>
  <text x="414" y="219" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="12">metadata</text>
  <text x="414" y="243" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="12">thread strategy</text>
  <path d="M512 205H592" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="610" y="142" width="82" height="126" rx="14" fill="#111827" stroke="#475569"/>
  <text x="651" y="191" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Agent</text>
  <text x="651" y="212" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">run</text>
  <path d="M651 280C600 330 280 330 146 280" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 7" marker-end="url(#arrow)"/>
  <text x="380" y="350" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12">result returns through plugin or platform reply</text>
</svg>
