<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project workspace structure</title>
  <desc id="desc">Workspace combines project tabs, file tree, editor state, chat threads, agent runs, config, checkpoints, and memory.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="720" height="320" rx="18" fill="#050816"/>
  <rect x="32" y="28" width="656" height="264" rx="14" fill="#07111F" stroke="#1F2937"/>
  <text x="58" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">PROJECT WORKSPACE</text>
  <rect x="72" y="118" width="128" height="84" rx="14" fill="#071B2B" stroke="#38BDF8"/>
  <text x="136" y="154" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Workspace</text>
  <text x="136" y="178" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">project context</text>
  <path d="M218 160H300" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="318" y="76" width="132" height="34" rx="8"/><rect x="470" y="76" width="132" height="34" rx="8"/>
    <rect x="318" y="128" width="132" height="34" rx="8"/><rect x="470" y="128" width="132" height="34" rx="8"/>
    <rect x="318" y="180" width="132" height="34" rx="8"/><rect x="470" y="180" width="132" height="34" rx="8"/>
    <rect x="394" y="232" width="132" height="34" rx="8"/>
  </g>
  <text x="384" y="98" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">project tabs</text>
  <text x="536" y="98" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">file tree</text>
  <text x="384" y="150" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">editor state</text>
  <text x="536" y="150" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">agent runs</text>
  <text x="384" y="202" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">config</text>
  <text x="536" y="202" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">checkpoints</text>
  <text x="460" y="254" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">memory</text>
</svg>
