<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ship through the same runtime</title>
  <desc id="desc">Editor work can move to CLI, Cloud, remote environments, or Codebolt-native application surfaces without changing the runtime.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="560" height="320" rx="18" fill="#050816"/><rect x="30" y="28" width="500" height="264" rx="14" fill="#08111F" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SAME RUNTIME</text>
  <rect x="74" y="126" width="112" height="68" rx="12" fill="#071B2B" stroke="#38BDF8"/><text x="130" y="165" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Editor</text>
  <path d="M204 160H278" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="296" y="86" width="94" height="36" rx="8" fill="#111827" stroke="#475569"/><rect x="296" y="142" width="94" height="36" rx="8" fill="#111827" stroke="#475569"/><rect x="296" y="198" width="94" height="36" rx="8" fill="#111827" stroke="#475569"/>
  <rect x="410" y="142" width="86" height="36" rx="8" fill="#111827" stroke="#475569"/>
  <text x="343" y="109" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">CLI</text><text x="343" y="165" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">Cloud</text><text x="343" y="221" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">Remote</text><text x="453" y="165" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">Apps</text>
</svg>
