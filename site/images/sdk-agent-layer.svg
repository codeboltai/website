<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent SDK module access</title>
  <desc id="desc">A custom agent calls codeboltjs modules for files, git, terminal, LLM, browser, memory, tasks, jobs, panels, and environments.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#5EEAD4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="18" fill="#050816"/>
  <rect x="32" y="28" width="656" height="264" rx="14" fill="#07111F" stroke="#1F2937"/>
  <text x="58" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">AGENT SDK</text>
  <rect x="70" y="120" width="150" height="82" rx="14" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="145" y="153" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Custom agent</text>
  <text x="145" y="177" text-anchor="middle" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="12">codeboltjs</text>
  <path d="M238 161H316" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="334" y="84" width="112" height="42" rx="9"/>
    <rect x="464" y="84" width="112" height="42" rx="9"/>
    <rect x="334" y="142" width="112" height="42" rx="9"/>
    <rect x="464" y="142" width="112" height="42" rx="9"/>
    <rect x="334" y="200" width="112" height="42" rx="9"/>
    <rect x="464" y="200" width="112" height="42" rx="9"/>
  </g>
  <text x="390" y="110" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">files + git</text>
  <text x="520" y="110" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">terminal</text>
  <text x="390" y="168" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">LLM + browser</text>
  <text x="520" y="168" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">memory</text>
  <text x="390" y="226" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">tasks + jobs</text>
  <text x="520" y="226" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">panels + envs</text>
</svg>
