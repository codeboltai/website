<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Execution bridges</title>
  <desc id="desc">Custom providers bridge agent work from Codebolt to local runtimes, cloud sandboxes, remote servers, and third-party agent platforms.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FBBF24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#101006" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">EXECUTION BRIDGES</text>
  <rect x="70" y="138" width="112" height="60" rx="12" fill="#251A06" stroke="#FBBF24"/>
  <text x="126" y="173" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Provider</text>
  <path d="M198 168H280" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="298" y="82" width="156" height="36" rx="8"/>
    <rect x="298" y="136" width="156" height="36" rx="8"/>
    <rect x="298" y="190" width="156" height="36" rx="8"/>
    <rect x="298" y="244" width="156" height="36" rx="8"/>
  </g>
  <text x="376" y="105" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">local runtime</text>
  <text x="376" y="159" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">cloud sandbox</text>
  <text x="376" y="213" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">remote server</text>
  <text x="376" y="267" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">agent platform</text>
</svg>
