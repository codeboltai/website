<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud registry and marketplace layer</title>
  <desc id="desc">Codebolt Cloud manages public marketplace, private organization registry, agents, plugins, MCP servers, templates, reusable workflows, and team packages.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#5EEAD4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#07111A" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">REGISTRY</text>
  <rect x="96" y="166" width="166" height="126" rx="16" fill="#0D1B2A" stroke="#2DD4BF"/>
  <text x="179" y="214" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">Codebolt</text>
  <text x="179" y="240" text-anchor="middle" fill="#99F6E4" font-family="Inter, ui-sans-serif, system-ui" font-size="12">registry</text>
  <path d="M282 229H366" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="384" y="112" width="154" height="42" rx="9"/>
    <rect x="560" y="112" width="154" height="42" rx="9"/>
    <rect x="384" y="184" width="154" height="42" rx="9"/>
    <rect x="560" y="184" width="154" height="42" rx="9"/>
    <rect x="384" y="256" width="154" height="42" rx="9"/>
    <rect x="560" y="256" width="154" height="42" rx="9"/>
    <rect x="472" y="328" width="154" height="42" rx="9"/>
  </g>
  <text x="461" y="138" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">public marketplace</text>
  <text x="637" y="138" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">private registry</text>
  <text x="461" y="210" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">agents</text>
  <text x="637" y="210" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">plugins</text>
  <text x="461" y="282" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">MCP servers</text>
  <text x="637" y="282" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">templates</text>
  <text x="549" y="354" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">approved packages</text>
</svg>
