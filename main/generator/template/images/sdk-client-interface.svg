<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Client SDK custom interface connected to engine APIs</title>
  <desc id="desc">A custom application uses REST and WebSocket APIs through the Client SDK to manage chat, agents, jobs, files, git, memory, environments, and state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#08111F" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">CLIENT SDK</text>
  <rect x="78" y="126" width="230" height="218" rx="16" fill="#111827" stroke="#475569"/>
  <rect x="102" y="154" width="182" height="30" rx="6" fill="#1F2937"/>
  <rect x="102" y="204" width="80" height="72" rx="8" fill="#0F172A" stroke="#334155"/>
  <rect x="204" y="204" width="80" height="72" rx="8" fill="#0F172A" stroke="#334155"/>
  <text x="193" y="318" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="13">your application</text>
  <path d="M328 235H416" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="434" y="170" width="142" height="130" rx="16" fill="#071B2B" stroke="#38BDF8"/>
  <text x="505" y="218" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">REST</text>
  <text x="505" y="244" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">and WebSocket</text>
  <path d="M594 235H666" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="684" y="112" width="118" height="38" rx="9"/>
    <rect x="684" y="164" width="118" height="38" rx="9"/>
    <rect x="684" y="216" width="118" height="38" rx="9"/>
    <rect x="684" y="268" width="118" height="38" rx="9"/>
    <rect x="684" y="320" width="118" height="38" rx="9"/>
  </g>
  <text x="743" y="136" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">threads</text>
  <text x="743" y="188" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">agents + jobs</text>
  <text x="743" y="240" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">files + git</text>
  <text x="743" y="292" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">memory</text>
  <text x="743" y="344" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">state</text>
</svg>
