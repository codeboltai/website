<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud agents as backends for Codebolt-native applications</title>
  <desc id="desc">A Codebolt-native application calls Cloud APIs to route providers, start sandboxes, run workflows, stream events, and persist run state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FB7185" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#100A12" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">APP BACKENDS</text>
  <rect x="88" y="150" width="160" height="150" rx="16" fill="#111827" stroke="#475569"/>
  <text x="168" y="200" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Native app</text>
  <text x="168" y="229" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">frontend</text>
  <text x="168" y="253" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">dynamic panel</text>
  <path d="M268 225H356" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="374" y="172" width="130" height="106" rx="16" fill="#2A0F18" stroke="#FB7185"/>
  <text x="439" y="213" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Cloud API</text>
  <text x="439" y="240" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="12">route request</text>
  <path d="M524 225H620" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="638" y="112" width="148" height="38" rx="9"/>
    <rect x="638" y="164" width="148" height="38" rx="9"/>
    <rect x="638" y="216" width="148" height="38" rx="9"/>
    <rect x="638" y="268" width="148" height="38" rx="9"/>
    <rect x="638" y="320" width="148" height="38" rx="9"/>
  </g>
  <text x="712" y="136" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">provider routing</text>
  <text x="712" y="188" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">start sandbox</text>
  <text x="712" y="240" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">run workflow</text>
  <text x="712" y="292" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">stream events</text>
  <text x="712" y="344" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">persist state</text>
</svg>
