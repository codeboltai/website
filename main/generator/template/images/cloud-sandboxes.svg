<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud sandbox provider routing</title>
  <desc id="desc">Portal, API, and automation triggers route through an environment provider to E2B, Daytona, Docker, git worktrees, remote servers, and custom providers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="18" fill="#050816"/>
  <rect x="32" y="28" width="656" height="264" rx="14" fill="#07111F" stroke="#1F2937"/>
  <text x="58" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SANDBOX ROUTING</text>
  <g fill="#111827" stroke="#475569">
    <rect x="62" y="96" width="128" height="38" rx="9"/>
    <rect x="62" y="150" width="128" height="38" rx="9"/>
    <rect x="62" y="204" width="128" height="38" rx="9"/>
  </g>
  <text x="126" y="121" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Portal UI</text>
  <text x="126" y="175" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">API call</text>
  <text x="126" y="229" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Automation</text>
  <path d="M210 169H292" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="112" width="132" height="112" rx="14" fill="#071B2B" stroke="#38BDF8"/>
  <text x="376" y="154" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Environment</text>
  <text x="376" y="177" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="12">provider</text>
  <text x="376" y="202" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">choose sandbox</text>
  <path d="M460 169H520" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <g fill="#111827" stroke="#475569">
    <rect x="538" y="76" width="120" height="32" rx="8"/>
    <rect x="538" y="118" width="120" height="32" rx="8"/>
    <rect x="538" y="160" width="120" height="32" rx="8"/>
    <rect x="538" y="202" width="120" height="32" rx="8"/>
    <rect x="538" y="244" width="120" height="32" rx="8"/>
  </g>
  <text x="598" y="97" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">E2B</text>
  <text x="598" y="139" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">Daytona</text>
  <text x="598" y="181" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">Docker</text>
  <text x="598" y="223" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">worktree</text>
  <text x="598" y="265" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="11">remote</text>
</svg>
