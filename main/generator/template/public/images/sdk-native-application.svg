<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codebolt-native application architecture</title>
  <desc id="desc">Client SDK, Plugin SDK, Agent SDK, Provider SDK, and Codebolt engine services combine into a native application.</desc>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#090A12" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">CODEBOLT-NATIVE APPLICATION</text>
  <rect x="86" y="122" width="708" height="252" rx="18" fill="#0B1220" stroke="#334155"/>
  <g>
    <rect x="122" y="166" width="130" height="54" rx="10" fill="#071B2B" stroke="#38BDF8"/>
    <rect x="272" y="166" width="130" height="54" rx="10" fill="#2A0F18" stroke="#FB7185"/>
    <rect x="422" y="166" width="130" height="54" rx="10" fill="#0D1B2A" stroke="#2DD4BF"/>
    <rect x="572" y="166" width="130" height="54" rx="10" fill="#251A06" stroke="#FBBF24"/>
    <rect x="272" y="270" width="280" height="58" rx="12" fill="#17142A" stroke="#A78BFA"/>
  </g>
  <text x="187" y="198" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Client SDK</text>
  <text x="337" y="198" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Plugin SDK</text>
  <text x="487" y="198" text-anchor="middle" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Agent SDK</text>
  <text x="637" y="198" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="12">Provider SDK</text>
  <text x="412" y="304" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800">Codebolt engine services</text>
  <text x="440" y="410" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="13">memory + tasks + jobs + plugins + tools + environments + evals</text>
</svg>
