    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FBBF24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="420" rx="22" fill="#050816"/>
  <rect x="42" y="42" width="676" height="336" rx="18" fill="#0A0F1E" stroke="#1F2937"/>
  <text x="76" y="86" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">SCHEDULED WORK</text>
  <rect x="78" y="116" width="260" height="184" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="78" y="116" width="260" height="38" rx="14" fill="#1F2937"/>
  <text x="208" y="140" text-anchor="middle" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Calendar plan</text>
  <text x="108" y="184" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">09:00 deploy health</text>
  <text x="108" y="222" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">12:00 issue summary</text>
  <text x="108" y="260" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Friday release review</text>
  <circle cx="94" cy="179" r="5" fill="#FBBF24"/>
  <circle cx="94" cy="217" r="5" fill="#FBBF24"/>
  <circle cx="94" cy="255" r="5" fill="#FBBF24"/>
  <path d="M356 208H438" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="454" y="160" width="108" height="96" rx="14" fill="#251A06" stroke="#FBBF24"/>
  <text x="508" y="201" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Gateway</text>
  <text x="508" y="225" text-anchor="middle" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="11">route task</text>
  <path d="M578 208H646" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="662" cy="208" r="34" fill="#111827" stroke="#475569"/>
