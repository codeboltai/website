<svg width="760" height="420" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scheduled autonomous agent work</title>
  <desc id="desc">Calendar plans trigger deploy health checks, issue summaries, and release reviews through the gateway into an agent thread.</desc>
