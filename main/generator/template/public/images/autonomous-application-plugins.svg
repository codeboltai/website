<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Application plugins turn issues and workflow changes into agent sessions</title>
  <desc id="desc">A Linear issue event becomes an agent session that plans work, updates the issue, and records results.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#A78BFA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#0A0F1E" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">APPLICATION EVENT LOOP</text>
  <rect x="54" y="96" width="146" height="142" rx="12" fill="#101827" stroke="#334155"/>
  <text x="82" y="126" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Linear issue</text>
  <rect x="78" y="150" width="98" height="12" rx="6" fill="#334155"/>
  <rect x="78" y="174" width="74" height="12" rx="6" fill="#334155"/>
  <rect x="78" y="198" width="108" height="12" rx="6" fill="#334155"/>
  <path d="M216 167H278" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="292" y="112" width="112" height="110" rx="12" fill="#17142A" stroke="#A78BFA"/>
  <text x="348" y="147" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Agent</text>
  <text x="348" y="169" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">session</text>
  <text x="348" y="195" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">plan + execute</text>
  <path d="M418 167H480" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <g>
    <circle cx="492" cy="123" r="10" fill="#22C55E"/>
    <text x="492" y="128" text-anchor="middle" fill="#03130A" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">1</text>
    <text x="492" y="150" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">update</text>
    <circle cx="492" cy="183" r="10" fill="#FBBF24"/>
    <text x="492" y="188" text-anchor="middle" fill="#1F1300" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">2</text>
    <text x="492" y="210" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">comment</text>
    <circle cx="492" cy="243" r="10" fill="#38BDF8"/>
    <text x="492" y="248" text-anchor="middle" fill="#04131C" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">3</text>
    <text x="492" y="270" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">result</text>
  </g>
</svg>
