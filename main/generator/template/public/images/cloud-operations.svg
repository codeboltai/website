<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud operations dashboard</title>
  <desc id="desc">A central usage dashboard tracks agent runs, token and model cost, sandbox runtime, local and cloud activity, failures, retries, teams, and projects.</desc>
  <rect width="880" height="500" rx="22" fill="#050816"/>
  <rect x="40" y="40" width="800" height="420" rx="18" fill="#08111A" stroke="#1F2937"/>
  <text x="76" y="84" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">OPERATIONS DASHBOARD</text>
  <rect x="92" y="120" width="696" height="258" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="120" y="150" width="154" height="78" rx="10" fill="#071B2B" stroke="#38BDF8"/>
  <rect x="298" y="150" width="154" height="78" rx="10" fill="#251A06" stroke="#FBBF24"/>
  <rect x="476" y="150" width="154" height="78" rx="10" fill="#17142A" stroke="#A78BFA"/>
  <rect x="654" y="150" width="86" height="78" rx="10" fill="#2A0F18" stroke="#FB7185"/>
  <text x="197" y="181" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Agent runs</text>
  <text x="197" y="204" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">128</text>
  <text x="375" y="181" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Model cost</text>
  <text x="375" y="204" text-anchor="middle" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">$42</text>
  <text x="553" y="181" text-anchor="middle" fill="#EDE9FE" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Runtime</text>
  <text x="553" y="204" text-anchor="middle" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">17h</text>
  <text x="697" y="181" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">Retries</text>
  <text x="697" y="204" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">3</text>
  <g fill="#0F172A" stroke="#334155">
    <rect x="120" y="260" width="620" height="20" rx="6"/>
    <rect x="120" y="300" width="520" height="20" rx="6"/>
    <rect x="120" y="340" width="580" height="20" rx="6"/>
  </g>
  <rect x="120" y="260" width="440" height="20" rx="6" fill="#38BDF8"/>
  <rect x="120" y="300" width="310" height="20" rx="6" fill="#A78BFA"/>
  <rect x="120" y="340" width="372" height="20" rx="6" fill="#5EEAD4"/>
  <text x="120" y="248" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="11">local / cloud activity</text>
</svg>
