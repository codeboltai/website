<svg width="760" height="420" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Direct user requests route through the same gateway and memory</title>
  <desc id="desc">Users can ask from Telegram, Cloud portal, Codebolt apps, CLI, or Editor, then continue through gateway, memory, and agent runtime.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#38BDF8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="420" rx="22" fill="#050816"/>
  <rect x="42" y="42" width="676" height="336" rx="18" fill="#08111F" stroke="#1F2937"/>
  <text x="76" y="86" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">USER REQUEST</text>
  <g fill="#111827" stroke="#475569">
    <rect x="76" y="118" width="126" height="44" rx="10"/>
    <rect x="76" y="182" width="126" height="44" rx="10"/>
    <rect x="76" y="246" width="126" height="44" rx="10"/>
  </g>
  <text x="139" y="146" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Telegram</text>
  <text x="139" y="210" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Cloud portal</text>
  <text x="139" y="274" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">CLI / Editor</text>
  <path d="M220 204H292" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="154" width="112" height="100" rx="14" fill="#071B2B" stroke="#38BDF8"/>
  <text x="366" y="194" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Gateway</text>
  <text x="366" y="220" text-anchor="middle" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="11">continue thread</text>
  <path d="M438 204H508" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="526" y="116" width="126" height="54" rx="10" fill="#111827" stroke="#475569"/>
  <text x="589" y="149" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Memory</text>
  <rect x="526" y="184" width="126" height="54" rx="10" fill="#111827" stroke="#475569"/>
  <text x="589" y="217" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Plan</text>
  <rect x="526" y="252" width="126" height="54" rx="10" fill="#111827" stroke="#475569"/>
  <text x="589" y="285" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Agent action</text>
  <path d="M589 170V184" stroke="#38BDF8" stroke-width="1.8"/>
  <path d="M589 238V252" stroke="#38BDF8" stroke-width="1.8"/>
</svg>
