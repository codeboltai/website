<svg width="560" height="320" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Remote webhooks trigger autonomous agent work</title>
  <desc id="desc">A remote system posts webhook payloads with metadata, routing strategy, and task intent into a Codebolt agent run.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#FB7185" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="560" height="320" rx="18" fill="#050816"/>
  <rect x="30" y="28" width="500" height="264" rx="14" fill="#100A12" stroke="#1F2937"/>
  <text x="54" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" letter-spacing="1.8">REMOTE WEBHOOK ENTRY</text>
  <rect x="58" y="104" width="148" height="112" rx="12" fill="#111827" stroke="#475569"/>
  <text x="132" y="138" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Remote system</text>
  <rect x="84" y="160" width="96" height="30" rx="6" fill="#1F2937" stroke="#475569"/>
  <text x="132" y="180" text-anchor="middle" fill="#FCA5A5" font-family="Inter, ui-sans-serif, system-ui" font-size="12">POST /webhook</text>
  <path d="M222 160H288" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="302" y="88" width="132" height="144" rx="12" fill="#2A0F18" stroke="#FB7185"/>
  <text x="368" y="122" text-anchor="middle" fill="#FFE4E6" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Payload</text>
  <text x="368" y="153" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="11">metadata</text>
  <text x="368" y="175" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="11">thread strategy</text>
  <text x="368" y="197" text-anchor="middle" fill="#FECDD3" font-family="Inter, ui-sans-serif, system-ui" font-size="11">task intent</text>
  <path d="M450 160H492" stroke="#FB7185" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="504" cy="160" r="28" fill="#111827" stroke="#475569"/>
  <text x="504" y="156" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="700">Agent</text>
  <text x="504" y="172" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="10">run</text>
</svg>
